  <text x="260" y="156" fill="#94a3b8" font-size="9">2-3 sentences describing store focus</text>
  <text x="260" y="168" fill="#94a3b8" font-size="9">+ product range</text>
  <rect x="460" y="128" width="70" height="40" rx="4" fill="#334155"/>
  <text x="495" y="152" text-anchor="middle" fill="#94a3b8" font-size="8">Hero img</text>
  <!-- Category links -->
  <text x="146" y="196" fill="#4ade80" font-size="9" font-weight="bold">Shop by Category</text>
  <rect x="136" y="200" width="96" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.6"/>
  <text x="184" y="216" text-anchor="middle" fill="#4ade80" font-size="8">Running Shoes</text>
  <rect x="240" y="200" width="96" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.6"/>
  <text x="288" y="216" text-anchor="middle" fill="#4ade80" font-size="8">Trail Shoes</text>
  <rect x="344" y="200" width="96" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.6"/>
