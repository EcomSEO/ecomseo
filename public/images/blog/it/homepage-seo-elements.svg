  <rect x="448" y="200" width="96" height="24" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="0.6"/>
  <text x="496" y="216" text-anchor="middle" fill="#4ade80" font-size="8">Kids' Shoes</text>
  <!-- Schema -->
  <rect x="136" y="232" width="200" height="40" rx="4" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.6"/>
  <text x="146" y="248" fill="#f97316" font-size="8" font-weight="bold">Schema Markup</text>
  <text x="146" y="260" fill="#94a3b8" font-size="7">Organization + WebSite + SearchAction</text>
  <!-- Annotations outside -->
  <line x1="94" y1="82" x2="134" y2="82" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3 2"/>
