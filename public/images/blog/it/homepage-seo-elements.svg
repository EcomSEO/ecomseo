<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Ecommerce Homepage SEO Anatomy</text>
  <!-- Browser frame -->
  <rect x="120" y="44" width="440" height="240" rx="8" fill="#0f0f1a" stroke="#334155" stroke-width="1.5"/>
  <circle cx="142" cy="58" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="156" cy="58" r="4" fill="#f97316" opacity="0.6"/>
  <circle cx="170" cy="58" r="4" fill="#4ade80" opacity="0.6"/>
  <rect x="200" y="52" width="280" height="14" rx="4" fill="#1e1e2e"/>
  <text x="340" y="62" text-anchor="middle" fill="#94a3b8" font-size="8">yourstore.com</text>
  <!-- Title tag -->
  <rect x="136" y="72" width="408" height="20" rx="4" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="340" y="86" text-anchor="middle" fill="#a78bfa" font-size="9">Title Tag: Brand | Primary Category + Value Prop (50-60 chars)</text>
