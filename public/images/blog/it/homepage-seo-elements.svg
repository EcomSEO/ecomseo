  <line x1="94" y1="212" x2="134" y2="212" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="90" y="216" text-anchor="end" fill="#a78bfa" font-size="8">3</text>
  <line x1="94" y1="252" x2="134" y2="252" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="90" y="256" text-anchor="end" fill="#a78bfa" font-size="8">4</text>
