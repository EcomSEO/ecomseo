<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Fashion-Specific Schema Markup</text>
  <!-- Core Product schema -->
  <rect x="200" y="46" width="280" height="40" rx="8" stroke="#a78bfa" stroke-width="2"/>
  <text x="340" y="62" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Product Schema (Required)</text>
  <text x="340" y="78" text-anchor="middle" fill="#e2e8f0" font-size="9">name, image, description, brand, sku, offers</text>
  <!-- Fashion-specific properties -->
  <text x="340" y="108" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Fashion-Specific Properties</text>
  <rect x="20" y="120" width="120" height="48" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="80" y="140" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">color</text>
  <text x="80" y="156" text-anchor="middle" fill="#e2e8f0" font-size="8">"Navy Blue"</text>
  <rect x="156" y="120" width="120" height="48" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="216" y="140" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">size</text>
  <text x="216" y="156" text-anchor="middle" fill="#e2e8f0" font-size="8">Per-offer availability</text>
  <rect x="292" y="120" width="120" height="48" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="352" y="140" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">material</text>
  <text x="352" y="156" text-anchor="middle" fill="#e2e8f0" font-size="8">"100% Silk"</text>
  <rect x="428" y="120" width="120" height="48" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="488" y="140" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">pattern</text>
  <text x="488" y="156" text-anchor="middle" fill="#e2e8f0" font-size="8">"Solid", "Striped"</text>
  <rect x="564" y="120" width="100" height="48" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="614" y="140" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">audience</text>
  <text x="614" y="156" text-anchor="middle" fill="#e2e8f0" font-size="8">"Women"</text>
  <!-- Advanced properties -->
  <text x="340" y="196" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Advanced Connections</text>
  <rect x="60" y="208" width="180" height="40" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="150" y="224" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">isSimilarTo</text>
  <text x="150" y="240" text-anchor="middle" fill="#e2e8f0" font-size="8">Link to matching accessories</text>
  <rect x="260" y="208" width="180" height="40" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="224" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">aggregateRating</text>
  <text x="350" y="240" text-anchor="middle" fill="#e2e8f0" font-size="8">Include fit info from reviews</text>
  <rect x="460" y="208" width="180" height="40" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="550" y="224" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">Per-size offers</text>
  <text x="550" y="240" text-anchor="middle" fill="#e2e8f0" font-size="8">Show availability per size</text>
  <!-- Bottom note -->
  <text x="340" y="274" text-anchor="middle" fill="#e2e8f0" font-size="9" opacity="0.7">Google Shopping results pull directly from these properties -- accurate data increases visibility</text>
</svg>