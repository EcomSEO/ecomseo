<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Measuring SEO at Enterprise Scale</text>
  <!-- Segmentation approach -->
  <text x="340" y="56" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Segment Reporting by Page Type</text>
  <rect x="20" y="70" width="150" height="56" rx="8" stroke="#4ade80" stroke-width="2"/>
  <text x="95" y="90" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Product Pages</text>
  <text x="95" y="106" text-anchor="middle" fill="#e2e8f0" font-size="9">Traffic, revenue, CTR</text>
  <text x="95" y="118" text-anchor="middle" fill="#e2e8f0" font-size="9">per category segment</text>
  <rect x="185" y="70" width="150" height="56" rx="8" stroke="#60a5fa" stroke-width="2"/>
  <text x="260" y="90" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Category Pages</text>
  <text x="260" y="106" text-anchor="middle" fill="#e2e8f0" font-size="9">Position tracking,</text>
  <text x="260" y="118" text-anchor="middle" fill="#e2e8f0" font-size="9">organic share of voice</text>
  <rect x="350" y="70" width="150" height="56" rx="8" stroke="#f97316" stroke-width="2"/>
  <text x="425" y="90" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">Content Pages</text>
  <text x="425" y="106" text-anchor="middle" fill="#e2e8f0" font-size="9">Engagement, assisted</text>
  <text x="425" y="118" text-anchor="middle" fill="#e2e8f0" font-size="9">conversions, backlinks</text>
  <rect x="515" y="70" width="150" height="56" rx="8" stroke="#a78bfa" stroke-width="2"/>
  <text x="590" y="90" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Technical Health</text>
  <text x="590" y="106" text-anchor="middle" fill="#e2e8f0" font-size="9">Crawl rate, index coverage</text>
  <text x="590" y="118" text-anchor="middle" fill="#e2e8f0" font-size="9">Core Web Vitals scores</text>
  <!-- Reporting cadence -->
  <text x="340" y="156" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Reporting Cadence</text>
  <rect x="40" y="168" width="180" height="40" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="130" y="184" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Weekly</text>
  <text x="130" y="200" text-anchor="middle" fill="#e2e8f0" font-size="9">Traffic + revenue dashboards</text>
  <rect x="250" y="168" width="180" height="40" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="340" y="184" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">Monthly</text>
  <text x="340" y="200" text-anchor="middle" fill="#e2e8f0" font-size="9">Rankings, crawl health, content</text>
  <rect x="460" y="168" width="180" height="40" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="550" y="184" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">Quarterly</text>
  <text x="550" y="200" text-anchor="middle" fill="#e2e8f0" font-size="9">Strategic review, competitor shifts</text>
  <!-- Key insight -->
  <text x="340" y="236" text-anchor="middle" fill="#e2e8f0" font-size="10">Track organic traffic value (equivalent ad cost) alongside revenue</text>
  <text x="340" y="256" text-anchor="middle" fill="#e2e8f0" font-size="9" opacity="0.7">Site-wide averages hide problems -- always segment by page type, category, and market</text>
</svg>