  <line x1="162" y1="245" x2="190" y2="245" stroke="#e2e8f0" stroke-width="1" marker-end="url(#arr2)"/>
  <rect x="192" y="225" width="120" height="40" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="252" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Competitor Analysis</text>
