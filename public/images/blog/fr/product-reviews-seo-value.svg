<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Reviews as an SEO Asset</text>
  <!-- Review value breakdown -->
  <rect x="20" y="52" width="200" height="80" rx="8" stroke="#4ade80" stroke-width="2"/>
  <text x="120" y="72" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Unique Content</text>
  <text x="120" y="90" text-anchor="middle" fill="#e2e8f0" font-size="9">25 reviews = 2,000-3,000</text>
  <text x="120" y="104" text-anchor="middle" fill="#e2e8f0" font-size="9">words of user-generated text</text>
  <text x="120" y="120" text-anchor="middle" fill="#4ade80" font-size="8">More than most descriptions</text>
  <rect x="240" y="52" width="200" height="80" rx="8" stroke="#60a5fa" stroke-width="2"/>
  <text x="340" y="72" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Natural Keywords</text>
  <text x="340" y="90" text-anchor="middle" fill="#e2e8f0" font-size="9">Customers use long-tail</text>
  <text x="340" y="104" text-anchor="middle" fill="#e2e8f0" font-size="9">phrases you never thought of</text>
  <text x="340" y="120" text-anchor="middle" fill="#60a5fa" font-size="8">Real language, not SEO-speak</text>
  <rect x="460" y="52" width="200" height="80" rx="8" stroke="#f97316" stroke-width="2"/>
  <text x="560" y="72" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">Freshness Signal</text>
  <text x="560" y="90" text-anchor="middle" fill="#e2e8f0" font-size="9">Each new review adds</text>
  <text x="560" y="104" text-anchor="middle" fill="#e2e8f0" font-size="9">fresh content to the page</text>
  <text x="560" y="120" text-anchor="middle" fill="#f97316" font-size="8">Google rewards recency</text>
  <!-- Implementation rules -->
  <text x="340" y="160" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Implementation Best Practices</text>
  <rect x="40" y="174" width="180" height="40" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="130" y="190" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">Show on page, not in tab</text>
  <text x="130" y="206" text-anchor="middle" fill="#e2e8f0" font-size="8">Hidden content is devalued</text>
  <rect x="240" y="174" width="180" height="40" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="330" y="190" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">Display 5-10 reviews visible</text>
  <text x="330" y="206" text-anchor="middle" fill="#e2e8f0" font-size="8">"Load more" for the rest</text>
  <rect x="440" y="174" width="200" height="40" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="540" y="190" text-anchor="middle" fill="#f97316" font-size="9" font-weight="bold">Mark up with Review schema</text>
  <text x="540" y="206" text-anchor="middle" fill="#e2e8f0" font-size="8">Stars + count in search results</text>
  <!-- Q&A suggestion -->
  <rect x="100" y="228" width="480" height="40" rx="8" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="244" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">Add Q&A section alongside reviews</text>
  <text x="340" y="260" text-anchor="middle" fill="#e2e8f0" font-size="9">Questions generate long-tail keyword content and mark up with FAQPage schema</text>
</svg>