  <text x="275" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">LocalBusiness schema</text>
  <rect x="370" y="55" width="150" height="90" rx="8" stroke="#4ade80" stroke-width="1.5"/>
