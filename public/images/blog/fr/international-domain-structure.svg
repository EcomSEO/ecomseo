<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">International Domain Structure Comparison</text>
  <!-- ccTLD -->
  <rect x="30" y="48" width="190" height="140" rx="8" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="125" y="70" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">ccTLD</text>
  <text x="50" y="92" fill="#e2e8f0" font-size="10">shop.de</text>
  <text x="50" y="108" fill="#e2e8f0" font-size="10">shop.fr</text>
  <text x="50" y="124" fill="#e2e8f0" font-size="10">shop.nl</text>
  <line x1="40" y1="134" x2="210" y2="134" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="152" fill="#4ade80" font-size="9">+ Strong geo signal</text>
  <text x="50" y="168" fill="#ef4444" font-size="9">- Split authority</text>
  <text x="50" y="182" fill="#ef4444" font-size="9">- 3x maintenance</text>
  <!-- Subdomain -->
  <rect x="240" y="48" width="190" height="140" rx="8" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="335" y="70" text-anchor="middle" fill="#f97316" font-size="12" font-weight="bold">Subdomain</text>
  <text x="260" y="92" fill="#e2e8f0" font-size="10">de.shop.com</text>
  <text x="260" y="108" fill="#e2e8f0" font-size="10">fr.shop.com</text>
  <text x="260" y="124" fill="#e2e8f0" font-size="10">nl.shop.com</text>
  <line x1="250" y1="134" x2="420" y2="134" stroke="#334155" stroke-width="0.5"/>
  <text x="260" y="152" fill="#f97316" font-size="9">~ Partial authority</text>
  <text x="260" y="168" fill="#f97316" font-size="9">~ Semi-separate</text>
  <text x="260" y="182" fill="#94a3b8" font-size="9">Rarely recommended</text>
  <!-- Subfolder -->
  <rect x="450" y="48" width="200" height="140" rx="8" fill="#1e1e2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="550" y="70" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">Subfolder</text>
  <text x="470" y="92" fill="#e2e8f0" font-size="10">shop.com/de/</text>
  <text x="470" y="108" fill="#e2e8f0" font-size="10">shop.com/fr/</text>
  <text x="470" y="124" fill="#e2e8f0" font-size="10">shop.com/nl/</text>
  <line x1="460" y1="134" x2="640" y2="134" stroke="#334155" stroke-width="0.5"/>
  <text x="470" y="152" fill="#4ade80" font-size="9">+ Shared authority</text>
  <text x="470" y="168" fill="#4ade80" font-size="9">+ Single domain</text>
  <text x="470" y="182" fill="#4ade80" font-size="9">+ Recommended</text>
  <!-- Recommendation -->
  <rect x="140" y="208" width="400" height="52" rx="8" fill="#4ade80" opacity="0.08" stroke="#4ade80" stroke-width="1"/>
  <text x="340" y="230" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Recommended for most ecommerce stores</text>
  <text x="340" y="248" text-anchor="middle" fill="#e2e8f0" font-size="10">Subfolders consolidate link equity while hreflang handles geo-targeting</text>
</svg>