<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Core Web Vitals Targets for Ecommerce</text>
  <g transform="translate(30,55)">
    <rect x="0" y="0" width="195" height="165" rx="8" stroke="#4ade80" stroke-width="2" fill="none"/>
    <text x="97" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#4ade80">LCP</text>
    <text x="97" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Largest Contentful Paint</text>
    <text x="97" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#4ade80">&lt; 2.5s</text>
    <text x="97" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Hero image or product image</text>
    <text x="97" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Fix: WebP, CDN, preload</text>
    <text x="97" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">reduce render-blocking JS</text>
  </g>
  <g transform="translate(242,55)">
    <rect x="0" y="0" width="195" height="165" rx="8" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <text x="97" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#60a5fa">INP</text>
    <text x="97" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Interaction to Next Paint</text>
    <text x="97" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#60a5fa">&lt; 200ms</text>
    <text x="97" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Filters, add-to-cart, search</text>
    <text x="97" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Fix: web workers, debounce</text>
    <text x="97" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">requestIdleCallback</text>
  </g>
  <g transform="translate(454,55)">
    <rect x="0" y="0" width="195" height="165" rx="8" stroke="#f97316" stroke-width="2" fill="none"/>
    <text x="97" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#f97316">CLS</text>
    <text x="97" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Cumulative Layout Shift</text>
    <text x="97" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#f97316">&lt; 0.1</text>
    <text x="97" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Images, banners, fonts</text>
    <text x="97" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Fix: explicit dimensions,</text>
    <text x="97" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">reserve space, font-display</text>
  </g>
  <text x="340" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Focus on top 50 landing pages by traffic for maximum ranking impact</text>
</svg>