<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Fixing Magento Layered Navigation for SEO</text>
  <g transform="translate(40,50)">
    <rect x="0" y="0" width="180" height="110" rx="6" stroke="#f97316" stroke-width="2" fill="none"/>
    <text x="90" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">The Problem</text>
    <text x="15" y="44" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">200 categories</text>
    <text x="15" y="60" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">x filter combos</text>
    <text x="15" y="82" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">= 340,000 URLs</text>
    <text x="15" y="98" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Mostly thin duplicates</text>
  </g>
  <line x1="225" y1="105" x2="260" y2="105" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="255,100 265,105 255,110" fill="#a78bfa"/>
  <g transform="translate(270,50)">
    <rect x="0" y="0" width="180" height="110" rx="6" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <text x="90" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Decision Logic</text>
    <text x="15" y="44" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Search demand?</text>
    <text x="15" y="60" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Yes: index + unique content</text>
    <text x="15" y="78" font-family="Arial,sans-serif" font-size="10" fill="#f97316">No demand?</text>
    <text x="15" y="94" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">No: noindex,follow</text>
  </g>
  <line x1="455" y1="105" x2="490" y2="105" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="485,100 495,105 485,110" fill="#a78bfa"/>
  <g transform="translate(500,50)">
    <rect x="0" y="0" width="150" height="110" rx="6" stroke="#4ade80" stroke-width="2" fill="none"/>
    <text x="75" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Result</text>
    <text x="15" y="46" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Clean index</text>
    <text x="15" y="64" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Faster crawling</text>
    <text x="15" y="82" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Stronger signals</text>
    <text x="15" y="100" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">on pages that matter</text>
  </g>
  <g transform="translate(40,185)">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Implementation Options</text>
    <g transform="translate(0,15)">
      <rect x="0" y="0" width="290" height="80" rx="6" stroke="#60a5fa" stroke-width="2" fill="none"/>
      <text x="145" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Option A: robots meta tag</text>
      <text x="15" y="40" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Custom module adds noindex to multi-filter</text>
      <text x="15" y="55" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">URLs. Keep single meaningful filters indexable.</text>
      <text x="15" y="70" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Best for: selective filtering</text>
    </g>
    <g transform="translate(310,15)">
      <rect x="0" y="0" width="290" height="80" rx="6" stroke="#f472b6" stroke-width="2" fill="none"/>
      <text x="145" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f472b6">Option B: AJAX filtering</text>
      <text x="15" y="40" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Filters change content without changing URL.</text>
      <text x="15" y="55" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">One clean URL per category for search engines.</text>
      <text x="15" y="70" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Best for: zero crawl waste</text>
    </g>
  </g>
</svg>