<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">SEO vs Paid Ads: Compounding Returns Over Time</text>
  <!-- Axes -->
  <line x1="80" y1="230" x2="620" y2="230" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="50" x2="80" y2="230" stroke="#334155" stroke-width="1"/>
  <text x="350" y="258" text-anchor="middle" fill="#94a3b8" font-size="10">Time (months)</text>
  <text x="40" y="140" text-anchor="middle" fill="#94a3b8" font-size="10" transform="rotate(-90 40 140)">Traffic</text>
  <!-- Month labels -->
  <text x="120" y="246" text-anchor="middle" fill="#94a3b8" font-size="9">6</text>
  <text x="210" y="246" text-anchor="middle" fill="#94a3b8" font-size="9">12</text>
  <text x="300" y="246" text-anchor="middle" fill="#94a3b8" font-size="9">18</text>
  <text x="390" y="246" text-anchor="middle" fill="#94a3b8" font-size="9">24</text>
  <text x="480" y="246" text-anchor="middle" fill="#94a3b8" font-size="9">30</text>
  <text x="570" y="246" text-anchor="middle" fill="#94a3b8" font-size="9">36</text>
  <!-- Paid ads line (flat) -->
  <line x1="80" y1="160" x2="600" y2="155" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="608" y="152" fill="#ef4444" font-size="10">Paid (flat)</text>
  <!-- Budget off line -->
  <line x1="460" y1="155" x2="600" y2="226" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2" opacity="0.4"/>
  <text x="540" y="210" fill="#ef4444" font-size="8" opacity="0.6">Budget off</text>
  <!-- SEO curve (compounding) -->
  <path d="M80,220 C120,218 140,212 180,200 S240,175 300,150 S380,110 450,85 S530,62 600,52" stroke="#4ade80" stroke-width="2.5" fill="none"/>
  <text x="608" y="48" fill="#4ade80" font-size="10" font-weight="bold">SEO</text>
  <!-- Breakeven point -->
  <circle cx="210" cy="165" r="4" fill="#f97316"/>
  <line x1="210" y1="169" x2="210" y2="230" stroke="#f97316" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="210" y="178" text-anchor="middle" fill="#f97316" font-size="8">Break-even</text>
  <!-- Cost per click annotation -->
  <rect x="380" y="60" width="140" height="56" rx="6" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="450" y="78" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold">Effective CPC</text>
  <text x="450" y="94" text-anchor="middle" fill="#e2e8f0" font-size="9">Year 1: $1.80</text>
  <text x="450" y="108" text-anchor="middle" fill="#4ade80" font-size="9">Year 3: &lt;$0.60</text>
</svg>