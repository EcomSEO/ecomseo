<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">XML Sitemap Structure for Large Catalogs</text>
  <g transform="translate(230,48)">
    <rect x="0" y="0" width="220" height="40" rx="6" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <text x="110" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">sitemap-index.xml</text>
  </g>
  <line x1="340" y1="88" x2="340" y2="105" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <line x1="110" y1="110" x2="570" y2="110" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <line x1="110" y1="110" x2="110" y2="125" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="280" y1="110" x2="280" y2="125" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="420" y1="110" x2="420" y2="125" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="570" y1="110" x2="570" y2="125" stroke="#e2e8f0" stroke-width="1"/>
  <g transform="translate(40,128)">
    <rect x="0" y="0" width="140" height="55" rx="6" stroke="#4ade80" stroke-width="2" fill="none"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">products.xml</text>
    <text x="70" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">All product URLs</text>
    <text x="70" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Dynamic lastmod</text>
  </g>
  <g transform="translate(200,128)">
    <rect x="0" y="0" width="140" height="55" rx="6" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">categories.xml</text>
    <text x="70" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Category pages only</text>
    <text x="70" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">High priority</text>
  </g>
  <g transform="translate(360,128)">
    <rect x="0" y="0" width="140" height="55" rx="6" stroke="#f97316" stroke-width="2" fill="none"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">blog.xml</text>
    <text x="70" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Content pages</text>
    <text x="70" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Buying guides</text>
  </g>
  <g transform="translate(510,128)">
    <rect x="0" y="0" width="140" height="55" rx="6" stroke="#f472b6" stroke-width="2" fill="none"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f472b6">pages.xml</text>
    <text x="70" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">CMS / static pages</text>
    <text x="70" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">About, contact, etc.</text>
  </g>
  <g transform="translate(40,210)">
    <rect x="0" y="0" width="600" height="70" rx="6" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <text x="300" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Sitemap Rules</text>
    <text x="15" y="40" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Only indexable, canonical URLs -- no noindex, no redirects, no blocked URLs</text>
    <text x="15" y="56" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Accurate lastmod dates -- remove discontinued products within 24 hours</text>
  </g>
