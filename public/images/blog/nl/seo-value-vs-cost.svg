    <text x="22" y="13" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Reject vague link-building details</text>
  </g>
  <g transform="translate(350,274)">
    <circle cx="10" cy="8" r="5" stroke="#f97316" stroke-width="1.5" fill="none"/>
