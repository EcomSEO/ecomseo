<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">SEO Investment: Value vs Cost Analysis</text>
  <g transform="translate(30,55)">
    <rect x="0" y="0" width="295" height="110" rx="8" stroke="#f97316" stroke-width="2" fill="none"/>
    <text x="147" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">Cheap SEO ($1,500/mo)</text>
