    <text x="147" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">500 new customers/month in 12 mo</text>
    <text x="147" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">$80 AOV x 2.5 repeat rate</text>
    <text x="147" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">$1.2M annual customer value</text>
    <text x="147" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">ROI: 20x investment</text>
  </g>
  <line x1="30" y1="190" x2="650" y2="190" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">What to Demand in Proposals</text>
  <g transform="translate(40,230)">
