    <text x="147" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">$12K cleanup + 6 months lost revenue</text>
    <text x="147" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">True cost: $100K+</text>
  </g>
