    <text x="22" y="13" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Specific deliverables, not vague promises</text>
  </g>
  <g transform="translate(40,252)">
    <circle cx="10" cy="8" r="5" stroke="#4ade80" stroke-width="1.5" fill="none"/>
    <text x="22" y="13" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Case studies with real revenue numbers</text>
  </g>
  <g transform="translate(40,274)">
