<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Site Speed Revenue Impact for Ecommerce</text>
  <!-- Core Web Vitals targets -->
  <text x="350" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">Core Web Vitals Targets</text>
  <rect x="60" y="72" width="170" height="45" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="145" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">LCP &lt; 2.5s</text>
  <text x="145" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Largest Contentful Paint</text>
  <rect x="265" y="72" width="170" height="45" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">CLS &lt; 0.1</text>
  <text x="350" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Cumulative Layout Shift</text>
  <rect x="470" y="72" width="170" height="45" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="555" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">INP &lt; 200ms</text>
  <text x="555" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Interaction to Next Paint</text>
  <!-- Revenue math -->
  <rect x="100" y="140" width="500" height="80" rx="8" stroke="#f97316" stroke-width="1.5"/>
  <text x="350" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">Revenue Impact Calculation</text>
  <text x="350" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Every 100ms faster = +1.1% conversion rate (Deloitte)</text>
  <text x="350" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#4ade80">$2M/year store + 1s improvement = $100K+ additional revenue</text>
  <!-- Common culprits -->
  <text x="350" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Speed Killers</text>
  <text x="110" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">15-25 apps</text>
  <text x="110" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">per typical store</text>
  <text x="280" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">50-500ms each</text>
  <text x="280" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">per script/plugin</text>
  <text x="450" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">6s+ interactive</text>
  <text x="450" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">cumulative impact</text>
  <text x="600" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">No lazy loading</text>
  <text x="600" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">images below fold</text>
</svg>