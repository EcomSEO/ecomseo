<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Product Image SEO Optimization Pipeline</text>
  <!-- Pipeline steps -->
  <rect x="20" y="52" width="120" height="64" rx="8" stroke="#60a5fa" stroke-width="2"/>
  <text x="80" y="72" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">1. File Name</text>
  <text x="80" y="88" text-anchor="middle" fill="#e2e8f0" font-size="8">navy-merino-</text>
  <text x="80" y="100" text-anchor="middle" fill="#e2e8f0" font-size="8">sweater-front.webp</text>
  <line x1="140" y1="84" x2="158" y2="84" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="158" y="52" width="120" height="64" rx="8" stroke="#4ade80" stroke-width="2"/>
  <text x="218" y="72" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">2. Alt Text</text>
  <text x="218" y="88" text-anchor="middle" fill="#e2e8f0" font-size="8">Describe product +</text>
  <text x="218" y="100" text-anchor="middle" fill="#e2e8f0" font-size="8">color + material</text>
  <line x1="278" y1="84" x2="296" y2="84" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="296" y="52" width="120" height="64" rx="8" stroke="#a78bfa" stroke-width="2"/>
  <text x="356" y="72" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">3. Format</text>
  <text x="356" y="88" text-anchor="middle" fill="#e2e8f0" font-size="8">WebP or AVIF</text>
  <text x="356" y="100" text-anchor="middle" fill="#e2e8f0" font-size="8">30-50% smaller</text>
  <line x1="416" y1="84" x2="434" y2="84" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="434" y="52" width="120" height="64" rx="8" stroke="#f97316" stroke-width="2"/>
  <text x="494" y="72" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">4. Responsive</text>
  <text x="494" y="88" text-anchor="middle" fill="#e2e8f0" font-size="8">srcset for devices</text>
  <text x="494" y="100" text-anchor="middle" fill="#e2e8f0" font-size="8">Right size per screen</text>
  <line x1="554" y1="84" x2="572" y2="84" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="572" y="52" width="92" height="64" rx="8" stroke="#ef4444" stroke-width="2"/>
  <text x="618" y="72" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">5. Schema</text>
  <text x="618" y="88" text-anchor="middle" fill="#e2e8f0" font-size="8">Product.image</text>
  <text x="618" y="100" text-anchor="middle" fill="#e2e8f0" font-size="8">per variant</text>
  <!-- Image count recommendation -->
  <text x="340" y="142" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Minimum Images per Product</text>
  <rect x="60" y="156" width="130" height="36" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="125" y="178" text-anchor="middle" fill="#e2e8f0" font-size="9">Front view</text>
  <rect x="204" y="156" width="130" height="36" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="269" y="178" text-anchor="middle" fill="#e2e8f0" font-size="9">Back view</text>
  <rect x="348" y="156" width="130" height="36" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="413" y="178" text-anchor="middle" fill="#e2e8f0" font-size="9">Detail / close-up</text>
  <rect x="492" y="156" width="130" height="36" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="557" y="178" text-anchor="middle" fill="#e2e8f0" font-size="9">Lifestyle / in-use</text>
  <!-- Impact stat -->
  <text x="340" y="218" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Google Images drives 20-30% of ecommerce organic traffic</text>
  <text x="340" y="240" text-anchor="middle" fill="#e2e8f0" font-size="9">Responsive images with srcset typically cuts page weight by 40-60%</text>
  <text x="340" y="262" text-anchor="middle" fill="#e2e8f0" font-size="9" opacity="0.7">Product videos keep visitors on page longer and rank separately in video search</text>
</svg>