<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Product Review Outreach Funnel</text>
  <g transform="translate(40,55)">
    <rect x="0" y="0" width="600" height="40" rx="6" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <text x="300" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Step 1: Prospect Research</text>
    <text x="300" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Search "[category] + review" and "[competitor] + review" -- find 500 prospects</text>
  </g>
  <line x1="340" y1="95" x2="340" y2="110" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <g transform="translate(70,112)">
    <rect x="0" y="0" width="540" height="40" rx="6" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <text x="270" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">Step 2: Quality Filter</text>
    <text x="270" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Check DA, traffic, dofollow links -- narrow to 40-60 targets</text>
  </g>
  <line x1="340" y1="152" x2="340" y2="167" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <g transform="translate(110,169)">
    <rect x="0" y="0" width="460" height="40" rx="6" stroke="#f97316" stroke-width="2" fill="none"/>
    <text x="230" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Step 3: Targeted Pitch</text>
    <text x="230" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Specific pitch + product + shipping details -- 22% response rate</text>
  </g>
  <line x1="340" y1="209" x2="340" y2="224" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <g transform="translate(160,226)">
    <rect x="0" y="0" width="360" height="40" rx="6" stroke="#4ade80" stroke-width="2" fill="none"/>
    <text x="180" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Step 4: Quality Backlinks</text>
    <text x="180" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Dofollow editorial links from relevant sites</text>
  </g>
  <text x="340" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa">500 prospects -- 50 qualified -- 11 replies -- 8-10 links per campaign</text>
</svg>