<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">URL Redirect Mapping Decision Flow</text>
  <!-- Start -->
  <rect x="250" y="50" width="180" height="36" rx="8" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Old URL has traffic?</text>
  <!-- Yes branch -->
  <line x1="290" y1="86" x2="160" y2="115" stroke="#4ade80" stroke-width="1.2" opacity="0.5"/>
  <text x="210" y="100" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Yes</text>
  <rect x="70" y="115" width="180" height="36" rx="8" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="160" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Matching new page?</text>
  <!-- Yes-Yes -->
  <line x1="110" y1="151" x2="80" y2="180" stroke="#4ade80" stroke-width="1.2" opacity="0.5"/>
  <text x="80" y="170" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Yes</text>
  <rect x="20" y="180" width="120" height="36" rx="8" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="1.5"/>
  <text x="80" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">301 Redirect</text>
  <!-- Yes-No -->
  <line x1="210" y1="151" x2="240" y2="180" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <text x="235" y="170" font-family="Arial,sans-serif" font-size="9" fill="#f97316">No</text>
  <rect x="180" y="180" width="120" height="36" rx="8" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="240" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">301 to closest</text>
  <text x="240" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">parent category</text>
  <!-- No branch -->
  <line x1="390" y1="86" x2="520" y2="115" stroke="#ef4444" stroke-width="1.2" opacity="0.5"/>
  <text x="465" y="100" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">No</text>
  <rect x="430" y="115" width="180" height="36" rx="8" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="520" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Backlinks pointing?</text>
  <!-- No-Yes -->
  <line x1="470" y1="151" x2="440" y2="180" stroke="#4ade80" stroke-width="1.2" opacity="0.5"/>
  <text x="440" y="170" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Yes</text>
  <rect x="370" y="180" width="120" height="36" rx="8" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="430" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">301 to relevant</text>
  <!-- No-No -->
  <line x1="570" y1="151" x2="600" y2="180" stroke="#e2e8f0" stroke-width="1.2" opacity="0.4"/>
  <text x="595" y="170" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" opacity="0.6">No</text>
  <rect x="540" y="180" width="120" height="36" rx="8" fill="#e2e8f0" opacity="0.08" stroke="#e2e8f0" stroke-width="1" opacity="0.3"/>
  <text x="600" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.6">Let 404 / 410</text>
  <!-- Bottom note -->
  <text x="340" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">Never chain redirects: A&#8594;B&#8594;C loses link equity at every hop</text>
</svg>