<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Agency Communication Framework</text>
  <!-- Cadence levels -->
  <rect x="40" y="55" width="180" height="75" rx="8" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Minimum (All Tiers)</text>
  <text x="55" y="98" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Monthly strategy call</text>
  <text x="55" y="114" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Written monthly report</text>
  <rect x="250" y="55" width="190" height="75" rx="8" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="345" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Mid-Tier ($3K-$7K)</text>
  <text x="265" y="98" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Biweekly calls</text>
  <text x="265" y="114" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Slack / email access</text>
  <rect x="470" y="55" width="200" height="75" rx="8" stroke="#4ade80" stroke-width="1.5"/>
  <text x="570" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Premium ($7K+)</text>
  <text x="485" y="98" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Same-day urgent response</text>
  <text x="485" y="114" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Proactive issue alerts</text>
  <!-- Key questions -->
  <text x="350" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">Ask Before Signing</text>
  <rect x="40" y="180" width="300" height="40" rx="6" stroke="#f97316" stroke-width="1"/>
  <text x="190" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Who is my day-to-day contact? (Senior vs junior)</text>
  <rect x="360" y="180" width="300" height="40" rx="6" stroke="#f97316" stroke-width="1"/>
  <text x="510" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Who implements fixes? (Agency vs your dev team)</text>
  <rect x="40" y="235" width="300" height="40" rx="6" stroke="#f97316" stroke-width="1"/>
  <text x="190" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">What response time for urgent issues? (e.g. 500 errors)</text>
  <rect x="360" y="235" width="300" height="40" rx="6" stroke="#f97316" stroke-width="1"/>
  <text x="510" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Reports in plain language? (Not jargon-filled PDFs)</text>
  <!-- Note -->
  <text x="350" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.7">Poor communication is the #1 reason agency-client relationships break down</text>
</svg>