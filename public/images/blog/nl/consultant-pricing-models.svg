<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">SEO Consultant Pricing Models Compared</text>
  <g transform="translate(30,50)">
    <rect x="0" y="0" width="190" height="210" rx="8" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <text x="95" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a78bfa">Hourly</text>
    <text x="95" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">$150-$300/hr (NA/EU)</text>
    <text x="95" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">$50-$150/hr (APAC/EE)</text>
    <line x1="20" y1="88" x2="170" y2="88" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
    <text x="95" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+ Flexible scope</text>
    <text x="95" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+ Pay for what you use</text>
    <text x="95" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">- Costs can escalate</text>
    <text x="95" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">- Hard to budget</text>
    <text x="95" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Best for: ad-hoc needs</text>
  </g>
  <g transform="translate(245,50)">
    <rect x="0" y="0" width="190" height="210" rx="8" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <text x="95" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#60a5fa">Project-Based</text>
    <text x="95" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Audit: $3K-$8K</text>
    <text x="95" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Migration: $5K-$15K</text>
    <line x1="20" y1="88" x2="170" y2="88" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4"/>
    <text x="95" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+ Clear deliverables</text>
    <text x="95" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+ Fixed budget</text>
    <text x="95" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">- Scope creep risk</text>
    <text x="95" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">- No ongoing support</text>
    <text x="95" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Best for: defined scope</text>
  </g>
  <g transform="translate(460,50)">
    <rect x="0" y="0" width="190" height="210" rx="8" stroke="#4ade80" stroke-width="2" fill="none"/>
    <text x="95" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#4ade80">Monthly Retainer</text>
    <text x="95" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">$2K-$10K/month</text>
    <text x="95" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">10-40 hrs included</text>
    <line x1="20" y1="88" x2="170" y2="88" stroke="#4ade80" stroke-width="1" stroke-dasharray="4"/>
    <text x="95" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+ Ongoing optimization</text>
    <text x="95" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+ Predictable cost</text>
    <text x="95" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">- Long-term commitment</text>
    <text x="95" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">- Varies by consultant</text>
    <text x="95" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Best for: ongoing SEO</text>
  </g>
  <line x1="30" y1="280" x2="650" y2="280" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa">Get everything in writing -- deliverables, timelines, reporting, and ownership</text>
</svg>