<svg viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Faceted Navigation SEO Decision Tree</text>
  <rect x="240" y="48" width="200" height="36" rx="6" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <text x="340" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Filter Combination</text>
  <line x1="280" y1="84" x2="150" y2="115" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="84" x2="530" y2="115" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="50" y="115" width="200" height="36" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="150" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Has Search Volume?</text>
  <rect x="430" y="115" width="200" height="36" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="530" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">No Search Volume</text>
  <line x1="100" y1="151" x2="100" y2="180" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="200" y1="151" x2="200" y2="180" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="530" y1="151" x2="530" y2="180" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="20" y="180" width="160" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="100" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Index</text>
  <text x="100" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Unique title + content</text>
  <rect x="200" y="180" width="160" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="280" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Canonical</text>
  <text x="280" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Point to parent category</text>
  <rect x="440" y="180" width="180" height="50" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="530" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Noindex or Block</text>
  <text x="530" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">robots.txt or noindex tag</text>
  <line x1="20" y1="258" x2="660" y2="258" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa">Only index filter combinations that match real search queries</text>
