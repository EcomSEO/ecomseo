    <text x="15" y="40" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Use descriptive anchor text ("women's running shoes" not "click here")</text>
    <text x="15" y="56" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Every product needs 5+ internal links -- audit pages with zero links beyond category grid</text>
