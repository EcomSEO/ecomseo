<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Cross-Channel Content Reuse Strategy</text>
  <!-- Central asset -->
  <rect x="250" y="55" width="200" height="55" rx="8" stroke="#a78bfa" stroke-width="2"/>
  <text x="350" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">Shared Content Asset</text>
  <text x="350" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Buying Guide / Comparison</text>
  <!-- Channel branches -->
  <line x1="250" y1="110" x2="110" y2="155" stroke="#60a5fa" stroke-width="1"/>
  <line x1="310" y1="110" x2="240" y2="155" stroke="#4ade80" stroke-width="1"/>
  <line x1="390" y1="110" x2="390" y2="155" stroke="#f97316" stroke-width="1"/>
  <line x1="450" y1="110" x2="520" y2="155" stroke="#ef4444" stroke-width="1"/>
  <line x1="450" y1="110" x2="630" y2="155" stroke="#a78bfa" stroke-width="1"/>
  <rect x="40" y="158" width="140" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="110" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">SEO</text>
  <text x="110" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Full guide ranks</text>
  <rect x="175" y="158" width="130" height="50" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="240" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Email</text>
  <text x="240" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Segment + send</text>
  <rect x="320" y="158" width="140" height="50" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="390" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Social</text>
  <text x="390" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Excerpts + carousels</text>
  <rect x="465" y="158" width="130" height="50" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="530" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">PPC</text>
  <text x="530" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Landing page</text>
  <rect x="570" y="158" width="120" height="50" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="630" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">YouTube</text>
  <text x="630" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Video script</text>
  <!-- Compound effects -->
  <line x1="350" y1="218" x2="350" y2="250" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr5)"/>
  <rect x="180" y="255" width="340" height="45" rx="8" stroke="#4ade80" stroke-width="2"/>
  <text x="350" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">Cross-Channel Compounding</text>
  <text x="350" y="293" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Build once, distribute everywhere, let effects multiply</text>
  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4ade80"/>
    </marker>
  </defs>
</svg>