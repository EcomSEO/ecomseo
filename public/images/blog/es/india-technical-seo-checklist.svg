<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">India-Specific Technical SEO Checklist</text>
  <!-- Categories -->
  <rect x="30" y="50" width="200" height="100" rx="8" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Performance</text>
  <text x="45" y="92" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Pages &lt;1.5MB total weight</text>
  <text x="45" y="110" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Test on $100-200 devices</text>
  <text x="45" y="128" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Optimize for 3G/4G networks</text>
  <text x="45" y="144" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">6s load on Redmi vs 2s on iPhone</text>
  <rect x="250" y="50" width="200" height="100" rx="8" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="350" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Multilingual</text>
  <text x="265" y="92" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Hreflang for Hindi, Tamil, etc.</text>
  <text x="265" y="110" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Subfolder structure (/hi/, /ta/)</text>
  <text x="265" y="128" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Translated meta + schema</text>
  <text x="265" y="144" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">90% new users search regionally</text>
  <rect x="470" y="50" width="200" height="100" rx="8" stroke="#4ade80" stroke-width="1.5"/>
  <text x="570" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Structured Data</text>
  <text x="485" y="92" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Product + price in INR</text>
  <text x="485" y="110" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">COD as payment method</text>
  <text x="485" y="128" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">UPI + EMI availability</text>
  <text x="485" y="144" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Mention delivery speed in schema</text>
  <!-- CDN + hosting -->
  <rect x="100" y="175" width="500" height="55" rx="8" stroke="#f97316" stroke-width="1.5"/>
  <text x="350" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Infrastructure</text>
  <text x="200" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">CDN with India PoPs</text>
  <text x="350" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Server in Mumbai/Singapore</text>
  <text x="510" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">AMP for key pages</text>
  <!-- Key insight -->
  <text x="350" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa">Hindi queries grown 100%+ in 3 years -- most sites are still English-only</text>
  <text x="350" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.7">Even basic Hindi category pages create a major competitive advantage</text>
</svg>