  <text x="340" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">SAP Commerce  |  Oracle  |  Custom ERP-integrated  |  Magento Enterprise</text>
  <line x1="20" y1="275" x2="660" y2="275" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa">Each challenge requires platform-level solutions, not just SEO patches</text>
