<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Ecommerce Content Types by Revenue Impact</text>
  <!-- Bar chart -->
  <text x="160" y="70" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Buying Guides</text>
  <rect x="170" y="56" width="400" height="22" rx="4" fill="#a78bfa" opacity="0.8"/>
  <text x="580" y="72" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa">2-5x revenue per visit</text>
  <text x="160" y="108" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Comparison Pages</text>
  <rect x="170" y="94" width="340" height="22" rx="4" fill="#60a5fa" opacity="0.8"/>
  <text x="520" y="110" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">High-intent buyers</text>
  <text x="160" y="146" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Category Content</text>
  <rect x="170" y="132" width="280" height="22" rx="4" fill="#4ade80" opacity="0.8"/>
  <text x="460" y="148" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">9 of 12 pages improved</text>
  <text x="160" y="184" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">How-To / Care</text>
  <rect x="170" y="170" width="200" height="22" rx="4" fill="#f97316" opacity="0.8"/>
  <text x="380" y="186" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Top-of-funnel + links</text>
  <text x="160" y="222" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Blog Posts</text>
  <rect x="170" y="208" width="120" height="22" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="300" y="224" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">Lowest direct revenue</text>
  <!-- Legend -->
  <text x="350" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.7">Bar length represents relative revenue impact per organic visit</text>
  <text x="350" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Tip: Adding 200-400 words to category pages improved rankings for 75% of pages within 6 weeks</text>
</svg>