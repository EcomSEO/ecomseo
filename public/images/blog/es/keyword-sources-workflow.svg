<svg viewBox="0 0 700 370" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Ecommerce Keyword Sources Workflow</text>
  <!-- Step boxes -->
  <rect x="30" y="55" width="130" height="70" rx="8" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="95" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">1. Own Data</text>
  <text x="95" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Search Console</text>
  <text x="95" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Site Search Logs</text>
  <rect x="190" y="55" width="130" height="70" rx="8" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="255" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">2. Marketplace</text>
  <text x="255" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Amazon Autocomplete</text>
  <text x="255" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Google Shopping</text>
  <rect x="350" y="55" width="130" height="70" rx="8" stroke="#4ade80" stroke-width="1.5"/>
  <text x="415" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">3. Competitors</text>
  <text x="415" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Category URLs</text>
  <text x="415" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Meta Titles &amp; H1s</text>
  <rect x="510" y="55" width="140" height="70" rx="8" stroke="#f97316" stroke-width="1.5"/>
  <text x="580" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">4. Tool Discovery</text>
  <text x="580" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Ahrefs / SEMrush</text>
  <text x="580" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Helium 10</text>
  <!-- Arrows -->
  <line x1="160" y1="90" x2="188" y2="90" stroke="#e2e8f0" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="90" x2="348" y2="90" stroke="#e2e8f0" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="90" x2="508" y2="90" stroke="#e2e8f0" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Validation funnel -->
  <line x1="350" y1="130" x2="350" y2="160" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="165" width="300" height="50" rx="8" stroke="#a78bfa" stroke-width="2"/>
  <text x="350" y="187" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">Validate Intent + Volume</text>
  <text x="350" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Filter by buyer intent, check search volume, confirm CPC</text>
  <!-- Output -->
  <line x1="350" y1="215" x2="350" y2="245" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="250" width="300" height="50" rx="8" stroke="#4ade80" stroke-width="2"/>
  <text x="350" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">Map to Pages</text>
  <text x="350" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Assign each keyword to category, product, or blog page</text>
  <!-- Stats -->
  <text x="100" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">127 quick wins found</text>
  <text x="350" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">500-2,000 keywords per store</text>
  <text x="580" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">43 moved to page 1 in 2 months</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e2e8f0"/>
    </marker>
  </defs>
</svg>