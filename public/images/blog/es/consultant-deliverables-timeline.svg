<svg viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">What Good SEO Consultants Deliver</text>
  <!-- Timeline -->
  <line x1="60" y1="70" x2="640" y2="70" stroke="#e2e8f0" stroke-width="1" opacity="0.3"/>
  <!-- Phase 1: Audit -->
  <circle cx="120" cy="70" r="8" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <text x="120" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa">Week 1-2</text>
  <rect x="50" y="90" width="140" height="65" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="120" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Audit</text>
  <text x="120" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">15-30 page report</text>
  <text x="120" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Prioritized action items</text>
  <!-- Phase 2: Strategy -->
  <circle cx="290" cy="70" r="8" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <text x="290" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">Week 3-4</text>
  <rect x="220" y="90" width="140" height="65" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="290" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Strategy</text>
  <text x="290" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">6-12 month roadmap</text>
  <text x="290" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Realistic expectations</text>
  <!-- Phase 3: Ongoing -->
  <circle cx="460" cy="70" r="8" stroke="#4ade80" stroke-width="2" fill="none"/>
  <text x="460" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Monthly</text>
  <rect x="380" y="90" width="160" height="65" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="460" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Execution</text>
  <text x="460" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Technical fixes, content briefs</text>
  <text x="460" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Link building, reporting</text>
  <!-- Key differentiator -->
  <rect x="80" y="185" width="540" height="55" rx="8" stroke="#f97316" stroke-width="1.5"/>
  <text x="350" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">Good vs Mediocre: Proactivity</text>
  <text x="350" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Spots problems before they become emergencies. Finds opportunities you did not know existed.</text>
  <!-- Example -->
  <text x="350" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Example: Caught a Shopify theme update that removed structured data within 2 days</text>
  <text x="350" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.7">-- before it affected rankings</text>
</svg>