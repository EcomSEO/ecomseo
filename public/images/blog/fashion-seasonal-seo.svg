<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Fashion SEO: Seasonal Page Strategy</text>
  <!-- Timeline -->
  <line x1="60" y1="80" x2="620" y2="80" stroke="#334155" stroke-width="1.5"/>
  <!-- Wrong approach -->
  <text x="60" y="60" fill="#ef4444" font-size="11" font-weight="bold">Wrong: Delete + Recreate Each Year</text>
  <rect x="80" y="90" width="100" height="24" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="130" y="106" text-anchor="middle" fill="#ef4444" font-size="8">SS 2024</text>
  <text x="190" y="106" fill="#ef4444" font-size="12">X</text>
  <rect x="220" y="90" width="100" height="24" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="270" y="106" text-anchor="middle" fill="#ef4444" font-size="8">SS 2025</text>
  <text x="330" y="106" fill="#ef4444" font-size="12">X</text>
  <rect x="360" y="90" width="100" height="24" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="410" y="106" text-anchor="middle" fill="#ef4444" font-size="8">SS 2026</text>
  <text x="480" y="106" fill="#94a3b8" font-size="8">Start from zero each time</text>
  <!-- Authority graph wrong -->
  <polyline points="80,150 130,138 160,130 180,140 220,150 270,138 300,130 320,140 360,150 410,138 440,130" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.6"/>
  <text x="460" y="136" fill="#ef4444" font-size="9">Authority resets</text>
  <!-- Right approach -->
  <text x="60" y="186" fill="#4ade80" font-size="11" font-weight="bold">Right: Keep URL, Update Content</text>
  <rect x="80" y="196" width="540" height="24" rx="4" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="130" y="212" text-anchor="middle" fill="#e2e8f0" font-size="8">2024</text>
  <text x="270" y="212" text-anchor="middle" fill="#e2e8f0" font-size="8">2025</text>
  <text x="410" y="212" text-anchor="middle" fill="#e2e8f0" font-size="8">2026</text>
  <text x="530" y="212" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="bold">/summer-dresses</text>
  <!-- Authority graph right -->
  <polyline points="80,250 130,244 180,236 230,230 280,224 330,218 380,212 430,206 480,200 530,195 580,190" stroke="#4ade80" stroke-width="1.5"/>
  <text x="592" y="194" fill="#4ade80" font-size="9">Authority grows</text>
  <!-- Dots -->
  <circle cx="180" cy="236" r="3" fill="#4ade80"/>
  <circle cx="330" cy="218" r="3" fill="#4ade80"/>
  <circle cx="480" cy="200" r="3" fill="#4ade80"/>
</svg>