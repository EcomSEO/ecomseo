<svg viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Technical SEO Impact Funnel</text>
  <rect x="140" y="55" width="400" height="38" rx="6" stroke="#a78bfa" stroke-width="2" fill="none"/>
  <text x="340" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Crawlability -- Can Google find your pages?</text>
  <rect x="170" y="105" width="340" height="38" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="340" y="129" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Indexability -- Does Google keep them?</text>
  <rect x="200" y="155" width="280" height="38" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="340" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Renderability -- Can it see the content?</text>
  <rect x="230" y="205" width="220" height="38" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="340" y="229" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Rankability -- Does it rank well?</text>
  <text x="580" y="75" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">robots.txt, sitemaps</text>
  <text x="545" y="125" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">canonicals, noindex</text>
  <text x="510" y="175" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">SSR, JS rendering</text>
  <text x="478" y="225" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">speed, schema</text>
  <line x1="20" y1="265" x2="660" y2="265" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa">Fix issues from the top of the funnel down -- each layer depends on the one above</text>
</svg>