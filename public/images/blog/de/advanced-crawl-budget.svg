<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Crawl Budget Distribution: Before vs After Optimization</text>
  <!-- Before -->
  <text x="170" y="56" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">Before</text>
  <rect x="40" y="68" width="260" height="28" rx="6" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="68" width="161" height="28" rx="6" fill="#ef4444" opacity="0.7"/>
  <text x="120" y="86" text-anchor="middle" fill="#e2e8f0" font-size="10">Faceted Nav 62%</text>
  <rect x="201" y="68" width="60" height="28" rx="0" fill="#60a5fa" opacity="0.7"/>
  <text x="231" y="86" text-anchor="middle" fill="#e2e8f0" font-size="10">Products 23%</text>
  <rect x="261" y="68" width="39" height="28" rx="6" fill="#334155"/>
  <text x="280" y="86" text-anchor="middle" fill="#94a3b8" font-size="10">Other 15%</text>
  <!-- After -->
  <text x="170" y="126" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">After</text>
  <rect x="40" y="138" width="260" height="28" rx="6" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="138" width="185" height="28" rx="6" fill="#4ade80" opacity="0.7"/>
  <text x="132" y="156" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold">Products 71%</text>
  <rect x="225" y="138" width="36" height="28" rx="0" fill="#f97316" opacity="0.6"/>
  <text x="243" y="156" text-anchor="middle" fill="#e2e8f0" font-size="9">Nav 14%</text>
  <rect x="261" y="138" width="39" height="28" rx="6" fill="#334155"/>
  <text x="280" y="156" text-anchor="middle" fill="#94a3b8" font-size="10">Other 15%</text>
  <!-- Arrow -->
  <line x1="340" y1="82" x2="340" y2="152" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="340,158 336,150 344,150" fill="#a78bfa"/>
  <!-- Results panel -->
  <rect x="370" y="60" width="280" height="120" rx="10" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="510" y="84" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Results</text>
  <circle cx="398" cy="106" r="6" fill="#4ade80"/>
  <text x="414" y="110" fill="#e2e8f0" font-size="11">Product crawl rate: 23% -> 71%</text>
  <circle cx="398" cy="132" r="6" fill="#60a5fa"/>
  <text x="414" y="136" fill="#e2e8f0" font-size="11">Indexing time: 14 days -> 2 days</text>
  <circle cx="398" cy="158" r="6" fill="#f97316"/>
  <text x="414" y="162" fill="#e2e8f0" font-size="11">Wasted crawl budget: -48%</text>
  <!-- Topical authority hub-spoke -->
  <text x="340" y="210" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">Hub-and-Spoke Topical Authority Model</text>
  <circle cx="340" cy="260" r="26" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="257" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold">Pillar</text>
  <text x="340" y="268" text-anchor="middle" fill="#e2e8f0" font-size="8">Page</text>
  <!-- Spokes -->
  <line x1="314" y1="260" x2="190" y2="240" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="174" cy="236" r="18" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1"/>
  <text x="174" y="239" text-anchor="middle" fill="#e2e8f0" font-size="8">Guide</text>
  <line x1="316" y1="248" x2="220" y2="280" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="206" cy="284" r="18" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1"/>
  <text x="206" y="287" text-anchor="middle" fill="#e2e8f0" font-size="8">Review</text>
  <line x1="366" y1="260" x2="490" y2="240" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="506" cy="236" r="18" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1"/>
  <text x="506" y="239" text-anchor="middle" fill="#e2e8f0" font-size="8">Tutorial</text>
  <line x1="364" y1="248" x2="460" y2="280" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="476" cy="284" r="18" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1"/>
  <text x="476" y="287" text-anchor="middle" fill="#e2e8f0" font-size="8">Compare</text>
  <line x1="340" y1="234" x2="340" y2="224" stroke="#4ade80" stroke-width="1"/>
  <circle cx="340" cy="216" r="4" fill="#4ade80"/>
  <!-- Product links -->
  <line x1="158" y1="242" x2="110" y2="256" stroke="#4ade80" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="80" y="250" width="44" height="16" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="0.8"/>
  <text x="102" y="261" text-anchor="middle" fill="#4ade80" font-size="7">Product</text>
  <line x1="520" y1="242" x2="572" y2="256" stroke="#4ade80" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="556" y="250" width="44" height="16" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="0.8"/>
  <text x="578" y="261" text-anchor="middle" fill="#4ade80" font-size="7">Product</text>
</svg>