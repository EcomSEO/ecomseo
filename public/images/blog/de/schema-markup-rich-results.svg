<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Product Schema Markup for Rich Results</text>
  <!-- Without schema -->
  <rect x="30" y="50" width="290" height="120" rx="8" stroke="#ef4444" stroke-width="1.5"/>
  <text x="175" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Without Schema</text>
  <text x="50" y="100" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa">Running Shoes - MyStore.com</text>
  <text x="50" y="118" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">mystore.com/products/running-shoes</text>
  <text x="50" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.6">Buy our great running shoes. Available in...</text>
  <text x="175" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">Plain blue link -- lower CTR</text>
  <!-- With schema -->
  <rect x="380" y="50" width="290" height="120" rx="8" stroke="#4ade80" stroke-width="1.5"/>
  <text x="525" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">With Schema</text>
  <text x="400" y="100" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa">Running Shoes - MyStore.com</text>
  <text x="400" y="115" font-family="Arial,sans-serif" font-size="10" fill="#f97316">4.5 stars (234 reviews) | $89.99 | In Stock</text>
  <text x="400" y="130" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">mystore.com/products/running-shoes</text>
  <text x="400" y="145" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" opacity="0.6">Buy our great running shoes. Available in...</text>
  <text x="525" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Rich result -- 58% of clicks</text>
  <!-- Required fields -->
  <text x="350" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">Required Product Schema Fields</text>
  <rect x="40" y="215" width="100" height="30" rx="4" stroke="#a78bfa" stroke-width="1"/>
  <text x="90" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">name</text>
  <rect x="150" y="215" width="100" height="30" rx="4" stroke="#a78bfa" stroke-width="1"/>
  <text x="200" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">image</text>
  <rect x="260" y="215" width="100" height="30" rx="4" stroke="#a78bfa" stroke-width="1"/>
  <text x="310" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">description</text>
  <rect x="370" y="215" width="100" height="30" rx="4" stroke="#a78bfa" stroke-width="1"/>
  <text x="420" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">brand + sku</text>
  <rect x="480" y="215" width="100" height="30" rx="4" stroke="#60a5fa" stroke-width="1"/>
  <text x="530" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">offers (price)</text>
  <rect x="590" y="215" width="100" height="30" rx="4" stroke="#60a5fa" stroke-width="1"/>
  <text x="640" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">rating</text>
  <text x="350" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Stale schema (showing in-stock when sold out) can trigger Google manual actions</text>
</svg>