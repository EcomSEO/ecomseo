<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="Arial,sans-serif">
  <text x="340" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">How to Calculate Ecommerce SEO ROI</text>
  <!-- 4-step formula -->
  <rect x="20" y="52" width="150" height="72" rx="8" stroke="#60a5fa" stroke-width="2"/>
  <text x="95" y="72" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">Step 1</text>
  <text x="95" y="88" text-anchor="middle" fill="#e2e8f0" font-size="9">Organic Revenue</text>
  <text x="95" y="104" text-anchor="middle" fill="#e2e8f0" font-size="8">GA4 > Acquisition ></text>
  <text x="95" y="116" text-anchor="middle" fill="#e2e8f0" font-size="8">Organic Search</text>
  <rect x="185" y="52" width="150" height="72" rx="8" stroke="#4ade80" stroke-width="2"/>
  <text x="260" y="72" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Step 2</text>
  <text x="260" y="88" text-anchor="middle" fill="#e2e8f0" font-size="9">Traffic Value</text>
  <text x="260" y="104" text-anchor="middle" fill="#e2e8f0" font-size="8">Equivalent ad cost</text>
  <text x="260" y="116" text-anchor="middle" fill="#e2e8f0" font-size="8">from Ahrefs/Semrush</text>
  <rect x="350" y="52" width="150" height="72" rx="8" stroke="#f97316" stroke-width="2"/>
  <text x="425" y="72" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">Step 3</text>
  <text x="425" y="88" text-anchor="middle" fill="#e2e8f0" font-size="9">SEO Investment</text>
  <text x="425" y="104" text-anchor="middle" fill="#e2e8f0" font-size="8">Agency + team + content</text>
  <text x="425" y="116" text-anchor="middle" fill="#e2e8f0" font-size="8">+ tools monthly total</text>
  <rect x="515" y="52" width="150" height="72" rx="8" stroke="#a78bfa" stroke-width="2"/>
  <text x="590" y="72" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">Step 4</text>
  <text x="590" y="88" text-anchor="middle" fill="#e2e8f0" font-size="9">Calculate ROI</text>
  <text x="590" y="104" text-anchor="middle" fill="#e2e8f0" font-size="8">(Revenue - Cost)</text>
  <text x="590" y="116" text-anchor="middle" fill="#e2e8f0" font-size="8">/ Cost x 100</text>
  <!-- Example calculation -->
  <text x="340" y="152" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Example Calculation</text>
  <rect x="80" y="164" width="520" height="56" rx="8" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="184" text-anchor="middle" fill="#e2e8f0" font-size="10">Monthly organic revenue: $120,000  |  Monthly SEO cost: $8,000</text>
  <text x="340" y="204" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">ROI = ($120,000 - $8,000) / $8,000 x 100 = 1,400%</text>
  <!-- Timeline -->
  <text x="340" y="240" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">Expected Timeline</text>
  <text x="120" y="262" text-anchor="middle" fill="#ef4444" font-size="9">Months 1-8: ROI negative</text>
  <text x="120" y="278" text-anchor="middle" fill="#ef4444" font-size="8">(Normal -- front-loaded cost)</text>
  <text x="340" y="262" text-anchor="middle" fill="#f97316" font-size="9">Months 9-12: Break even</text>
  <text x="340" y="278" text-anchor="middle" fill="#f97316" font-size="8">(Rankings gaining traction)</text>
  <text x="560" y="262" text-anchor="middle" fill="#4ade80" font-size="9">Year 2+: Compounding returns</text>
  <text x="560" y="278" text-anchor="middle" fill="#4ade80" font-size="8">(Effective CPC keeps dropping)</text>
</svg>