    <text x="22" y="75" font-family="Arial,sans-serif" font-size="10" fill="#f472b6">x</text>
    <text x="38" y="75" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Hundreds of links per month</text>
    <text x="22" y="95" font-family="Arial,sans-serif" font-size="10" fill="#f472b6">x</text>
    <text x="38" y="95" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">No audit before strategy</text>
    <text x="22" y="115" font-family="Arial,sans-serif" font-size="10" fill="#f472b6">x</text>
    <text x="38" y="115" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Long lock-in contracts</text>
    <text x="22" y="135" font-family="Arial,sans-serif" font-size="10" fill="#f472b6">x</text>
    <text x="38" y="135" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">No transparent reporting</text>
