    <text x="22" y="75" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+</text>
    <text x="38" y="75" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Quality-focused link strategy</text>
    <text x="22" y="95" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+</text>
