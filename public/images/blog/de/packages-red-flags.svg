    <text x="22" y="115" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+</text>
    <text x="38" y="115" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Month-to-month or short term</text>
    <text x="22" y="135" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+</text>
    <text x="38" y="135" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Full access to all work done</text>
    <text x="22" y="155" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">+</text>
