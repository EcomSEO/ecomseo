  <line x1="20" y1="275" x2="660" y2="275" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa">If a package has more red flags than green, keep looking</text>
