<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Core Web Vitals Thresholds for Ecommerce</text>
  <g transform="translate(30,55)">
    <rect x="0" y="0" width="190" height="170" rx="8" stroke="#4ade80" stroke-width="2" fill="none"/>
    <text x="95" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">LCP</text>
    <text x="95" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Largest Contentful Paint</text>
    <line x1="20" y1="65" x2="170" y2="65" stroke="#4ade80" stroke-width="1" stroke-dasharray="4"/>
    <text x="95" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#4ade80">Good: under 2.5s</text>
    <text x="95" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f97316">Needs work: 2.5-4s</text>
    <text x="95" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f472b6">Poor: over 4s</text>
    <text x="95" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Hero image, product photo</text>
  </g>
  <g transform="translate(245,55)">
    <rect x="0" y="0" width="190" height="170" rx="8" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <text x="95" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">INP</text>
    <text x="95" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Interaction to Next Paint</text>
    <line x1="20" y1="65" x2="170" y2="65" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4"/>
    <text x="95" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#4ade80">Good: under 200ms</text>
    <text x="95" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f97316">Needs work: 200-500ms</text>
    <text x="95" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f472b6">Poor: over 500ms</text>
    <text x="95" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Add to cart, filter clicks</text>
  </g>
  <g transform="translate(460,55)">
    <rect x="0" y="0" width="190" height="170" rx="8" stroke="#f97316" stroke-width="2" fill="none"/>
    <text x="95" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">CLS</text>
    <text x="95" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Cumulative Layout Shift</text>
    <line x1="20" y1="65" x2="170" y2="65" stroke="#f97316" stroke-width="1" stroke-dasharray="4"/>
    <text x="95" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#4ade80">Good: under 0.1</text>
    <text x="95" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f97316">Needs work: 0.1-0.25</text>
    <text x="95" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f472b6">Poor: over 0.25</text>
    <text x="95" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Lazy images, ad slots</text>
  </g>
  <line x1="20" y1="252" x2="660" y2="252" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa">Ecommerce sites typically fail INP due to heavy JS on product and category pages</text>
</svg>