<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">SEO Pricing Models Compared</text>
  <!-- Monthly retainer -->
  <rect x="30" y="55" width="190" height="230" rx="10" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="125" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a78bfa">Monthly Retainer</text>
  <text x="125" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Predictable costs</text>
  <text x="125" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Ongoing optimization</text>
  <text x="125" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Strategic partnership</text>
  <text x="125" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Best for:</text>
  <text x="125" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Growing stores needing</text>
  <text x="125" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">consistent improvement</text>
  <text x="125" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">$1.5K-$15K/mo</text>
  <!-- Project-based -->
  <rect x="245" y="55" width="190" height="230" rx="10" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="340" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#60a5fa">Project-Based</text>
  <text x="340" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Fixed scope + price</text>
  <text x="340" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Clear deliverables</text>
  <text x="340" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">One-time engagement</text>
  <text x="340" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Best for:</text>
  <text x="340" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Audits, migrations,</text>
  <text x="340" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">specific problems</text>
  <text x="340" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">$3K-$30K total</text>
  <!-- Performance-based -->
  <rect x="460" y="55" width="190" height="230" rx="10" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.5"/>
  <text x="555" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#f97316">Performance</text>
  <text x="555" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Pay for results</text>
  <text x="555" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Aligned incentives</text>
  <text x="555" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Variable costs</text>
  <text x="555" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Best for:</text>
  <text x="555" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Established stores</text>
  <text x="555" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">with clear baselines</text>
  <text x="555" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">% of revenue lift</text>
</svg>