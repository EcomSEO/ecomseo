<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Purple background -->
  <rect width="400" height="400" rx="16" fill="#4B1E8E"/>
  <!-- Purple diamond shape -->
  <path d="M140 380 L200 280 L320 280 L260 380 Z" fill="#6B3FA0" opacity="0.6"/>
  <!-- Semrush icon (flame/rocket) -->
  <g transform="translate(145, 30)">
    <!-- Orange flame icon -->
    <circle cx="55" cy="32" r="24" fill="none"/>
    <path d="M44 52 C44 52 38 40 42 30 C46 20 55 14 55 14 C55 14 52 24 56 30 C60 36 66 36 66 36 C66 36 62 44 55 48 C48 52 44 52 44 52Z" fill="#FF642D"/>
    <path d="M50 52 C50 52 48 46 50 40 C52 34 55 30 55 30 C55 30 58 34 60 40 C62 46 60 52 60 52 C60 52 56 50 55 48 C54 50 50 52 50 52Z" fill="#FFB74D"/>
  </g>
  <!-- SEMRUSH text -->
  <text x="200" y="100" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="3">SEMRUSH</text>
  <!-- Certified text -->
  <text x="200" y="185" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="42" font-weight="400" fill="white" font-style="italic">Certified</text>
  <!-- Agency text -->
  <text x="200" y="260" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="white">Agency</text>
  <!-- Partner text -->
  <text x="200" y="330" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="white">Partner</text>
</svg>