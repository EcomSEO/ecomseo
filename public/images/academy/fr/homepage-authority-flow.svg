<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Répartition des autorités sur la page d'accueil</text>

  <!-- External backlinks -->
  <rect x="40" y="50" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="100" y="68" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">Liens presse</text>
  <rect x="40" y="84" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="100" y="102" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">Liens partenaires</text>
  <rect x="40" y="118" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="100" y="136" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">Liens vers l'annuaire</text>

  <!-- Arrows to homepage -->
  <line x1="160" y1="64" x2="248" y2="100" stroke="#f97316" stroke-width="1"/>
  <line x1="160" y1="98" x2="248" y2="100" stroke="#f97316" stroke-width="1"/>
  <line x1="160" y1="132" x2="248" y2="105" stroke="#f97316" stroke-width="1"/>

  <!-- Homepage -->
  <rect x="250" y="78" width="180" height="50" rx="8" fill="#1e1e3a" stroke="#4ade80" stroke-width="2"/>
  <text x="340" y="100" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="12" font-weight="700">Page d'accueil</text>
  <text x="340" y="116" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Page de la plus haute autorité</text>

  <!-- Navigation links down -->
  <line x1="280" y1="128" x2="140" y2="180" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="310" y1="128" x2="280" y2="180" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="370" y1="128" x2="400" y2="180" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="400" y1="128" x2="540" y2="180" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Categories -->
  <rect x="70" y="180" width="140" height="32" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140" y="200" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Chaussures de course</text>

  <rect x="220" y="180" width="120" height="32" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="280" y="200" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Vêtements</text>

  <rect x="350" y="180" width="120" height="32" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="410" y="200" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Accessoires</text>

  <rect x="480" y="180" width="120" height="32" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="540" y="200" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Nouveautés</text>

  <!-- Authority percentage labels -->
  <text x="140" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">reçoit environ 20 % de capitaux propres</text>
  <text x="280" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">~20% de fonds propres</text>
  <text x="410" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">~15% de fonds propres</text>
  <text x="540" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">~15% de fonds propres</text>

  <!-- Right side: content structure -->
  <rect x="510" y="56" width="150" height="80" rx="5" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="585" y="72" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9" font-weight="600">Page d'accueil indispensable</text>
  <text x="585" y="86" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Descriptif H1</text>
  <text x="585" y="98" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Introduction de 100 à 200 mots</text>
  <text x="585" y="110" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Blocs de catégories avec liens</text>
  <text x="585" y="122" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Section de marque de 200 à 400 mots</text>

  <!-- Warning box -->
  <rect x="120" y="250" width="440" height="36" rx="5" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="266" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="600">Erreur courante : créer un lien vers 200 produits à partir de la page d'accueil</text>
  <text x="340" y="280" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">L’autorité est si mince qu’aucun lien n’a de poids significatif</text>

  <text x="340" y="310" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Gardez les liens de la page d'accueil concentrés sur vos 10 à 15 destinations internes les plus importantes</text>
</svg>