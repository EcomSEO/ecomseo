<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Le parcours d'apprentissage SEO du commerce électronique en 9 étapes</text>

  <!-- Timeline line -->
  <line x1="60" y1="60" x2="620" y2="60" stroke="#334155" stroke-width="2"/>

  <!-- Stage dots and labels - Row 1 (Stages 1-3) -->
  <circle cx="90" cy="60" r="14" fill="#1a1a2e" stroke="#4ade80" stroke-width="2"/>
  <text x="90" y="65" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="700">1</text>

  <circle cx="160" cy="60" r="14" fill="#1a1a2e" stroke="#4ade80" stroke-width="2"/>
  <text x="160" y="65" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="700">2</text>

  <circle cx="230" cy="60" r="14" fill="#1a1a2e" stroke="#4ade80" stroke-width="2"/>
  <text x="230" y="65" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="700">3</text>

  <!-- Stages 4-5 -->
  <circle cx="310" cy="60" r="14" fill="#1a1a2e" stroke="#60a5fa" stroke-width="2"/>
  <text x="310" y="65" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="700">4</text>

  <circle cx="380" cy="60" r="14" fill="#1a1a2e" stroke="#60a5fa" stroke-width="2"/>
  <text x="380" y="65" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="700">5</text>

  <!-- Stages 6-7 -->
  <circle cx="450" cy="60" r="14" fill="#1a1a2e" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="65" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="700">6</text>

  <circle cx="520" cy="60" r="14" fill="#1a1a2e" stroke="#f97316" stroke-width="2"/>
  <text x="520" y="65" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="700">7</text>

  <!-- Stages 8-9 -->
  <circle cx="570" cy="60" r="14" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="570" y="65" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="700">8</text>

  <circle cx="620" cy="60" r="14" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="620" y="65" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="700">9</text>

  <!-- Stage labels -->
  <text x="90" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Recherche</text>
  <text x="90" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">mécanique</text>

  <text x="160" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Installation</text>
  <text x="160" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">CGC + GA4</text>

  <text x="230" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">D'abord</text>
  <text x="230" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">audit</text>

  <text x="310" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Mot clé</text>
  <text x="310" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">recherche</text>

  <text x="380" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Sur la page</text>
  <text x="380" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">optimisation</text>

  <text x="450" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Technique</text>
  <text x="450" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Référencement</text>

  <text x="520" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Contenu</text>
  <text x="520" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">stratégie</text>

  <text x="570" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Lien</text>
  <text x="570" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">bâtiment</text>

  <text x="620" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Mesure</text>
  <text x="620" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">&amp;amp; répéter</text>

  <!-- Phase boxes below -->
  <rect x="50" y="120" width="210" height="60" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="155" y="140" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">Fondation (étapes 1 à 3)</text>
  <text x="155" y="156" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">4-6 semaines</text>
  <text x="155" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Comprendre la mécanique, mettre en place des outils, auditer</text>

  <rect x="275" y="120" width="140" height="60" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="345" y="140" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="600">Optimisation (4-5)</text>
  <text x="345" y="156" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">4-6 semaines</text>
  <text x="345" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mots-clés + sur la page</text>

  <rect x="430" y="120" width="140" height="60" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="500" y="140" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="11" font-weight="600">Mise à l'échelle (6-7)</text>
  <text x="500" y="156" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">2-3 mois</text>
  <text x="500" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Tech + contenu (parallèle)</text>

  <!-- Ongoing banner -->
  <rect x="50" y="200" width="580" height="36" rx="6" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="222" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="600">Étapes 8-9 : Création de liens + mesure (en continu, ne s'arrête jamais)</text>

  <!-- Timeline -->
  <line x1="60" y1="260" x2="620" y2="260" stroke="#334155" stroke-width="1"/>
  <text x="60" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mois 1</text>
  <text x="155" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mois 2-3</text>
  <text x="300" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mois 3-4</text>
  <text x="450" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mois 4-6</text>
  <text x="570" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mois 6+</text>

  <!-- Result expectation -->
  <text x="340" y="300" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Première croissance organique significative du trafic : 4 à 8 mois</text>
  <text x="340" y="316" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Les magasins établis peuvent voir des résultats dans 6 à 12 semaines pour des pages spécifiques</text>
  <text x="340" y="332" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Après 12 mois, la recherche organique devient généralement le canal marketing au retour sur investissement le plus élevé</text>
</svg>
