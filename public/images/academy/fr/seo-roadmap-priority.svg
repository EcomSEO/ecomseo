<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Prioriser par impact, et non par ordre de liste de contrôle</text>

  <!-- Decision tree -->
  <!-- Root question -->
  <rect x="210" y="44" width="260" height="36" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="66" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="600">Que montre votre audit ?</text>

  <!-- Branch lines -->
  <line x1="260" y1="80" x2="140" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="340" y1="80" x2="340" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="420" y1="80" x2="540" y2="110" stroke="#475569" stroke-width="1"/>

  <!-- Branch 1: Technical issues -->
  <rect x="40" y="110" width="200" height="60" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="132" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="600">40 % des pages renvoient 404 ?</text>
  <text x="140" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Résoudre les problèmes techniques en PREMIER</text>
  <text x="140" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">avant toute recherche de mots clés</text>

  <!-- Branch 2: Ranking page 2 -->
  <rect x="250" y="110" width="180" height="60" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="340" y="132" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Les pages sont classées à la page 2 ?</text>
  <text x="340" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Optimisation sur la page</text>
  <text x="340" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">déplace l'aiguille le plus rapidement</text>

  <!-- Branch 3: No content -->
  <rect x="440" y="110" width="200" height="60" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="540" y="132" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Pas de contenu de support ?</text>
  <text x="540" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Créer du contenu + des liens</text>
  <text x="540" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">pour la croissance de l'autorité</text>

  <!-- Bottom: common mistake -->
  <rect x="100" y="195" width="480" height="40" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="214" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="600">Erreur courante : accéder au contenu avant de résoudre les problèmes d'exploration/d'indexation</text>
  <text x="340" y="228" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Nous avons vu des équipes rédiger plus de 100 articles de blog alors que Google n'indexait pas leurs pages produits.</text>
</svg>
