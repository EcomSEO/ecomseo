<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Crawl Budget Allocation Analysis</text>
  <!-- Bar chart -->
  <text x="30" y="50" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Produits</text>
  <rect x="35" y="40" width="120" height="14" rx="2" fill="#4ade80" opacity="0.3"/>
  <rect x="35" y="40" width="120" height="14" rx="2" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="160" y="51" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">15% (should be 60%)</text>
  <text x="30" y="72" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Categories</text>
  <rect x="35" y="62" width="80" height="14" rx="2" fill="#60a5fa" opacity="0.3"/>
  <rect x="35" y="62" width="80" height="14" rx="2" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="120" y="73" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">10%</text>
  <text x="30" y="94" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Facets</text>
  <rect x="35" y="84" width="300" height="14" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="35" y="84" width="300" height="14" rx="2" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="340" y="95" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">60% WASTE</text>
  <text x="30" y="116" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Other</text>
  <rect x="35" y="106" width="100" height="14" rx="2" fill="#f97316" opacity="0.2"/>
  <rect x="35" y="106" width="100" height="14" rx="2" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="140" y="117" font-family="Arial,sans-serif" font-size="8" fill="#f97316">15% (search, cart, etc.)</text>
  <!-- Fix arrow -->
  <text x="200" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Fix: Block faceted URLs &#8594; Redirect budget to products</text>
  <!-- Target -->
  <rect x="80" y="160" width="240" height="28" rx="5" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Target: 60% products | 15% categories | 25% other</text>
</svg>