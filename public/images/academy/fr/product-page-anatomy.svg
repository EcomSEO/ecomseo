<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Anatomie d'une page produit optimisée</text>

  <!-- Page outline -->
  <rect x="160" y="38" width="360" height="320" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Breadcrumbs -->
  <text x="180" y="58" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Accueil &gt; Chaussures &gt; Course à pied &gt; Chaussures de trail running</text>
  <text x="530" y="58" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Schéma BreadcrumbList</text>

  <!-- H1 -->
  <rect x="180" y="64" width="320" height="24" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="190" y="80" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="700">H1 : Chaussures de course sur sentier – Imperméables, taille 10</text>

  <!-- Image + details layout -->
  <rect x="180" y="96" width="140" height="100" rx="4" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="250" y="150" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="10">Image du produit</text>
  <text x="250" y="164" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Texte alternatif descriptif</text>
  <text x="250" y="176" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Format WebP</text>

  <!-- Price + CTA -->
  <rect x="330" y="96" width="170" height="28" rx="4" fill="#1e1e3a" stroke="#4ade80" stroke-width="1"/>
  <text x="415" y="114" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">149,99 $ |  Ajouter au panier</text>

  <!-- Trust signals -->
  <text x="340" y="140" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Livraison gratuite |  Retours sous 30 jours |  En stock</text>

  <!-- Description -->
  <rect x="330" y="150" width="170" height="46" rx="4" fill="#1e1e3a" stroke="#f97316" stroke-width="1"/>
  <text x="340" y="166" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Description unique</text>
  <text x="340" y="180" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Les avantages d'abord, pas les fonctionnalités d'abord</text>
  <text x="340" y="190" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">100 à 600 mots en fonction du prix</text>

  <!-- Specifications -->
  <rect x="180" y="204" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#60a5fa" stroke-width="1"/>
  <text x="190" y="223" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2 : Spécifications</text>
  <text x="380" y="223" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Matériau, dimensions, poids</text>

  <!-- Reviews -->
  <rect x="180" y="240" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#4ade80" stroke-width="1"/>
  <text x="190" y="259" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2 : Avis (127)</text>
  <text x="380" y="259" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Schéma AggregateRating</text>

  <!-- Related Products -->
  <rect x="180" y="276" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1"/>
  <text x="190" y="295" fill="#a78bfa" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2 : Produits associés</text>
  <text x="380" y="295" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Opportunité de maillage interne</text>

  <!-- Schema badge -->
  <rect x="180" y="314" width="320" height="28" rx="4" fill="#1e1e3a" stroke="#f97316" stroke-width="1"/>
  <text x="340" y="332" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Schéma du produit JSON-LD (nom, prix, sku, disponibilité, avis)</text>

  <!-- Right-side labels -->
  <text x="540" y="80" fill="#a78bfa" font-family="Arial,sans-serif" font-size="7">H1 riche en mots clés</text>
  <text x="540" y="114" fill="#4ade80" font-family="Arial,sans-serif" font-size="7">Confiance + conversion</text>
  <text x="540" y="172" fill="#f97316" font-family="Arial,sans-serif" font-size="7">Pas une copie du fabricant</text>
  <text x="540" y="259" fill="#4ade80" font-family="Arial,sans-serif" font-size="7">+15-35 % de CTR grâce aux résultats enrichis</text>

  <text x="340" y="374" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Les pages ayant obtenu un score élevé sur tous les éléments génèrent 30 à 50 % de trafic organique en plus par produit</text>
</svg>