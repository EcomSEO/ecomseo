<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Explosion d'URL à facettes dans Magento</text>
  <!-- Base category -->
  <rect x="140" y="40" width="140" height="30" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">/chaussures.html</text>
  <!-- Attributes -->
  <text x="55" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Couleur (10)</text>
  <text x="155" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Taille (10)</text>
  <text x="260" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Marque (10)</text>
  <text x="365" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Prix ​​(5)</text>
  <!-- Lines from base to attributes -->
  <line x1="180" y1="70" x2="55" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="200" y1="70" x2="155" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="220" y1="70" x2="260" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="240" y1="70" x2="365" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <!-- Multiplication -->
  <text x="210" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">10 x 10 x 10 x 5 = 5 000 combinaisons d'URL</text>
  <text x="210" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">par page de catégorie unique</text>
  <!-- Solutions -->
  <rect x="20" y="158" width="175" height="40" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="107" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Meilleur : filtrage AJAX</text>
  <text x="107" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">L'URL reste /shoes.html</text>
  <rect x="225" y="158" width="175" height="40" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="312" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#f97316">Solution de secours : noindex + robots.txt</text>
  <text x="312" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Bloquer les paramètres de filtre de l'exploration</text>
  <!-- High-value exception -->
  <rect x="90" y="210" width="240" height="30" rx="6" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <text x="210" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Exception : créez des pages de destination dédiées aux combinaisons de filtres de grande valeur</text>
</svg>