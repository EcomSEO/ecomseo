<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Éléments essentiels du Web : cibles seuils</text>

  <!-- LCP -->
  <rect x="30" y="50" width="200" height="170" rx="10" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="130" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#60a5fa">PCL</text>
  <text x="130" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">La plus grande peinture de contenu</text>

  <!-- Good zone -->
  <rect x="50" y="104" width="160" height="28" rx="4" fill="#4ade80" opacity="0.15"/>
  <rect x="50" y="104" width="160" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="130" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">&amp;Lt ; 2,5 s Bon</text>

  <!-- Needs improvement -->
  <rect x="50" y="138" width="160" height="24" rx="4" fill="#f97316" opacity="0.1"/>
  <rect x="50" y="138" width="160" height="24" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="130" y="154" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">2,5 s - 4 s nécessite du travail</text>

  <!-- Poor -->
  <rect x="50" y="168" width="160" height="24" rx="4" fill="#ef4444" opacity="0.1"/>
  <rect x="50" y="168" width="160" height="24" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="130" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">&gt; 4s Mauvais</text>

  <text x="130" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Image de héros ou photo de produit</text>

  <!-- INP -->
  <rect x="250" y="50" width="180" height="170" rx="10" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="340" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">INP</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Interaction avec la peinture suivante</text>

  <rect x="270" y="104" width="140" height="28" rx="4" fill="#4ade80" opacity="0.15"/>
  <rect x="270" y="104" width="140" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="340" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">&amp;Lt ; 200 ms Bon</text>

  <rect x="270" y="138" width="140" height="24" rx="4" fill="#f97316" opacity="0.1"/>
  <rect x="270" y="138" width="140" height="24" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="154" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">200-500 ms nécessite du travail</text>

  <rect x="270" y="168" width="140" height="24" rx="4" fill="#ef4444" opacity="0.1"/>
  <rect x="270" y="168" width="140" height="24" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="340" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">&gt; 500 ms Mauvais</text>

  <text x="340" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Chaque pression, clic, frappe</text>

  <!-- CLS -->
  <rect x="450" y="50" width="200" height="170" rx="10" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="550" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">CLS</text>
  <text x="550" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Changement de disposition cumulatif</text>

  <rect x="470" y="104" width="160" height="28" rx="4" fill="#4ade80" opacity="0.15"/>
  <rect x="470" y="104" width="160" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="550" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">&amp;Lt ; 0,1 Bon</text>

  <rect x="470" y="138" width="160" height="24" rx="4" fill="#f97316" opacity="0.1"/>
  <rect x="470" y="138" width="160" height="24" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="550" y="154" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">0,1 - 0,25 Travaux nécessaires</text>

  <rect x="470" y="168" width="160" height="24" rx="4" fill="#ef4444" opacity="0.1"/>
  <rect x="470" y="168" width="160" height="24" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="550" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">&gt; 0,25 Mauvais</text>

  <text x="550" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Sauts de mise en page inattendus</text>

  <!-- Bottom note -->
  <text x="340" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Les trois métriques doivent réussir pour un bon signal d'expérience de page</text>
</svg>