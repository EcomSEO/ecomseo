<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Formules de balise de titre pour le commerce électronique</text>

  <!-- Product page formula -->
  <text x="40" y="56" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="700">Pages produits</text>
  <rect x="40" y="64" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="60" y="82" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Nom du produit</text>
  <text x="170" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="190" y="82" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Attribut clé</text>
  <text x="290" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="310" y="82" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Marque</text>
  <text x="360" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="380" y="82" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Nom du magasin</text>
  <text x="60" y="98" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Serviettes de bain en coton biologique Ensemble de 4 - Vert sauge | Brooklin</text>

  <!-- Category page formula -->
  <text x="40" y="130" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Pages de catégorie</text>
  <rect x="40" y="138" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="60" y="156" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Mot-clé de catégorie</text>
  <text x="195" y="156" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="215" y="156" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Qualificatif</text>
  <text x="285" y="156" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="305" y="156" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Nom du magasin</text>
  <text x="60" y="172" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Chaussures de course pour femmes - Meilleures marques, retours gratuits | FitGear</text>

  <!-- Homepage formula -->
  <text x="40" y="204" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Page d'accueil</text>
  <rect x="40" y="212" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="60" y="230" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Nom de la marque</text>
  <text x="155" y="230" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="175" y="230" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Mot clé principal</text>
  <text x="300" y="230" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="320" y="230" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Différenciateur</text>
  <text x="60" y="246" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Équipement de randonnée | Équipement de plein air et amp; Équipement de camping | Livraison gratuite à partir de 50 $</text>

  <!-- Character count guide -->
  <rect x="40" y="268" width="600" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="268" width="350" height="36" rx="6" fill="#4ade80" fill-opacity="0.06"/>
  <text x="215" y="288" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Zone de sécurité : 50 premiers caractères (toujours visibles)</text>
  <line x1="390" y1="268" x2="390" y2="304" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="490" y="288" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">50 à 60 caractères : peut être tronqué</text>

  <text x="340" y="316" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Mots-clés principaux à chargement initial dans les 50 premiers caractères pour un impact de classement maximal</text>
</svg>