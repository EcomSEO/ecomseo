<svg viewBox="0 0 420 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Séquence de suivi de 3 e-mails</text>
  <rect x="20" y="44" rx="8" width="110" height="70" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="75" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">E-mail 1</text>
  <text x="75" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Emplacement initial</text>
  <text x="75" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Valeur + demande claire</text>
  <text x="75" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">~5% de taux de réponse</text>
  <path d="M132 79 L152 79" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="142" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316">5-7j</text>
  <rect x="155" y="44" rx="8" width="110" height="70" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="210" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Suivi 1</text>
  <text x="210" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Bref, nouveau détail</text>
  <text x="210" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">1 à 3 phrases</text>
  <text x="210" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">+5-6% ajouté</text>
  <path d="M267 79 L287 79" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="277" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316">5-7j</text>
  <rect x="290" y="44" rx="8" width="110" height="70" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="345" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Suivi 2</text>
  <text x="345" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Changer d'angle</text>
  <text x="345" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Dernière tentative</text>
  <text x="345" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">+3-4% ajouté</text>
  <rect x="60" y="130" rx="6" width="300" height="38" stroke="#ef4444" stroke-width="1" stroke-dasharray="4" fill="none"/>
  <text x="210" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">Arrêtez-vous après 3 e-mails. Plus = gêne, pas persistance.</text>
  <text x="210" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Total : 8 à 15 % de taux de réponse pour une campagne bien ciblée</text>
  <defs>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </marker>
  </defs>
</svg>