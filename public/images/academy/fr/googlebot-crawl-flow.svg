  <text x="120" y="189" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Chaussures (15 sous-chats)</text>

  <rect x="260" y="170" width="160" height="30" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="340" y="189" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Vêtements (20 sous-chats)</text>

  <rect x="480" y="170" width="160" height="30" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="560" y="189" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Accessoires (10 sous-cats)</text>

  <!-- Crawl freq label -->
  <text x="120" y="210" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">exploré quotidiennement</text>
  <text x="340" y="210" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">exploré quotidiennement</text>
  <text x="560" y="210" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">exploré quotidiennement</text>

