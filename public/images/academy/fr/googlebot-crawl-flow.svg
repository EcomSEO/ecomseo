  <rect x="160" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="185" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>

  <rect x="250" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="275" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>
  <rect x="315" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="340" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>
  <rect x="380" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="405" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>

  <rect x="470" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="495" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>
  <rect x="535" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="560" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>
  <rect x="600" y="230" width="50" height="24" rx="3" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="625" y="246" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produit</text>

  <!-- Product freq label -->
  <text x="340" y="270" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="7">exploré toutes les 1 à 4 semaines (faible priorité)</text>

  <!-- Dots indicating more -->
  <text x="120" y="262" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="10">...</text>
  <text x="340" y="262" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="10">...</text>
  <text x="560" y="262" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="10">...</text>

  <!-- Crawl budget bar -->
  <rect x="80" y="295" width="520" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="295" width="130" height="28" rx="6" fill="#4ade80" fill-opacity="0.15"/>
  <text x="145" y="313" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Utilisé: 25%</text>
  <text x="400" y="313" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="9">Gaspillage en filtres, pagination, URL de session : 75 %</text>

  <!-- Legend -->
  <rect x="140" y="340" width="10" height="10" rx="2" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="156" y="349" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Haute priorité</text>

  <rect x="270" y="340" width="10" height="10" rx="2" fill="none" stroke="#60a5fa" stroke-width="1"/>
  <text x="286" y="349" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Priorité moyenne</text>

  <rect x="410" y="340" width="10" height="10" rx="2" fill="none" stroke="#f97316" stroke-width="1"/>
  <text x="426" y="349" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Faible priorité</text>

  <text x="340" y="372" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Budget d'exploration typique : 5 000 à 15 000 pages/jour pour les magasins de taille moyenne</text>
