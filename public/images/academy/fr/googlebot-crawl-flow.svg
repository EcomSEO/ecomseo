<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Comment Googlebot explore votre boutique</text>

  <!-- Googlebot -->
  <rect x="270" y="40" width="140" height="36" rx="8" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="63" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="12" font-weight="600">Googlebot</text>

  <!-- Arrow -->
  <line x1="340" y1="76" x2="340" y2="98" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="335,94 340,104 345,94" fill="#a78bfa"/>

  <!-- Homepage -->
  <rect x="265" y="104" width="150" height="32" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="125" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="600">Page d'accueil</text>
  <text x="340" y="125" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="7" dy="11">exploré plusieurs fois/jour</text>

  <!-- Lines to categories -->
  <line x1="290" y1="136" x2="120" y2="170" stroke="#475569" stroke-width="1"/>
  <line x1="340" y1="136" x2="340" y2="170" stroke="#475569" stroke-width="1"/>
  <line x1="390" y1="136" x2="560" y2="170" stroke="#475569" stroke-width="1"/>

