<svg viewBox="0 0 480 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Plan de contenu trimestriel par catégorie</text>
  <!-- 4 content blocks -->
  <rect x="20" y="45" width="100" height="70" rx="8" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="70" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">1x</text>
  <text x="70" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Guide d'achat</text>
  <text x="70" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">(Format long)</text>
  <rect x="140" y="45" width="100" height="70" rx="8" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="190" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">1x</text>
  <text x="190" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Comparaison</text>
  <text x="190" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">(X contre Y)</text>
  <rect x="260" y="45" width="100" height="70" rx="8" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="310" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">2x</text>
  <text x="310" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Articles de blog</text>
  <text x="310" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">(Questions et réponses à longue traîne)</text>
  <rect x="380" y="45" width="80" height="70" rx="8" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="420" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">= 4</text>
  <text x="420" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Pièces /</text>
  <text x="420" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Quart</text>
  <!-- Bottom summary -->
  <rect x="60" y="140" width="360" height="55" rx="8" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
  <text x="240" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">10 catégories x 4 pièces = 40 par trimestre (~3/semaine)</text>
  <text x="240" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Publiez 4 à 6 semaines avant les pics saisonniers</text>
</svg>
