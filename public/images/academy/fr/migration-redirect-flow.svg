  <!-- Warning box -->
  <rect x="30" y="185" width="168" height="42" rx="6" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="114" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#ef4444">Évitez les chaînes de redirection</text>
