<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Fonctionnalités de référencement intégrées de BigCommerce</text>
  <!-- Grid of features -->
  <!-- Row 1 -->
  <rect x="25" y="42" width="115" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="82" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Balises méta</text>
  <text x="82" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Titre, description, slug</text>
  <text x="82" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">par page dans l'administration</text>

  <rect x="152" y="42" width="115" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Plan du site XML</text>
  <text x="210" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Généré automatiquement</text>
  <text x="210" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">contrôle par page</text>

  <rect x="279" y="42" width="115" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="337" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Réseau de diffusion de contenu Akamai</text>
  <text x="337" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Conversion automatique WebP</text>
  <text x="337" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">images réactives</text>

  <!-- Row 2 -->
  <rect x="25" y="104" width="115" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="82" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Schéma du produit</text>
  <text x="82" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">JSON-LD avec prix,</text>
  <text x="82" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">avis, disponibilité</text>

  <rect x="152" y="104" width="115" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="210" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Robots.txt</text>
  <text x="210" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Modifiable via</text>
  <text x="210" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">panneau d'administration</text>

  <rect x="279" y="104" width="115" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="337" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Balises canoniques</text>
  <text x="337" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Généré automatiquement</text>
  <text x="337" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">pour tous les produits</text>

  <!-- Comparison bar -->
  <rect x="25" y="175" width="369" height="32" rx="6" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <text x="210" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">Tout natif – aucune application tierce requise pour le référencement de base</text>
  <text x="210" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Manquant : schéma de fil d'Ariane, schéma de FAQ, hreflang (à ajouter manuellement dans Stencil)</text>

  <!-- Legend -->
  <rect x="110" y="225" width="8" height="8" rx="2" fill="#4ade80"/>
  <text x="123" y="233" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Contrôles de contenu</text>
  <rect x="220" y="225" width="8" height="8" rx="2" fill="#60a5fa"/>
  <text x="233" y="233" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Référencement technique</text>
</svg>