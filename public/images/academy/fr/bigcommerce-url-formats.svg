<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 230" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Options de format d'URL BigCommerce</text>
  <!-- Option 1 - SEO Optimized -->
  <rect x="30" y="42" width="360" height="40" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="45" y="58" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Optimisé pour le référencement (recommandé)</text>
  <text x="45" y="72" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">exemple.com/blue-running-shoes/</text>
  <text x="350" y="65" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Plat, propre</text>
  <!-- Option 2 - Short -->
  <rect x="30" y="92" width="360" height="40" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="45" y="108" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">URL courtes</text>
  <text x="45" y="122" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">exemple.com/blue-running-shoes/</text>
  <text x="350" y="115" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Limace minimale</text>
  <!-- Option 3 - Category-pathed -->
  <rect x="30" y="142" width="360" height="40" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="45" y="158" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Chemin de catégorie</text>
  <text x="45" y="172" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">exemple.com/shoes/running/blue-running-shoes/</text>
  <text x="350" y="158" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#f97316">Plus longtemps, risque de</text>
  <text x="350" y="168" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#f97316">doublons</text>
  <!-- Comparison -->
  <text x="210" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">vs Shopify (préfixe forcé) :</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">shopify-store.com/products/blue-running-shoes</text>
</svg>