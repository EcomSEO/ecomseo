<svg viewBox="0 0 480 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Structure du guide d’achat qui classe</text>
  <!-- Vertical flow -->
  <rect x="120" y="42" width="240" height="35" rx="6" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="240" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">1. Intro + Dilemme du lecteur</text>
  <line x1="240" y1="77" x2="240" y2="90" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="120" y="90" width="240" height="35" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">2. Tableau récapitulatif de sélection rapide</text>
  <line x1="240" y1="125" x2="240" y2="138" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="120" y="138" width="240" height="35" rx="6" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="240" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">3. Sections de critères détaillées</text>
  <line x1="240" y1="173" x2="240" y2="186" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="120" y="186" width="240" height="35" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="240" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">4. Analyse honnête des compromis</text>
  <line x1="240" y1="221" x2="240" y2="234" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="120" y="234" width="240" height="35" rx="6" fill="#a78bfa" opacity="0.25" stroke="#a78bfa" stroke-width="2"/>
  <text x="240" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">5. Recommandations de cas d'utilisation + CTA</text>
  <!-- Side annotations -->
  <text x="375" y="112" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Les scanners s'arrêtent ici</text>
  <text x="375" y="160" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Renforce la profondeur du référencement</text>
  <text x="375" y="208" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Construit la confiance</text>
  <text x="375" y="256" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">Génère des revenus</text>
  <text x="240" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Conversion 35 à 55 % plus élevée par rapport au trafic des pages de catégorie</text>
</svg>
