<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Crawled vs Indexed: The Ecommerce Funnel</text>

  <!-- Level 1: Total URLs -->
  <rect x="90" y="50" width="500" height="40" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="340" y="73" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="12" font-weight="600">Total Store URLs: 20,000</text>
  <text x="340" y="86" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">products + categories + filters + variants + pagination</text>

  <!-- Arrow -->
  <line x1="340" y1="90" x2="340" y2="108" stroke="#475569" stroke-width="1"/>
  <polygon points="336,105 340,112 344,105" fill="#475569"/>

  <!-- Level 2: Discovered -->
  <rect x="130" y="112" width="420" height="36" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="134" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="600">Discovered by Google: 16,000 (80%)</text>

  <!-- Arrow -->
  <line x1="340" y1="148" x2="340" y2="166" stroke="#475569" stroke-width="1"/>
  <polygon points="336,163 340,170 344,163" fill="#475569"/>

  <!-- Level 3: Crawled -->
  <rect x="165" y="170" width="350" height="36" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="340" y="192" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="600">Crawled: 14,000 (70%)</text>

  <!-- Arrow -->
  <line x1="340" y1="206" x2="340" y2="224" stroke="#475569" stroke-width="1"/>
  <polygon points="336,221 340,228 344,221" fill="#475569"/>

  <!-- Level 4: Indexed -->
  <rect x="210" y="228" width="260" height="36" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="250" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="12" font-weight="700">Indexed: 10,000 (50%)</text>

  <!-- Right-side labels for losses -->
  <text x="600" y="128" fill="#ef4444" font-family="Arial,sans-serif" font-size="9">-4,000 orphan pages</text>
  <line x1="552" y1="130" x2="590" y2="128" stroke="#ef4444" stroke-width="0.8"/>

  <text x="574" y="186" fill="#ef4444" font-family="Arial,sans-serif" font-size="9">-2,000 crawl budget</text>
  <text x="574" y="196" fill="#ef4444" font-family="Arial,sans-serif" font-size="9">exhausted</text>
  <line x1="517" y1="188" x2="565" y2="188" stroke="#ef4444" stroke-width="0.8"/>

  <text x="528" y="244" fill="#ef4444" font-family="Arial,sans-serif" font-size="9">-4,000 thin/duplicate</text>
  <line x1="472" y1="246" x2="520" y2="244" stroke="#ef4444" stroke-width="0.8"/>

  <!-- Bottom stat -->
  <rect x="180" y="280" width="320" height="40" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="299" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="11" font-weight="600">10,000 products invisible in search</text>
  <text x="340" y="313" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">= zero organic traffic from 50% of your catalog</text>
</svg>
