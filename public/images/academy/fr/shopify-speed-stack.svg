<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Pile d'optimisation de vitesse Shopify</text>
  <!-- Layer 1 - Theme -->
  <rect x="60" y="42" width="300" height="36" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Thème OS 2.0 (Aube)</text>
  <text x="210" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Modèles JSON, rendu plus rapide, bundles JS plus petits</text>
  <!-- Layer 2 - Images -->
  <rect x="60" y="86" width="300" height="36" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="210" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Optimisation des images</text>
  <text x="210" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">filtre image_url + paramètre de largeur | WebP via CDN | chargement paresseux</text>
  <!-- Layer 3 - Apps -->
  <rect x="60" y="130" width="300" height="36" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="210" y="146" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Audit d'application</text>
  <text x="210" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Supprimer les applications inutilisées | Remplacez par le code Liquid si possible</text>
  <!-- Layer 4 - JS -->
  <rect x="60" y="174" width="300" height="36" rx="6" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="210" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">Différé JavaScript</text>
  <text x="210" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Différer les scripts non critiques | Réduire la complexité de la boucle liquide</text>
  <!-- Impact arrow -->
  <text x="30" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#4ade80">1</text>
  <text x="30" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#60a5fa">2</text>
  <text x="30" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#f97316">3</text>
  <text x="30" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">4</text>
  <text x="30" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Priorité</text>
  <text x="30" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">commande</text>
</svg>