<svg viewBox="0 0 400 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Structure des e-mails de sensibilisation aux liens brisés</text>
  <rect x="40" y="40" rx="8" width="320" height="42" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="56" y="56" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">1</text>
  <text x="72" y="56" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Véritable compliment</text>
  <text x="72" y="72" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Référencer du contenu spécifique sur leur page</text>
  <rect x="40" y="92" rx="8" width="320" height="42" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="56" y="108" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ef4444">2</text>
  <text x="72" y="108" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Signaler un lien brisé</text>
  <text x="72" y="124" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">URL exacte + emplacement sur leur page</text>
  <rect x="40" y="144" rx="8" width="320" height="42" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="56" y="160" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">3</text>
  <text x="72" y="160" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Suggérer un remplacement</text>
  <text x="72" y="176" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Ce que couvre votre page + pourquoi elle convient à leur public</text>
  <text x="200" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Gardez moins de 120 mots. Ne demandez pas de lien directement.</text>
</svg>