<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Explorer les pages inutiles et les pages orphelines</text>
  <!-- Left: Crawl Waste -->
  <rect x="15" y="38" width="175" height="100" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="102" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Déchets rampants</text>
  <text x="102" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Visites de Googlebot mais aucune valeur SEO</text>
  <text x="30" y="88" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; URL d'ID de session</text>
  <text x="30" y="100" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Pages de recherche internes</text>
  <text x="30" y="112" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Combinaisons Trier/Filtrer</text>
  <text x="30" y="124" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Panier/commande/connexion</text>
  <!-- Right: Orphan Pages -->
  <rect x="210" y="38" width="175" height="100" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="297" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Pages orphelines</text>
  <text x="297" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Existe mais n'a jamais été exploré</text>
  <text x="225" y="88" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Liens internes brisés</text>
  <text x="225" y="100" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Pagination profonde (&amp;gt;page 10)</text>
  <text x="225" y="112" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Nouveaux produits non liés</text>
  <text x="225" y="124" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Catégories restructurées</text>
  <!-- Bottom target -->
  <rect x="60" y="155" width="280" height="35" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="200" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Cible : 70 à 80 % de taux d'exploration productif</text>
  <text x="200" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Comparez la base de données du produit avec les données du journal de 90 jours pour trouver les orphelins</text>
</svg>