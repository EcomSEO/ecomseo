<svg viewBox="0 0 420 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">4 facteurs qui donnent de la valeur à un backlink</text>
  <rect x="20" y="40" rx="8" width="175" height="90" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="107" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">1. Pertinence</text>
  <text x="107" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Le site de liaison couvre votre</text>
  <text x="107" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">niche ou catégorie de produit</text>
  <text x="107" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Facteur d’impact le plus élevé</text>
  <rect x="225" y="40" rx="8" width="175" height="90" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="312" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">2. Autorité</text>
  <text x="312" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Évaluation/confiance du domaine</text>
  <text x="312" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">du site Web de liaison</text>
  <text x="312" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">DR 50+ = signal fort</text>
  <rect x="20" y="150" rx="8" width="175" height="90" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="107" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">3. Placement</text>
  <text x="107" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Liens éditoriaux dans le contenu</text>
  <text x="107" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">battre les liens de pied de page/barre latérale</text>
  <text x="107" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Corps du texte = valeur la plus importante</text>
  <rect x="225" y="150" rx="8" width="175" height="90" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="312" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">4. Suivre</text>
  <text x="312" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Dofollow passe le classement</text>
  <text x="312" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">valeur; nofollow ne le fait pas</text>
  <text x="312" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Cibler les liens dofollow</text>
</svg>