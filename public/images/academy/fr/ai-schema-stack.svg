<svg viewBox="0 0 380 210" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="190" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Pile de balisage de schéma pour la visibilité de l'IA</text>
  <!-- Product Schema (center) -->
  <rect x="120" y="38" width="140" height="50" rx="6" stroke="#a78bfa" stroke-width="2"/>
  <text x="190" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Schéma du produit</text>
  <text x="190" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">nom, marque, sku, gtin, mpn</text>
  <text x="190" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">couleur, taille, matière, poids</text>
  <!-- Offer -->
  <rect x="15" y="100" width="110" height="40" rx="5" stroke="#4ade80" stroke-width="1.5"/>
  <text x="70" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Offre</text>
  <text x="70" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">prix, devise, disponibilité.</text>
  <path d="M125 92 L80 100" stroke="#4ade80" stroke-width="1"/>
  <!-- hasVariant -->
  <rect x="135" y="100" width="110" height="40" rx="5" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="190" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">aVariant</text>
  <text x="190" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Entrées de modèle de produit</text>
  <path d="M190 88 L190 100" stroke="#60a5fa" stroke-width="1"/>
  <!-- AggregateRating -->
  <rect x="255" y="100" width="110" height="40" rx="5" stroke="#f97316" stroke-width="1.5"/>
  <text x="310" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#f97316">Note globale</text>
  <text x="310" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">ratingValue, reviewCount</text>
  <path d="M255 92 L300 100" stroke="#f97316" stroke-width="1"/>
  <!-- Supporting schemas -->
  <text x="190" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#e2e8f0">Types de schéma pris en charge</text>
  <rect x="10" y="170" width="80" height="28" rx="4" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3"/>
  <text x="50" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Fil d'ArianeListe</text>
  <rect x="100" y="170" width="60" height="28" rx="4" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3"/>
  <text x="130" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Page FAQ</text>
  <rect x="170" y="170" width="55" height="28" rx="4" stroke="#4ade80" stroke-width="1" stroke-dasharray="3"/>
  <text x="197" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Comment faire</text>
  <rect x="235" y="170" width="60" height="28" rx="4" stroke="#f97316" stroke-width="1" stroke-dasharray="3"/>
  <text x="265" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316">Liste d'articles</text>
  <rect x="305" y="170" width="65" height="28" rx="4" stroke="#ef4444" stroke-width="1" stroke-dasharray="3"/>
  <text x="337" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Organisation</text>
</svg>