<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 290" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Tableau de bord de l'état d'indexation des pages GSC</text>

  <!-- Pie-chart-style breakdown as stacked bar -->
  <rect x="60" y="50" width="560" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Indexed segment -->
  <rect x="60" y="50" width="295" height="36" rx="6" fill="#4ade80" fill-opacity="0.15"/>
  <text x="207" y="73" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Indexé : 6 500 (65 %)</text>

  <!-- Crawled not indexed -->
  <rect x="355" y="50" width="115" height="36" fill="#f97316" fill-opacity="0.12"/>
  <text x="412" y="73" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Crawlé : 1 500</text>

  <!-- Discovered not indexed -->
  <rect x="470" y="50" width="80" height="36" fill="#60a5fa" fill-opacity="0.12"/>
  <text x="510" y="73" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">Trouvé : 1 000</text>

  <!-- Excluded -->
  <rect x="550" y="50" width="70" height="36" rx="0 6 6 0" fill="#ef4444" fill-opacity="0.1"/>
  <text x="585" y="73" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="600">Autre : 1 000</text>

  <!-- Detailed breakdown -->
  <!-- Crawled not indexed -->
  <rect x="60" y="110" width="270" height="70" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="195" y="130" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Exploré – Actuellement non indexé</text>
  <text x="195" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Google a visité mais a rejeté la page</text>
  <text x="195" y="166" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Correctif : améliorez la qualité du contenu, ajoutez un texte unique</text>

  <!-- Discovered not indexed -->
  <rect x="350" y="110" width="270" height="70" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Découvert – Actuellement non indexé</text>
  <text x="485" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Google connaît l'URL mais ne l'a pas explorée</text>
  <text x="485" y="166" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Correctif : renforcer les liens internes, améliorer le plan du site</text>

  <!-- Action items -->
  <rect x="60" y="200" width="560" height="65" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="340" y="220" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="600">Liste de contrôle de surveillance mensuelle</text>
  <text x="150" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Suivre le nombre indexé</text>
  <text x="310" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Raisons d’exclusion d’exportation</text>
  <text x="490" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Regrouper par type de page</text>
  <text x="150" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Surveillez les chutes soudaines</text>
  <text x="310" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Catégoriser les modèles</text>
  <text x="490" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Cibler les correctifs systématiques</text>

  <text x="340" y="285" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Cible saine : 85 à 95 % des URL de produits soumises sont indexées</text>
</svg>
