<svg viewBox="0 0 420 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Types de backlinks de commerce électronique</text>
  <line x1="210" y1="44" x2="210" y2="58" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="60" y1="58" x2="360" y2="58" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="60" y1="58" x2="60" y2="72" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="160" y1="58" x2="160" y2="72" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="260" y1="58" x2="260" y2="72" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="360" y1="58" x2="360" y2="72" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="10" y="72" rx="6" width="100" height="68" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="60" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Produit</text>
  <text x="60" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Critiques, résumés,</text>
  <text x="60" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">guides cadeaux</text>
  <text x="60" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Directement vers les pages produits</text>
  <rect x="110" y="72" rx="6" width="100" height="68" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="160" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Ressource</text>
  <text x="160" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Guides d'achat,</text>
  <text x="160" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">tutoriels, graphiques</text>
  <text x="160" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Vers les pages d'informations</text>
  <rect x="210" y="72" rx="6" width="100" height="68" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="260" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Marque</text>
  <text x="260" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Presse, partenariats,</text>
  <text x="260" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">mentions, UGC</text>
  <text x="260" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Vers la page d'accueil/la marque</text>
  <rect x="310" y="72" rx="6" width="100" height="68" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="360" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Fournisseur</text>
  <text x="360" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Annuaires de revendeurs,</text>
  <text x="360" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">listes de détaillants</text>
  <text x="360" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Faible effort, pertinent</text>
  <rect x="50" y="160" rx="6" width="320" height="56" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4" fill="none"/>
  <text x="210" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Flux d'autorité : les liens de produits dynamisent directement les pages commerciales.</text>
  <text x="210" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Les liens Ressource + Marque + Fournisseur transmettent l’équité via des liens internes.</text>
