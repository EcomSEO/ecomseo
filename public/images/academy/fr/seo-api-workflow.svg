<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Flux de travail SEO piloté par API</text>
  <!-- Data extraction -->
  <rect x="20" y="38" width="100" height="55" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="70" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Extrayez</text>
  <text x="70" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">API GSC</text>
  <text x="70" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">GA4 API</text>
  <text x="70" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">API de la plateforme</text>
  <path d="M125 65 L145 65" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arW1)"/>
  <!-- Merge & Score -->
  <rect x="150" y="38" width="100" height="55" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#a78bfa">Fusionner et noter</text>
  <text x="200" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Potentiel de trafic</text>
  <text x="200" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Valeur des revenus</text>
  <text x="200" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Écart d'optimisation</text>
  <path d="M255 65 L275 65" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arW2)"/>
  <!-- Automate -->
  <rect x="280" y="38" width="105" height="55" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="332" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Automatisez</text>
  <text x="332" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Mises à jour des balises Meta</text>
  <text x="332" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Rediriger la création</text>
  <text x="332" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Fraîcheur du contenu</text>
  <!-- Automated actions -->
  <text x="200" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#e2e8f0">Actions automatisées</text>
  <rect x="15" y="125" width="115" height="30" rx="4" stroke="#4ade80" stroke-width="1" stroke-dasharray="3"/>
  <text x="72" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Ce produit n'est plus!</text>
  <text x="72" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Redirection automatique 301</text>
  <rect x="142" y="125" width="115" height="30" rx="4" stroke="#f97316" stroke-width="1" stroke-dasharray="3"/>
  <text x="199" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316">Price changed</text>
  <text x="199" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Synchroniser schéma + page</text>
  <rect x="270" y="125" width="115" height="30" rx="4" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3"/>
  <text x="327" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Visibilité,</text>
  <text x="327" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Propager sur Amazon</text>
  <!-- Note -->
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Commencez petit : un flux de travail unique pour résoudre votre plus grand problème</text>
  <text x="200" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Ensuite, développez jusqu'à la pile d'automatisation complète</text>
  <defs>
    <marker id="arW1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#60a5fa"/></marker>
    <marker id="arW2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#a78bfa"/></marker>
  </defs>
</svg>