<svg viewBox="0 0 480 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Gestion des risques SEO UGC</text>
  <!-- Four risk columns -->
  <rect x="15" y="45" width="105" height="150" rx="8" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.2"/>
  <text x="67" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ef4444">Courrier indésirable</text>
  <text x="67" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Généré par un robot</text>
  <text x="67" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Liens non pertinents</text>
  <line x1="30" y1="115" x2="105" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="67" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Filtres automatiques +</text>
  <text x="67" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Révision manuelle</text>
  <rect x="130" y="45" width="105" height="150" rx="8" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1.2"/>
  <text x="182" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Contenu léger</text>
  <text x="182" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Commentaires en un seul mot</text>
  <text x="182" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"Super!" / "Mauvais"</text>
  <line x1="145" y1="115" x2="220" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="182" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Minimum 50 caractères</text>
  <text x="182" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Questions rapides</text>
  <rect x="245" y="45" width="105" height="150" rx="8" fill="#60a5fa" opacity="0.1" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="297" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Doublons</text>
  <text x="297" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Texte copié-collé</text>
  <text x="297" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Dupes de pages croisées</text>
  <line x1="260" y1="115" x2="335" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="297" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Balises canoniques</text>
  <text x="297" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Détection des dupes</text>
  <rect x="360" y="45" width="105" height="150" rx="8" fill="#a78bfa" opacity="0.1" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="412" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">Nég. Sentiment</text>
  <text x="412" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Mauvaises critiques</text>
  <text x="412" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Sans réponse</text>
  <line x1="375" y1="115" x2="450" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="412" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Professionnel</text>
  <text x="412" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">réponses sous 24h</text>
  <!-- Bottom label -->
  <text x="240" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Risque (en haut) | Atténuation (en bas, vert)</text>
</svg>
