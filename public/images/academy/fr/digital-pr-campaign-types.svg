<svg viewBox="0 0 420 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Types de campagnes de relations publiques numériques pour le commerce électronique</text>
  <rect x="20" y="42" rx="8" width="120" height="80" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="80" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Études de données</text>
  <text x="80" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Tendances des ventes,</text>
  <text x="80" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">enquêtes auprès des consommateurs,</text>
  <text x="80" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">analyse des prix</text>
  <text x="80" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">20 à 100 liens/campagne</text>
  <rect x="150" y="42" rx="8" width="120" height="80" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="210" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">RP produit</text>
  <text x="210" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Guides cadeaux,</text>
  <text x="210" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">avis sur les produits,</text>
  <text x="210" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">lancer des histoires</text>
  <text x="210" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Liens vers les pages produits</text>
  <rect x="280" y="42" rx="8" width="120" height="80" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="340" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Relations publiques réactives</text>
  <text x="340" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Commentaire d'expert,</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Réponses HARO,</text>
  <text x="340" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">détournement de nouvelles</text>
  <text x="340" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Fenêtre de 24 à 48 heures</text>
  <rect x="40" y="140" rx="6" width="340" height="76" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4" fill="none"/>
  <text x="210" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Mesure du retour sur investissement</text>
  <text x="120" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Liens gagnés</text>
  <text x="210" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Moy. DA</text>
  <text x="300" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Coût/lien</text>
  <text x="210" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">5 liens provenant de sites DR 70+ &gt; 50 liens provenant de blogs de faible autorité</text>
</svg>