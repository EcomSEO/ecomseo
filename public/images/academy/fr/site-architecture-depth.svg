<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Flat vs. Deep Architecture: Click Depth Impact</text>

  <!-- Flat Architecture (left) -->
  <text x="170" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Flat (3 clicks)</text>

  <!-- Homepage -->
  <rect x="120" y="66" width="100" height="28" rx="6" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="170" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#a78bfa">Page d'accueil</text>
  <text x="170" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Click 1</text>

  <line x1="120" y1="94" x2="65" y2="122" stroke="#4ade80" stroke-width="1"/>
  <line x1="170" y1="94" x2="170" y2="122" stroke="#4ade80" stroke-width="1"/>
  <line x1="220" y1="94" x2="275" y2="122" stroke="#4ade80" stroke-width="1"/>

  <!-- Categories -->
  <rect x="25" y="122" width="80" height="24" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="65" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Shoes</text>
  <rect x="130" y="122" width="80" height="24" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="170" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Clothing</text>
  <rect x="235" y="122" width="80" height="24" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="275" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Gear</text>
  <text x="170" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Click 2</text>

  <!-- Products -->
  <line x1="65" y1="146" x2="40" y2="174" stroke="#4ade80" stroke-width="1"/>
  <line x1="65" y1="146" x2="90" y2="174" stroke="#4ade80" stroke-width="1"/>
  <rect x="15" y="174" width="50" height="20" rx="3" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="40" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Prod</text>
  <rect x="70" y="174" width="50" height="20" rx="3" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="95" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Prod</text>
  <text x="170" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Click 3</text>

  <text x="170" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">2.4x faster indexing</text>
  <text x="170" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">+15-25% organic traffic</text>

  <!-- Separator -->
  <line x1="340" y1="48" x2="340" y2="280" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Deep Architecture (right) -->
  <text x="510" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444">Deep (6 clicks)</text>

  <rect x="460" y="66" width="100" height="24" rx="4" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <text x="510" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Page d'accueil</text>

  <line x1="510" y1="90" x2="510" y2="98" stroke="#ef4444" stroke-width="1"/>
  <rect x="460" y="98" width="100" height="22" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="510" y="113" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Clothing</text>

  <line x1="510" y1="120" x2="510" y2="128" stroke="#ef4444" stroke-width="1"/>
  <rect x="460" y="128" width="100" height="22" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="510" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Men's</text>

  <line x1="510" y1="150" x2="510" y2="158" stroke="#ef4444" stroke-width="1"/>
  <rect x="460" y="158" width="100" height="22" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="510" y="173" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Tops</text>

  <line x1="510" y1="180" x2="510" y2="188" stroke="#ef4444" stroke-width="1"/>
  <rect x="460" y="188" width="100" height="22" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="510" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">T-Shirts</text>

  <line x1="510" y1="210" x2="510" y2="218" stroke="#ef4444" stroke-width="1"/>
  <rect x="460" y="218" width="100" height="22" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="510" y="233" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ef4444">Produit</text>

  <text x="580" y="82" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">1</text>
  <text x="580" y="113" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">2</text>
  <text x="580" y="143" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">3</text>
  <text x="580" y="173" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">4</text>
  <text x="580" y="203" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">5</text>
  <text x="580" y="233" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">6</text>

  <text x="510" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#ef4444">Authority diluted</text>
  <text x="510" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Slow crawl discovery</text>
</svg>