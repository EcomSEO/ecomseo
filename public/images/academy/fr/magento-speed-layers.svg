<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Couches d'optimisation de vitesse Magento</text>
  <!-- Varnish layer -->
  <rect x="40" y="44" width="340" height="36" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="60" y="60" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Cache pleine page de vernis</text>
  <text x="60" y="73" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Impact unique le plus élevé. Sert le HTML mis en cache, contourne PHP.</text>
  <text x="355" y="67" text-anchor="end" font-family="Arial,sans-serif" font-size="16" fill="#4ade80">1</text>
  <!-- JS/CSS layer -->
  <rect x="40" y="88" width="340" height="36" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="60" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Fusion JS/CSS + Réduire</text>
  <text x="60" y="117" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Activez dans Stores &gt; Config &gt; Developer. Ajoutez une inline CSS critique.</text>
  <text x="355" y="111" text-anchor="end" font-family="Arial,sans-serif" font-size="16" fill="#60a5fa">2</text>
  <!-- Image layer -->
  <rect x="40" y="132" width="340" height="36" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="60" y="148" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Images WebP + chargement paresseux</text>
  <text x="60" y="161" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">WebP avec solution de repli JPEG. Chargement paresseux sous les grilles de produits pliées.</text>
  <text x="355" y="155" text-anchor="end" font-family="Arial,sans-serif" font-size="16" fill="#f97316">3</text>
  <!-- CDN layer -->
  <rect x="40" y="176" width="340" height="36" rx="6" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="60" y="192" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">CDN pour les actifs statiques</text>
  <text x="60" y="205" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Servez des images, CSS, JS à partir de serveurs Edge à proximité des clients.</text>
  <text x="355" y="199" text-anchor="end" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">4</text>
  <!-- Before/After -->
  <text x="100" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">Avant : 4 à 8 s de charge</text>
  <line x1="155" y1="228" x2="260" y2="228" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="258,225 264,228 258,231" fill="#e2e8f0"/>
  <text x="330" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Après : moins de 2 ans</text>
</svg>