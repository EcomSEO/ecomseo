<svg viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Contenu de la recette pour acheter l'entonnoir</text>
  <!-- Stage 1: Discovery -->
  <rect x="20" y="40" width="115" height="60" rx="6" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="77" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Découverte</text>
  <text x="77" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"recettes de pâtes faciles"</text>
  <text x="77" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"recette de gâteau au chocolat"</text>
  <text x="77" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">Schéma de recette + résultats riches</text>
  <!-- Arrow 1 -->
  <line x1="135" y1="70" x2="150" y2="70" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="148,66 156,70 148,74" fill="#60a5fa"/>
  <!-- Stage 2: Engagement -->
  <rect x="155" y="40" width="115" height="60" rx="6" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="212" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">Fiançailles</text>
  <text x="212" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Lire la recette complète</text>
  <text x="212" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Regarder le didacticiel vidéo</text>
  <text x="212" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Votre produit comme ingrédient star</text>
  <!-- Arrow 2 -->
  <line x1="270" y1="70" x2="285" y2="70" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="283,66 291,70 283,74" fill="#4ade80"/>
  <!-- Stage 3: Purchase -->
  <rect x="290" y="40" width="115" height="60" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="347" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" font-weight="bold">Achat</text>
  <text x="347" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">" Achetez les ingrédients "</text>
  <text x="347" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Ajouter des liens au panier</text>
  <text x="347" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Conversions directes de produits</text>
  <!-- Recipe collections below -->
  <text x="210" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Organiser par type de collection</text>
  <rect x="15" y="140" width="90" height="40" rx="4" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
  <text x="60" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316" font-weight="bold">Par cuisine</text>
  <text x="60" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Italien, Mexicain, Thaï</text>
  <rect x="115" y="140" width="90" height="40" rx="4" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1"/>
  <text x="160" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" font-weight="bold">Par occasion</text>
  <text x="160" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Fêtes, préparation de repas</text>
  <rect x="215" y="140" width="90" height="40" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80" font-weight="bold">Par régime</text>
  <text x="260" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Céto, Végétalien, SG</text>
  <rect x="315" y="140" width="90" height="40" rx="4" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1"/>
  <text x="360" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="bold">Par ingrédient</text>
  <text x="360" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Miel, Matcha, Huile d'Olive</text>
  <!-- Bottom note -->
  <text x="210" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Chaque page de collection cible un groupe de mots-clés distinct</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">et canalise le trafic vers le catalogue de produits</text>
</svg>