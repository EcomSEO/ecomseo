<svg viewBox="0 0 420 210" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Rendering Strategies Comparison</text>
  <!-- CSR -->
  <rect x="10" y="38" width="95" height="80" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="57" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">CSR</text>
  <text x="57" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Empty HTML shell</text>
  <text x="57" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">JS builds page</text>
  <text x="57" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Worst for SEO</text>
  <text x="57" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Days-weeks delay</text>
  <!-- SSR -->
  <rect x="115" y="38" width="95" height="80" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="162" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">SSR</text>
  <text x="162" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Full HTML on</text>
  <text x="162" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">every request</text>
  <text x="162" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Best for products</text>
  <text x="162" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Instant indexing</text>
  <!-- SSG -->
  <rect x="220" y="38" width="95" height="80" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="267" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">SSG</text>
  <text x="267" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Pre-rendered</text>
  <text x="267" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">at build time</text>
  <text x="267" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Fastest load time</text>
  <text x="267" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Stale data risk</text>
  <!-- ISR -->
  <rect x="325" y="38" width="85" height="80" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="367" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">ISR</text>
  <text x="367" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Static + periodic</text>
  <text x="367" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">revalidation</text>
  <text x="367" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Das Beste aus beiden</text>
  <text x="367" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Next.js/Nuxt</text>
  <!-- Recommendation -->
  <rect x="30" y="140" width="360" height="60" rx="6" stroke="#4ade80" stroke-width="1" stroke-dasharray="4"/>
  <text x="210" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Recommended Hybrid Approach</text>
  <text x="210" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">SSG: category pages | SSR: product pages | CSR: cart/wishlist only</text>
  <text x="210" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Match rendering strategy to indexing priority per page type</text>
</svg>