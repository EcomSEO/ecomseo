<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Product Schema Anatomy for Rich Results</text>

  <!-- JSON-LD container -->
  <rect x="30" y="44" width="620" height="270" rx="10" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="50" y="66" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">&lt;script type="application/ld+json"&gt;</text>

  <!-- Required fields -->
  <rect x="50" y="78" width="280" height="130" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="190" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Required Properties</text>

  <text x="70" y="118" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"name": "Blaue Laufschuhe"</text>
  <text x="70" y="138" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"image": "produkt.jpg"</text>
  <text x="70" y="158" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"offers.price": "89,99"</text>
  <text x="70" y="178" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"offers.priceCurrency": "EUR"</text>
  <text x="70" y="198" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"offers.availability": "InStock"</text>

  <!-- Recommended fields -->
  <rect x="350" y="78" width="280" height="130" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="490" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">Recommended Properties</text>

  <text x="370" y="118" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"brand": "Nike"</text>
  <text x="370" y="138" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"sku": "NK-RUN-BLU-42"</text>
  <text x="370" y="158" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"gtin": "0123456789012"</text>
  <text x="370" y="178" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"description": "Leichte..."</text>
  <text x="370" y="198" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"aggregateRating": 4.3 / 128</text>

  <!-- Rich Result preview -->
  <rect x="50" y="222" width="580" height="76" rx="6" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="60" y="240" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Google Rich-Result-Vorschau</text>

  <text x="60" y="260" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#60a5fa">Blaue Laufschuhe - Nike | YourStore.com</text>
  <text x="60" y="278" font-family="Arial,sans-serif" font-size="10" fill="#f97316">★★★★☆ 4.3 (128 reviews)</text>
  <text x="260" y="278" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">89,99 EUR</text>
  <text x="330" y="278" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Auf Lager</text>
  <text x="60" y="292" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Leichte Laufschuhe mit reaktionsfaehiger Daempfung...</text>
</svg>