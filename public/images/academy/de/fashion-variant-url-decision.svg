<svg viewBox="0 0 420 250" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Varianten-URL-Entscheidungsbaum</text>
  <!-- Start node -->
  <rect x="140" y="30" width="140" height="28" rx="14" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="210" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Produktvariantentyp?</text>
  <!-- Branch: Color -->
  <line x1="170" y1="58" x2="100" y2="80" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="30" y="80" width="140" height="28" rx="4" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1"/>
  <text x="100" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Farbvariante</text>
  <!-- Color sub-decision -->
  <line x1="60" y1="108" x2="40" y2="130" stroke="#4ade80" stroke-width="1"/>
  <line x1="140" y1="108" x2="155" y2="130" stroke="#f97316" stroke-width="1"/>
  <rect x="5" y="130" width="75" height="40" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1"/>
  <text x="42" y="147" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80" font-weight="bold">Hat Suchvolumen?</text>
  <text x="42" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Eigene URL + Fotos</text>
  <rect x="115" y="130" width="75" height="40" rx="4" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
  <text x="152" y="147" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316" font-weight="bold">Kein Suchband?</text>
  <text x="152" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Farbfeldauswahl</text>
  <!-- Branch: Size -->
  <line x1="250" y1="58" x2="320" y2="80" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="250" y="80" width="140" height="28" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="320" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Größenvariante</text>
  <line x1="320" y1="108" x2="320" y2="130" stroke="#ef4444" stroke-width="1"/>
  <rect x="260" y="130" width="120" height="40" rx="4" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="320" y="147" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ef4444" font-weight="bold">Niemals eigene URL</text>
  <text x="320" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Dropdown + kanonisch</text>
  <!-- Result boxes -->
  <rect x="5" y="185" width="120" height="50" rx="4" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="1"/>
  <text x="65" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80" font-weight="bold">/Blazer/Marineblau</text>
  <text x="65" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Einzigartiger Titel, Meta, Fotos</text>
  <text x="65" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Selbstkanonisch</text>
  <line x1="42" y1="170" x2="65" y2="185" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="150" y="185" width="120" height="50" rx="4" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1"/>
  <text x="210" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316" font-weight="bold">/blazer (einzelne URL)</text>
  <text x="210" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Farbmuster auf der Seite</text>
  <text x="210" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Keine zusätzlichen Crawling-Kosten</text>
  <line x1="152" y1="170" x2="210" y2="185" stroke="#f97316" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="295" y="185" width="120" height="50" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="355" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ef4444" font-weight="bold">/blazer?size=m</text>
  <text x="355" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Blockieren Sie in robots.txt oder</text>
  <text x="355" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">kanonisch zu /blazer</text>
  <line x1="320" y1="170" x2="355" y2="185" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
</svg>