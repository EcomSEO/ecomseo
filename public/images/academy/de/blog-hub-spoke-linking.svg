  <rect x="490" y="140" width="170" height="36" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="575" y="162" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Wettkampf-Vorbereitung</text>

  <rect x="490" y="240" width="170" height="36" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="575" y="262" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Schuhpflege &amp; Wartung</text>

  <!-- Arrows from blogs to hub -->
  <line x1="190" y1="58" x2="250" y2="130" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="248,127 255,133 248,134" fill="#60a5fa"/>
  <line x1="190" y1="158" x2="250" y2="145" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="248,142 255,145 248,149" fill="#60a5fa"/>
  <line x1="190" y1="258" x2="250" y2="155" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="248,152 255,157 248,160" fill="#60a5fa"/>
  <line x1="490" y1="58" x2="430" y2="130" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="432,127 425,133 432,134" fill="#60a5fa"/>
  <line x1="490" y1="158" x2="430" y2="145" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="432,142 425,145 432,149" fill="#60a5fa"/>
  <line x1="490" y1="258" x2="430" y2="155" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="432,152 425,157 432,160" fill="#60a5fa"/>

  <!-- Labels -->
  <text x="210" y="100" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">Link-Equity</text>
  <text x="470" y="100" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">Link-Equity</text>

  <!-- Product links below -->
  <line x1="300" y1="164" x2="260" y2="200" stroke="#f97316" stroke-width="1"/>
  <line x1="340" y1="164" x2="340" y2="200" stroke="#f97316" stroke-width="1"/>
  <line x1="380" y1="164" x2="420" y2="200" stroke="#f97316" stroke-width="1"/>

  <rect x="220" y="200" width="80" height="24" rx="4" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="260" y="216" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produkt A</text>
  <rect x="310" y="200" width="60" height="24" rx="4" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="340" y="216" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produkt B</text>
  <rect x="380" y="200" width="80" height="24" rx="4" fill="#1a1a2e" stroke="#f97316" stroke-width="0.8"/>
  <text x="420" y="216" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Produkt C</text>

  <text x="340" y="308" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Jeder Blogbeitrag verlinkt auf den Kategorie-Hub und konzentriert thematische Autorität auf Ihre wichtigste kommerzielle Seite</text>
