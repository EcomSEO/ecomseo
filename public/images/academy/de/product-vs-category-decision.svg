<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Produktseite vs. Kategorieseite: Entscheidungshilfe</text>
  <!-- Center question -->
  <rect x="220" y="46" width="240" height="40" rx="8" stroke="#a78bfa" stroke-width="1.5" fill="#a78bfa" fill-opacity="0.1"/>
  <text x="340" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#a78bfa">Was zeigt die SERP?</text>
  <!-- Left branch -->
  <line x1="280" y1="86" x2="150" y2="120" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="30" y="110" width="240" height="48" rx="8" stroke="#4ade80" stroke-width="1.5" fill="#4ade80" fill-opacity="0.08"/>
  <text x="150" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Produktdetailseiten</text>
  <text x="150" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Einzelartikel mit Warenkorb-Button</text>
  <!-- Right branch -->
  <line x1="400" y1="86" x2="530" y2="120" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="410" y="110" width="240" height="48" rx="8" stroke="#60a5fa" stroke-width="1.5" fill="#60a5fa" fill-opacity="0.08"/>
  <text x="530" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">Kategorie- / Listenseiten</text>
  <text x="530" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Kollektionen, Vergleiche, Übersichten</text>
  <!-- Product examples -->
  <rect x="30" y="174" width="240" height="80" rx="6" stroke="#4ade80" stroke-width="1" fill="#4ade80" fill-opacity="0.04"/>
  <text x="150" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#4ade80">Ziel mit Produktseiten:</text>
  <text x="150" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Exakte Produktnamen &amp; Modellnummern</text>
  <text x="150" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">SKU-Begriffe &amp; spezifische Spezifikationen</text>
  <text x="150" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">"Nike Air Zoom Pegasus 40 Damen"</text>
  <!-- Category examples -->
  <rect x="410" y="174" width="240" height="80" rx="6" stroke="#60a5fa" stroke-width="1" fill="#60a5fa" fill-opacity="0.04"/>
  <text x="530" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#60a5fa">Ziel mit Kategorieseiten:</text>
  <text x="530" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Produkttyp + breite Modifier</text>
  <text x="530" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Marke + Kategorie Kombinationen</text>
  <text x="530" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">"Herren wasserdichte Wanderschuhe"</text>
  <!-- Cannibalization warning -->
  <rect x="140" y="274" width="400" height="50" rx="8" stroke="#ef4444" stroke-width="1.5" fill="#ef4444" fill-opacity="0.06"/>
  <text x="340" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">Kannibalisierungsrisiko</text>
  <text x="340" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Weisen Sie ein primäres Keyword pro Seite zu. Niemals denselben Begriff auf beiden Seitentypen anvisieren.</text>
</svg>