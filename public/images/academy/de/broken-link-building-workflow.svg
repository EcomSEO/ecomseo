  <text x="165" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Originalinhalt</text>
  <path d="M212 70 L228 70" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="230" y="45" rx="8" width="90" height="50" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="275" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Erstellen</text>
  <text x="275" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Besserer Ersatz</text>
  <text x="275" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Inhalt</text>
