  <text x="210" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Wöchentliches Zeitbudget</text>
  <text x="100" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">1 Stunde Entdeckung</text>
