  <text x="55" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Tote Links auf</text>
  <text x="55" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Nischenseiten</text>
  <path d="M102 70 L118 70" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="120" y="45" rx="8" width="90" height="50" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
