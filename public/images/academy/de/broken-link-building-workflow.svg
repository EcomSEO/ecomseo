  <text x="330" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">1-2 Stunden Einsatzzeit</text>
  <text x="210" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Ziel: 20–30 neue Backlinks/Monat in großem Maßstab</text>
