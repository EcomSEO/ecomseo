<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Facettierte URL-Explosion in Magento</text>
  <!-- Base category -->
  <rect x="140" y="40" width="140" height="30" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">/schuhe.html</text>
  <!-- Attributes -->
  <text x="55" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Farbe (10)</text>
  <text x="155" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Größe (10)</text>
  <text x="260" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Marke (10)</text>
  <text x="365" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Preis (5)</text>
  <!-- Lines from base to attributes -->
  <line x1="180" y1="70" x2="55" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="200" y1="70" x2="155" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="220" y1="70" x2="260" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <line x1="240" y1="70" x2="365" y2="85" stroke="#60a5fa" stroke-width="0.8"/>
  <!-- Multiplication -->
  <text x="210" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">10 x 10 x 10 x 5 = 5.000 URL-Kombinationen</text>
  <text x="210" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">pro einzelne Kategorieseite</text>
  <!-- Solutions -->
  <rect x="20" y="158" width="175" height="40" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="107" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Am besten: AJAX-Filterung</text>
  <text x="107" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Die URL bleibt /shoes.html</text>
  <rect x="225" y="158" width="175" height="40" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="312" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#f97316">Fallback: noindex + robots.txt</text>
  <text x="312" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Blockieren Sie Filterparameter vom Crawlen</text>
  <!-- High-value exception -->
  <rect x="90" y="210" width="240" height="30" rx="6" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <text x="210" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Ausnahme: Erstellen Sie spezielle Landingpages für hochwertige Filterkombinationen</text>
</svg>