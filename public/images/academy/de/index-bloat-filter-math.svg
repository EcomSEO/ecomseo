<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Index-Bloat: Wie Filter URLs multiplizieren</text>

  <!-- Category box -->
  <rect x="240" y="44" width="200" height="32" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="64" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">/sofas (200 Produkte)</text>

  <!-- Lines to filters -->
  <line x1="260" y1="76" x2="100" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="310" y1="76" x2="250" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="370" y1="76" x2="400" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="420" y1="76" x2="550" y2="110" stroke="#475569" stroke-width="1"/>

  <!-- Filter boxes -->
  <rect x="30" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="100" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Farbe (10 Optionen)</text>

  <rect x="185" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="255" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Material (8 Optionen)</text>

  <rect x="340" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="410" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Preis (5 Bereiche)</text>

  <rect x="495" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="565" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Plätze (4 Optionen)</text>

  <!-- Multiplication -->
  <text x="340" y="165" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="13" font-weight="700">10 x 8 x 5 x 4 = 1.600 Filter-URLs</text>
  <text x="340" y="180" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">von nur EINER Kategorie (ohne Mehrfachauswahl-Kombinationen)</text>

  <!-- Bottom comparison -->
  <rect x="60" y="200" width="250" height="50" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="185" y="221" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="600">Ohne Kontrolle</text>
  <text x="185" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">1.600+ wertlose URLs indexiert</text>

  <rect x="370" y="200" width="250" height="50" rx="6" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-width="1"/>
  <text x="495" y="221" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Mit noindex + canonical</text>
  <text x="495" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Nur 3–5 Hoch-Nachfrage-Filter indexiert</text>

  <text x="340" y="272" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">robots.txt, noindex und canonical Tags verwenden, um zu kontrollieren, welche Filterkombinationen Google indexiert</text>
</svg>
