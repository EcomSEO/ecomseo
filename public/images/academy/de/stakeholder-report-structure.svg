  <text x="210" y="214" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Senden Sie die Zusammenfassung 24 Stunden vor dem Treffen, um die Einbindung der Stakeholder zu verbessern</text>
