    <text x="18" y="27" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">Haupt-KPIs: Umsatz, Traffic, CVR, Neukunden</text>
  </g>
  <g transform="translate(30,80)">
