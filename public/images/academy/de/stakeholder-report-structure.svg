<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Struktur des Executive SEO-Berichts</text>
  <g transform="translate(30,38)">
