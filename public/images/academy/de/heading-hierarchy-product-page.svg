<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Korrekte Überschriftenhierarchie für eine Produktseite</text>

  <!-- H1 -->
  <rect x="140" y="44" width="400" height="32" rx="6" fill="#1e1e3a" stroke="#a78bfa" stroke-width="2"/>
  <text x="160" y="64" fill="#a78bfa" font-family="Arial,sans-serif" font-size="12" font-weight="700">H1</text>
  <text x="200" y="64" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11">Wasserdichter Wanderstiefel für Herren – braunes Leder</text>

  <!-- H2: Description -->
  <line x1="200" y1="76" x2="200" y2="90" stroke="#475569" stroke-width="1"/>
  <rect x="200" y="90" width="340" height="28" rx="5" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="220" y="108" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">H2-Produktbeschreibung</text>

  <!-- H2: Specifications -->
  <line x1="200" y1="118" x2="200" y2="130" stroke="#475569" stroke-width="1"/>
  <rect x="200" y="130" width="340" height="28" rx="5" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="220" y="148" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">H2-Spezifikationen</text>

  <!-- H3s under Specifications -->
  <line x1="260" y1="158" x2="260" y2="168" stroke="#475569" stroke-width="0.8"/>
  <rect x="260" y="168" width="240" height="22" rx="4" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="280" y="183" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10">H3 Abmessungen &amp;amp; Gewicht</text>

  <line x1="260" y1="190" x2="260" y2="196" stroke="#475569" stroke-width="0.8"/>
  <rect x="260" y="196" width="240" height="22" rx="4" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="280" y="211" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10">H3-Materialien &amp;amp; Konstruktion</text>

  <line x1="260" y1="218" x2="260" y2="224" stroke="#475569" stroke-width="0.8"/>
  <rect x="260" y="224" width="240" height="22" rx="4" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="280" y="239" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10">H3-Pflegehinweise</text>

  <!-- H2: Reviews -->
  <line x1="200" y1="246" x2="200" y2="258" stroke="#475569" stroke-width="1"/>
  <rect x="200" y="258" width="340" height="28" rx="5" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="220" y="276" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">H2-Kundenrezensionen (48)</text>

  <!-- H2: Related -->
  <line x1="200" y1="286" x2="200" y2="296" stroke="#475569" stroke-width="1"/>
  <rect x="200" y="296" width="340" height="28" rx="5" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="220" y="314" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">H2-bezogene Produkte</text>

  <!-- Level indicators on left -->
  <text x="130" y="64" text-anchor="end" fill="#a78bfa" font-family="Arial,sans-serif" font-size="9">Stufe 1</text>
  <text x="190" y="108" text-anchor="end" fill="#4ade80" font-family="Arial,sans-serif" font-size="9">Stufe 2</text>
  <text x="250" y="183" text-anchor="end" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9">Stufe 3</text>

  <text x="340" y="338" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Überspringen Sie niemals die Ebenen (H1 bis H3) und verwenden Sie niemals Überschriften-Tags für die visuelle Gestaltung</text>
</svg>