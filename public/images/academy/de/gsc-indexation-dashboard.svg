<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 290" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">GSC Seitenindexierungs-Dashboard</text>

  <!-- Stacked bar -->
  <rect x="60" y="50" width="560" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Indexed segment -->
  <rect x="60" y="50" width="295" height="36" rx="6" fill="#4ade80" fill-opacity="0.15"/>
  <text x="207" y="73" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Indexiert: 6.500 (65%)</text>

  <!-- Crawled not indexed -->
  <rect x="355" y="50" width="115" height="36" fill="#f97316" fill-opacity="0.12"/>
  <text x="412" y="73" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Gecrawlt: 1.500</text>

  <!-- Discovered not indexed -->
  <rect x="470" y="50" width="80" height="36" fill="#60a5fa" fill-opacity="0.12"/>
  <text x="510" y="73" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">Gefunden: 1.000</text>

  <!-- Excluded -->
  <rect x="550" y="50" width="70" height="36" rx="0 6 6 0" fill="#ef4444" fill-opacity="0.1"/>
  <text x="585" y="73" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="600">Sonstige: 1.000</text>

  <!-- Crawled not indexed box -->
  <rect x="60" y="110" width="270" height="70" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="195" y="130" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Gecrawlt – derzeit nicht indexiert</text>
  <text x="195" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Google besuchte, lehnte Seite aber ab</text>
  <text x="195" y="166" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Beheben: Content verbessern, einzigartigen Text hinzufügen</text>

  <!-- Discovered not indexed box -->
  <rect x="350" y="110" width="270" height="70" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Gefunden – derzeit nicht indexiert</text>
  <text x="485" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Google kennt URL, hat sie aber nicht gecrawlt</text>
  <text x="485" y="166" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Beheben: interne Links stärken, Sitemap verbessern</text>

  <!-- Checklist -->
  <rect x="60" y="200" width="560" height="65" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="340" y="220" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="600">Monatliche Überwachungs-Checkliste</text>
  <text x="150" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Indexiert-Anzahl verfolgen</text>
  <text x="310" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Ausschluss-Gründe exportieren</text>
  <text x="490" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Nach Seitentyp gruppieren</text>
  <text x="150" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Auf plötzliche Einbrüche achten</text>
  <text x="310" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Nach Mustern kategorisieren</text>
  <text x="490" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Gezielte Korrekturen anvisieren</text>

  <text x="340" y="285" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Gesundes Ziel: 85–95% der eingereichten Produkt-URLs indexiert</text>
</svg>
