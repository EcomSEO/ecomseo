  <text x="155" y="140" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">Grundlagen (Stufen 1-3)</text>
  <text x="155" y="156" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">4-6 Wochen</text>
  <text x="155" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Mechanik verstehen, Tools einrichten, Audit</text>

  <rect x="275" y="120" width="140" height="60" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="345" y="140" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="600">Optimierung (4-5)</text>
  <text x="345" y="156" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">4-6 Wochen</text>
  <text x="345" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Keywords + OnPage</text>

  <rect x="430" y="120" width="140" height="60" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="500" y="140" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="11" font-weight="600">Skalierung (6-7)</text>
  <text x="500" y="156" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">2-3 Monate</text>
  <text x="500" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Technik + Content (parallel)</text>

  <!-- Ongoing banner -->
  <rect x="50" y="200" width="580" height="36" rx="6" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="222" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="600">Stufen 8-9: Linkaufbau + Messung (fortlaufend, endet nie)</text>

  <!-- Timeline -->
  <line x1="60" y1="260" x2="620" y2="260" stroke="#334155" stroke-width="1"/>
  <text x="60" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Monat 1</text>
  <text x="155" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Monat 2-3</text>
  <text x="300" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Monat 3-4</text>
  <text x="450" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Monat 4-6</text>
  <text x="570" y="275" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Monat 6+</text>

  <!-- Result expectation -->
  <text x="340" y="300" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Erstes spürbares organisches Traffic-Wachstum: 4-8 Monate</text>
  <text x="340" y="316" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Etablierte Shops können bei einzelnen Seiten bereits nach 6-12 Wochen Ergebnisse sehen</text>
  <text x="340" y="332" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Nach 12 Monaten wird organische Suche typischerweise zum ROI-stärksten Marketing-Kanal</text>
</svg>