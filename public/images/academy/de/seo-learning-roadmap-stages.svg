  <text x="380" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">OnPage-</text>
  <text x="380" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Optimierung</text>

  <text x="450" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Technisches</text>
  <text x="450" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">SEO</text>

  <text x="520" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Content-</text>
  <text x="520" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Strategie</text>

  <text x="570" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Link-</text>
  <text x="570" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">aufbau</text>

  <text x="620" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Messen</text>
  <text x="620" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">&amp; wiederholen</text>

  <!-- Phase boxes below -->
