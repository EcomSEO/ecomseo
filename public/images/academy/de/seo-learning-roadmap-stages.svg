<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Der 9-Stufen Ecommerce-SEO-Lernpfad</text>

  <!-- Timeline line -->
  <line x1="60" y1="60" x2="620" y2="60" stroke="#334155" stroke-width="2"/>

