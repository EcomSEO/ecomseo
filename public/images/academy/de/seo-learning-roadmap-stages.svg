  <text x="90" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">mechanik</text>

  <text x="160" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Setup</text>
  <text x="160" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">GSC + GA4</text>

  <text x="230" y="90" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Erstes</text>
  <text x="230" y="99" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Audit</text>

