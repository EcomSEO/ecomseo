<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Die vier Säulen der Ecommerce-SEO</text>

  <!-- Foundation bar -->
  <rect x="60" y="230" width="560" height="36" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="252" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="12" font-weight="600">Umsatzwachstum durch organische Suche</text>

  <!-- Pillar 1 -->
  <rect x="72" y="80" width="120" height="146" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="132" y="104" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">Technische</text>
  <text x="132" y="118" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">SEO</text>
  <text x="132" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Crawlbarkeit</text>
  <text x="132" y="154" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Seitengeschwindigkeit</text>
  <text x="132" y="168" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Strukturierte Daten</text>
  <text x="132" y="182" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Indexierung</text>
  <text x="132" y="210" text-anchor="middle" fill="#334155" font-family="Arial,sans-serif" font-size="7">FUNDAMENT</text>

  <!-- Pillar 2 -->
  <rect x="206" y="80" width="120" height="146" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="266" y="104" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="600">On-Page</text>
  <text x="266" y="118" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="600">SEO</text>
  <text x="266" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Keywords</text>
  <text x="266" y="154" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Title-Tags</text>
  <text x="266" y="168" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Beschreibungen</text>
  <text x="266" y="182" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Überschriften</text>

  <!-- Pillar 3 -->
  <rect x="340" y="80" width="120" height="146" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="104" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="11" font-weight="600">Content-</text>
  <text x="400" y="118" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="11" font-weight="600">Strategie</text>
  <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Kaufratgeber</text>
  <text x="400" y="154" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Vergleiche</text>
  <text x="400" y="168" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Blogbeiträge</text>
  <text x="400" y="182" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Interne Verlinkung</text>

  <!-- Pillar 4 -->
  <rect x="474" y="80" width="120" height="146" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="534" y="104" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="11" font-weight="600">Off-Page</text>
  <text x="534" y="118" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="11" font-weight="600">SEO</text>
  <text x="534" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Backlinks</text>
  <text x="534" y="154" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Digitale PR</text>
  <text x="534" y="168" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Markenerwähnungen</text>
  <text x="534" y="182" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Autorität</text>

  <!-- Top label -->
  <text x="132" y="65" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8" font-weight="600">Hier anfangen</text>
  <line x1="132" y1="68" x2="132" y2="78" stroke="#4ade80" stroke-width="1"/>
  <polygon points="128,76 132,82 136,76" fill="#4ade80"/>

  <text x="340" y="286" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Alle vier Säulen wirken zusammen. Beginnen Sie mit Technischer SEO, um alles andere zu entsperren.</text>
</svg>
