  <text x="107" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Signal: Bio verlinkt zurueck zur Seite</text>
  <text x="107" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Replizierbar: Gleiche Blogs anschreiben</text>
