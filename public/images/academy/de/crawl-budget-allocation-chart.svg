<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Crawl-Budgetzuteilungsanalyse</text>
  <!-- Bar chart -->
  <text x="30" y="50" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Produkte</text>
  <rect x="35" y="40" width="120" height="14" rx="2" fill="#4ade80" opacity="0.3"/>
  <rect x="35" y="40" width="120" height="14" rx="2" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="160" y="51" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">15 % (sollten 60 % sein)</text>
  <text x="30" y="72" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Kategorien</text>
  <rect x="35" y="62" width="80" height="14" rx="2" fill="#60a5fa" opacity="0.3"/>
  <rect x="35" y="62" width="80" height="14" rx="2" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="120" y="73" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">10 %</text>
  <text x="30" y="94" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Facetten</text>
  <rect x="35" y="84" width="300" height="14" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="35" y="84" width="300" height="14" rx="2" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="340" y="95" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">60 % ABFALL</text>
  <text x="30" y="116" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Andere</text>
  <rect x="35" y="106" width="100" height="14" rx="2" fill="#f97316" opacity="0.2"/>
  <rect x="35" y="106" width="100" height="14" rx="2" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="140" y="117" font-family="Arial,sans-serif" font-size="8" fill="#f97316">15 % (Suche, Warenkorb usw.)</text>
  <!-- Fix arrow -->
  <text x="200" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Fix: Facettierte URLs blockieren &amp;#8594; Leiten Sie das Budget auf Produkte um</text>
  <!-- Target -->
  <rect x="80" y="160" width="240" height="28" rx="5" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Ziel: 60 % Produkte | 15 % Kategorien | 25 % andere</text>
</svg>