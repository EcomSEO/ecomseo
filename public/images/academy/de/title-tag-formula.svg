<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Title-Tag-Formeln für Ecommerce</text>

  <!-- Product page formula -->
  <text x="40" y="56" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="700">Produktseiten</text>
  <rect x="40" y="64" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="60" y="82" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Produktname</text>
  <text x="160" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="180" y="82" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Schlüsselmerkmal</text>
  <text x="300" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="320" y="82" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Marke</text>
  <text x="370" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="385" y="82" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Shop-Name</text>
  <text x="60" y="98" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Bio-Baumwoll Handtücher 4er-Set – Salbeigrün | Brooklinen</text>

  <!-- Category page formula -->
  <text x="40" y="130" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Kategorieseiten</text>
  <rect x="40" y="138" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="60" y="156" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Kategorie-Keyword</text>
  <text x="195" y="156" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="215" y="156" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Qualifizierer</text>
  <text x="305" y="156" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="325" y="156" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Shop-Name</text>
  <text x="60" y="172" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Damen Laufschuhe – Top-Marken, Kostenloser Rückversand | FitGear</text>

  <!-- Homepage formula -->
  <text x="40" y="204" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Startseite</text>
  <rect x="40" y="212" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="60" y="230" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Markenname</text>
  <text x="155" y="230" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="175" y="230" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Primäres Keyword</text>
  <text x="310" y="230" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="330" y="230" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Alleinstellungsmerkmal</text>
  <text x="60" y="246" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">TrailGear | Outdoor-Ausrüstung &amp; Camping | Kostenloser Versand ab 50 €</text>

  <!-- Character count guide -->
  <rect x="40" y="268" width="600" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="268" width="350" height="36" rx="6" fill="#4ade80" fill-opacity="0.06"/>
  <text x="215" y="288" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Sichere Zone: erste 50 Zeichen (immer sichtbar)</text>
  <line x1="390" y1="268" x2="390" y2="304" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="490" y="288" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">50-60 Zeichen: kann abgeschnitten werden</text>

  <text x="340" y="316" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Primäre Keywords in den ersten 50 Zeichen platzieren für maximale Ranking-Wirkung</text>
</svg>