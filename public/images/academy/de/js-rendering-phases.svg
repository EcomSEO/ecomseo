<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Der zweiphasige Rendering-Prozess von Google</text>

  <!-- Phase 1 Box -->
  <rect x="20" y="44" width="300" height="220" rx="10" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="20" y="44" width="300" height="30" rx="10" fill="#ef4444" fill-opacity="0.1"/>
  <rect x="20" y="64" width="300" height="1" fill="#ef4444" fill-opacity="0.2"/>
  <text x="170" y="64" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="12" font-weight="700">PHASE 1: HTML-Abruf</text>

  <text x="170" y="90" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Passiert sofort</text>

  <!-- What Google receives -->
  <rect x="40" y="105" width="260" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="170" y="123" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">&amp;lt;html&amp;gt;&amp;lt;body&amp;gt;</text>
  <text x="170" y="143" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">&amp;lt;div id="app"&amp;gt;&amp;lt;/div&amp;gt;</text>

  <!-- What's missing -->
  <rect x="40" y="168" width="260" height="36" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.8"/>
  <text x="170" y="183" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9">Kein Titel, kein Preis, keine Beschreibung</text>
  <text x="170" y="196" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9">Keine Rezensionen, kein Schema-Markup</text>

  <!-- Result -->
  <rect x="40" y="216" width="260" height="32" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="170" y="237" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="11" font-weight="700">Google sieht: LEERE SEITE</text>

  <!-- Arrow between phases -->
  <line x1="330" y1="154" x2="350" y2="154" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="348,148 360,154 348,160" fill="#a78bfa"/>
  <text x="345" y="178" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Tage bis</text>
  <text x="345" y="192" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Wochen</text>

  <!-- Phase 2 Box -->
  <rect x="360" y="44" width="300" height="220" rx="10" fill="#1a1a2e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="360" y="44" width="300" height="30" rx="10" fill="#4ade80" fill-opacity="0.1"/>
  <rect x="360" y="64" width="300" height="1" fill="#4ade80" fill-opacity="0.2"/>
  <text x="510" y="64" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="12" font-weight="700">PHASE 2: JS-Rendering</text>

  <text x="510" y="90" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="10">Verzögert (Render-Warteschlange)</text>

  <!-- What Google renders -->
  <rect x="380" y="105" width="260" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="510" y="123" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="10">&amp;lt;h1&amp;gt;Laufschuhe Pro&amp;lt;/h1&amp;gt;</text>
  <text x="510" y="143" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="10">&amp;lt;span&amp;gt;129,99 $&amp;lt;/span&amp;gt; Auf Lager</text>

  <!-- What's visible -->
  <rect x="380" y="168" width="260" height="36" rx="6" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-width="0.8"/>
  <text x="510" y="183" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9">Titel, Preis, Beschreibung geladen</text>
  <text x="510" y="196" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9">Bewertungen, Schema, gerenderte Bilder</text>

  <!-- Result -->
  <rect x="380" y="216" width="260" height="32" rx="6" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-width="1"/>
  <text x="510" y="237" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="700">Google sieht: VOLLSTÄNDIGER INHALT</text>

  <!-- Solution bar -->
  <rect x="80" y="282" width="520" height="36" rx="8" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="1"/>
  <text x="340" y="300" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Lösung: Serverseitiges Rendering (SSR) oder statische Generierung (SSG)</text>
  <text x="340" y="313" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Eliminiert die Verzögerung von Phase 2. Google erhält beim ersten Abruf den vollständigen Inhalt.</text>

  <text x="340" y="336" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Shopify Liquid = SSR standardmäßig | Next.js/Nuxt = SSR oder SSG konfigurieren | React SPA = muss repariert werden</text>
</svg>
