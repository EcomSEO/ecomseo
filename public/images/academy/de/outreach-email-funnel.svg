  <text x="200" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Qualifiziert, DR 30+, nischenrelevant</text>
  <polygon points="110,95 290,95 270,135 130,135" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="200" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">40-60 Geöffnet</text>
