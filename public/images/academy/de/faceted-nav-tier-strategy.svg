<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">3-stufige, facettierte Navigationsstrategie</text>

  <!-- Tier 1 -->
  <rect x="30" y="48" width="190" height="260" rx="10" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="125" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Stufe 1: Index</text>
  <text x="125" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Hohe Suchnachfrage</text>

  <text x="50" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Markenfilter</text>
  <text x="50" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Produkttyp</text>
  <text x="50" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Schlüsselmaterialien</text>

  <rect x="45" y="176" width="160" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Saubere URLs</text>
  <text x="125" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/schuhe/nike/</text>

  <rect x="45" y="222" width="160" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Einzigartiger Inhalt</text>
  <text x="125" y="251" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Benutzerdefiniertes H1, Meta, Intro</text>

  <rect x="45" y="268" width="160" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Interne Links</text>

  <!-- Tier 2 -->
  <rect x="245" y="48" width="190" height="260" rx="10" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="340" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f97316">Stufe 2: Vorsichtig</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Etwas Suchpotenzial</text>

  <text x="265" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Farbfilter</text>
  <text x="265" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Stilfilter</text>
  <text x="265" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Sekundäre Kategorien</text>

  <rect x="260" y="176" width="160" height="36" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Parameter-URLs</text>
  <text x="340" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/shoes?color=schwarz</text>

  <rect x="260" y="222" width="160" height="36" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Selbstreferenzierung</text>
  <text x="340" y="251" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">kanonische Tags</text>

  <!-- Tier 3 -->
  <rect x="460" y="48" width="190" height="260" rx="10" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="555" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444">Stufe 3: Blockieren</text>
  <text x="555" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Kein Suchwert</text>

  <text x="480" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Mehrfachauswahlkombinationen</text>
  <text x="480" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Bestellungen sortieren</text>
  <text x="480" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Preisklassen</text>
  <text x="480" y="176" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Bewertungsfilter</text>
  <text x="480" y="196" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">3+ Filterkombinationen</text>

  <rect x="475" y="216" width="160" height="36" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="555" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#ef4444">robots.txt-Block</text>
  <text x="555" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">+ kanonisch zum übergeordneten Element</text>
</svg>