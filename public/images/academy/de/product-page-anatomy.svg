<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Anatomie einer optimierten Produktseite</text>

  <!-- Page outline -->
  <rect x="160" y="38" width="360" height="320" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Breadcrumbs -->
  <text x="180" y="58" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Startseite &gt; Schuhe &gt; Laufen &gt; Trailrunning-Schuhe</text>
  <text x="530" y="58" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">BreadcrumbList-Schema</text>

  <!-- H1 -->
  <rect x="180" y="64" width="320" height="24" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="190" y="80" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="700">H1: Trailrunning-Schuhe – wasserdicht, Größe 10</text>

  <!-- Image + details layout -->
  <rect x="180" y="96" width="140" height="100" rx="4" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="250" y="150" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="10">Produktbild</text>
  <text x="250" y="164" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Beschreibender Alternativtext</text>
  <text x="250" y="176" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">WebP-Format</text>

  <!-- Price + CTA -->
  <rect x="330" y="96" width="170" height="28" rx="4" fill="#1e1e3a" stroke="#4ade80" stroke-width="1"/>
  <text x="415" y="114" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">149,99 $ |  in den Warenkorb legen</text>

  <!-- Trust signals -->
  <text x="340" y="140" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Kostenloser Versand |  30-tägige Rückgabe |  Auf Lager</text>

  <!-- Description -->
  <rect x="330" y="150" width="170" height="46" rx="4" fill="#1e1e3a" stroke="#f97316" stroke-width="1"/>
  <text x="340" y="166" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Einzigartige Beschreibung</text>
  <text x="340" y="180" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Vorteile zuerst, nicht Funktionen zuerst</text>
  <text x="340" y="190" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">100–600 Wörter, je nach Preis</text>

  <!-- Specifications -->
  <rect x="180" y="204" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#60a5fa" stroke-width="1"/>
  <text x="190" y="223" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2: Spezifikationen</text>
  <text x="380" y="223" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Material, Abmessungen, Gewicht</text>

  <!-- Reviews -->
  <rect x="180" y="240" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#4ade80" stroke-width="1"/>
  <text x="190" y="259" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2: Rezensionen (127)</text>
  <text x="380" y="259" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">AggregateRating-Schema</text>

  <!-- Related Products -->
  <rect x="180" y="276" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1"/>
  <text x="190" y="295" fill="#a78bfa" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2: Verwandte Produkte</text>
  <text x="380" y="295" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Möglichkeit zur internen Verlinkung</text>

  <!-- Schema badge -->
  <rect x="180" y="314" width="320" height="28" rx="4" fill="#1e1e3a" stroke="#f97316" stroke-width="1"/>
  <text x="340" y="332" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Produktschema JSON-LD (Name, Preis, SKU, Verfügbarkeit, Bewertungen)</text>

  <!-- Right-side labels -->
  <text x="540" y="80" fill="#a78bfa" font-family="Arial,sans-serif" font-size="7">Keyword-reiches H1</text>
  <text x="540" y="114" fill="#4ade80" font-family="Arial,sans-serif" font-size="7">Vertrauen + Konvertierung</text>
  <text x="540" y="172" fill="#f97316" font-family="Arial,sans-serif" font-size="7">Keine Kopie des Herstellers</text>
  <text x="540" y="259" fill="#4ade80" font-family="Arial,sans-serif" font-size="7">+15–35 % CTR durch Rich-Suchergebnisse</text>

  <text x="340" y="374" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Seiten, die bei allen Elementen eine hohe Punktzahl erzielen, verzeichnen 30–50 % mehr organischen Traffic pro Produkt</text>
</svg>