  <rect x="60" y="198" width="300" height="22" rx="4" fill="#4ade80" opacity="0.08" stroke="#4ade80" stroke-width="1"/>
  <text x="210" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">BreadcrumbList: Inicio &amp;gt; Al aire libre &amp;gt; Muebles de patio &gt; Juegos de comedor</text>
