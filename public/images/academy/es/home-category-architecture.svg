  <text x="82" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Mobiliario + Iluminación + Plantas</text>
  <rect x="150" y="152" width="120" height="35" rx="4" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1"/>
