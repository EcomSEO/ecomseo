  <text x="210" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Jardinería</text>
  <rect x="285" y="35" width="120" height="70" rx="6" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="345" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80" font-weight="bold">Por categoría</text>
