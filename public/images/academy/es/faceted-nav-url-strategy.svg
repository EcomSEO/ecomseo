<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Estrategia de URL de navegación por facetas</text>

  <!-- Página de categoría -->
  <rect x="230" y="44" width="220" height="32" rx="6" fill="#1e1e3a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="64" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">/zapatos/correr</text>

  <!-- Arrow down -->
  <line x1="340" y1="76" x2="340" y2="96" stroke="#475569" stroke-width="1"/>
  <text x="340" y="92" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8" dy="-3">Filtros aplicados</text>

  <!-- Two paths -->
  <line x1="260" y1="96" x2="160" y2="120" stroke="#ef4444" stroke-width="1"/>
  <line x1="420" y1="96" x2="520" y2="120" stroke="#4ade80" stroke-width="1"/>

  <!-- BAD path -->
  <rect x="30" y="120" width="260" height="32" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="140" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="600">/zapatos/running?color=azul&amp;amp;talla=10</text>

  <text x="160" y="162" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="600">Noindex + Canonical para padres</text>
  <text x="160" y="176" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Combinación de filtros de bajo volumen de búsqueda</text>
  <text x="160" y="188" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Crearía miles de páginas delgadas</text>

  <!-- GOOD path -->
  <rect x="390" y="120" width="260" height="32" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="520" y="140" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">/zapatos/botas-cuero-negras</text>

  <text x="520" y="162" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Página de subcategoría indexable</text>
  <text x="520" y="176" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Palabra clave de alto volumen de búsqueda</text>
  <text x="520" y="188" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Contenido único + URL dedicada</text>

  <!-- Crawl math box -->
  <rect x="80" y="210" width="520" height="50" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="340" y="230" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10" font-weight="600">Crawl Math: 5 tamaños x 8 colores x 10 marcas = 400 URL de filtro por categoría</text>
  <text x="340" y="248" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">50 categorías x 400 URL = 20.000 páginas de bajo valor desperdiciando el presupuesto de rastreo</text>

  <!-- Legend -->
  <rect x="190" y="275" width="10" height="10" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="206" y="284" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Bloque / canónico</text>
  <rect x="370" y="275" width="10" height="10" rx="2" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="386" y="284" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Índice como subcategoría</text>
</svg>