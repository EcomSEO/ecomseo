  <rect x="20" y="116" width="130" height="24" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="85" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/blog/consejos-para-correr</text>
  <rect x="20" y="146" width="130" height="24" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="85" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/artículo-descontinuado</text>

  <!-- 301 arrows -->
  <text x="210" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">301</text>
  <line x1="150" y1="68" x2="268" y2="68" stroke="#4ade80" stroke-width="1"/>
  <polygon points="266,65 272,68 266,71" fill="#4ade80"/>
  <line x1="150" y1="98" x2="268" y2="98" stroke="#4ade80" stroke-width="1"/>
  <polygon points="266,95 272,98 266,101" fill="#4ade80"/>
  <line x1="150" y1="128" x2="268" y2="128" stroke="#4ade80" stroke-width="1"/>
  <polygon points="266,125 272,128 266,131" fill="#4ade80"/>
  <line x1="150" y1="158" x2="268" y2="128" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="266,125 272,128 266,131" fill="#f97316"/>

  <!-- New site column -->
  <text x="335" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Nueva plataforma</text>
  <rect x="270" y="56" width="130" height="24" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
