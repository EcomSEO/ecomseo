  <rect x="270" y="116" width="130" height="24" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="335" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/blog/consejos-para-correr</text>

  <!-- Advertencia box -->
  <rect x="30" y="185" width="168" height="42" rx="6" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="114" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#ef4444">Evite las cadenas de redireccionamiento</text>
  <text x="114" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">A &gt; B &gt; C diluye el valor del enlace</text>
  <text x="114" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">y ralentiza el gateo</text>

  <rect x="222" y="185" width="168" height="42" rx="6" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="306" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4ade80">Mantenga las redirecciones permanentes</text>
  <text x="306" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Enlaces externos + referencia de marcadores</text>
  <text x="306" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">URL antiguas durante meses o años</text>
