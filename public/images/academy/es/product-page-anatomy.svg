<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Anatomía de una página de producto optimizada</text>

  <!-- Page outline -->
  <rect x="160" y="38" width="360" height="320" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Migas de pan -->
  <text x="180" y="58" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Inicio &gt; Zapatos &gt; Running &gt; Zapatos de trail running</text>
  <text x="530" y="58" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Esquema de lista de rutas de navegación</text>

  <!-- H1 -->
  <rect x="180" y="64" width="320" height="24" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="190" y="80" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="700">H1: Zapatillas de trail running - Impermeables, talla 10</text>

  <!-- Image + details layout -->
  <rect x="180" y="96" width="140" height="100" rx="4" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="250" y="150" text-anchor="middle" fill="#475569" font-family="Arial,sans-serif" font-size="10">Imagen del producto</text>
  <text x="250" y="164" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Texto alternativo descriptivo</text>
  <text x="250" y="176" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="7">Formato WebP</text>

  <!-- Precio + CTA -->
  <rect x="330" y="96" width="170" height="28" rx="4" fill="#1e1e3a" stroke="#4ade80" stroke-width="1"/>
  <text x="415" y="114" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">$149,99 |  añadir a la cesta</text>

  <!-- Trust signals -->
  <text x="340" y="140" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Envío gratis |  Devoluciones a 30 días |  En stock</text>

  <!-- Description -->
  <rect x="330" y="150" width="170" height="46" rx="4" fill="#1e1e3a" stroke="#f97316" stroke-width="1"/>
  <text x="340" y="166" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Descripción única</text>
  <text x="340" y="180" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Primero los beneficios, no las características</text>
  <text x="340" y="190" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">100-600 palabras según el precio</text>

  <!-- Especificaciones -->
  <rect x="180" y="204" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#60a5fa" stroke-width="1"/>
  <text x="190" y="223" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2: Especificaciones</text>
  <text x="380" y="223" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Material, dimensiones, peso.</text>

  <!-- Reseñas -->
  <rect x="180" y="240" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#4ade80" stroke-width="1"/>
  <text x="190" y="259" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2: Reseñas (127)</text>
  <text x="380" y="259" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Esquema de calificación agregada</text>

  <!-- Productoos relacionados -->
  <rect x="180" y="276" width="320" height="30" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1"/>
  <text x="190" y="295" fill="#a78bfa" font-family="Arial,sans-serif" font-size="9" font-weight="600">H2: Productos relacionados</text>
  <text x="380" y="295" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Oportunidad de vinculación interna</text>

  <!-- Schema badge -->
  <rect x="180" y="314" width="320" height="28" rx="4" fill="#1e1e3a" stroke="#f97316" stroke-width="1"/>
  <text x="340" y="332" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Esquema de producto JSON-LD (nombre, precio, sku, disponibilidad, reseñas)</text>

  <!-- Right-side labels -->
  <text x="540" y="80" fill="#a78bfa" font-family="Arial,sans-serif" font-size="7">H1 rico en palabras clave</text>
  <text x="540" y="114" fill="#4ade80" font-family="Arial,sans-serif" font-size="7">Confianza + conversión</text>
  <text x="540" y="172" fill="#f97316" font-family="Arial,sans-serif" font-size="7">No copia del fabricante</text>
  <text x="540" y="259" fill="#4ade80" font-family="Arial,sans-serif" font-size="7">+15-35 % de CTR gracias a resultados enriquecidos</text>

  <text x="340" y="374" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Las páginas con una puntuación alta en todos los elementos obtienen entre un 30% y un 50% más de tráfico orgánico por producto</text>
</svg>