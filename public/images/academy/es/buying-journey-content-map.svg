<svg viewBox="0 0 480 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Contenido asignado al proceso de compra</text>
  <!-- Funnel stages -->
  <polygon points="60,50 420,50 380,100 100,100" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="240" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">CONCIENCIA (40%)</text>
  <polygon points="100,108 380,108 350,158 130,158" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="240" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">CONSIDERACIÓN (35%)</text>
  <polygon points="130,166 350,166 320,216 160,216" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="240" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">DECISIÓN (25%)</text>
  <!-- Content types on right -->
  <text x="435" y="72" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Artículos instructivos</text>
  <text x="435" y="86" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">guías educativas</text>
  <text x="435" y="130" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">guías de compra</text>
  <text x="435" y="144" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Comparaciones</text>
  <text x="435" y="188" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Páginas de productos</text>
  <text x="435" y="202" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Páginas de destino</text>
  <!-- Audience size arrows -->
  <text x="30" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Grande</text>
  <text x="30" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Medicina</text>
  <text x="30" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Pequeño</text>
  <line x1="30" y1="90" x2="30" y2="210" stroke="#e2e8f0" stroke-width="1" marker-end="url(#arr1)"/>
  <defs><marker id="arr1" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#e2e8f0"/></marker></defs>
  <text x="240" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">La audiencia se reduce a medida que crece la intención de compra</text>
</svg>
