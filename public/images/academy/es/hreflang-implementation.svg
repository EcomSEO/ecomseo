<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Enlaces bidireccionales Hreflang</text>
  <!-- Page A (English) -->
  <rect x="30" y="45" width="130" height="55" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="95" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Página en inglés</text>
  <text x="95" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">hreflang="es"</text>
  <text x="95" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">tienda.com/product-a</text>
  <!-- Page B (German) -->
  <rect x="240" y="45" width="130" height="55" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="305" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Página alemana</text>
  <text x="305" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">hreflang="de"</text>
  <text x="305" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">shop.com/de/product-a</text>
  <!-- Bidirectional arrows -->
  <path d="M165 60 L235 60" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arH1)"/>
  <path d="M235 85 L165 85" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arH2)"/>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">referencias de</text>
  <text x="200" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">referencias atrás</text>
  <!-- Self-reference note -->
  <path d="M55 105 C55 118, 55 118, 55 105" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="95" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">+ hreflang autorreferenciado</text>
  <!-- x-default -->
  <rect x="140" y="130" width="120" height="30" rx="5" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="149" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#f97316">respaldo x-predeterminado</text>
  <path d="M155 130 L95 105" stroke="#f97316" stroke-width="1" stroke-dasharray="3"/>
  <!-- Common errors -->
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#ef4444">Error común: faltan etiquetas de devolución = ignoradas por Google</text>
  <text x="200" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Utilice mapas de sitio XML para tiendas con miles de productos en todos los idiomas</text>
  <defs>
    <marker id="arH1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#a78bfa"/></marker>
    <marker id="arH2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#a78bfa"/></marker>
  </defs>
</svg>