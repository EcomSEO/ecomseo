<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Index Bloat: cómo los filtros multiplican las URL</text>

  <!-- Categoría box -->
  <rect x="240" y="44" width="200" height="32" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="64" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="600">/sofás (200 productos)</text>

  <!-- Lines to filters -->
  <line x1="260" y1="76" x2="100" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="310" y1="76" x2="250" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="370" y1="76" x2="400" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="420" y1="76" x2="550" y2="110" stroke="#475569" stroke-width="1"/>

  <!-- Filtrar boxes -->
  <rect x="30" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="100" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Color (10 opciones)</text>

  <rect x="185" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="255" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Materiales (8 opciones)</text>

  <rect x="340" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="410" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Precio (5 rangos)</text>

  <rect x="495" y="110" width="140" height="28" rx="5" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="565" y="128" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Asientos (4 opciones)</text>

  <!-- Multiplication -->
  <text x="340" y="165" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="13" font-weight="700">10 x 8 x 5 x 4 = 1600 URL de filtro</text>
  <text x="340" y="180" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">de UNA sola categoría (antes de combinaciones de selección múltiple)</text>

  <!-- Bottom comparison -->
  <rect x="60" y="200" width="250" height="50" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="185" y="221" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="600">sin control</text>
  <text x="185" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Más de 1600 URL de bajo valor indexadas</text>

  <rect x="370" y="200" width="250" height="50" rx="6" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-width="1"/>
  <text x="495" y="221" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Con noindex + canónico</text>
  <text x="495" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Solo se indexan entre 3 y 5 filtros de alta demanda</text>

  <text x="340" y="272" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Utilice etiquetas robots.txt, noindex y canonical para controlar qué combinaciones de filtros indexa Google</text>
</svg>
