<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" fill="none">
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Keyword Mapear: Tipo de página to Keyword Assignment</text>
