  <rect x="330" y="168" width="140" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Informativa</text>
  <rect x="475" y="168" width="80" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="515" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">500-5K</text>
  <rect x="560" y="168" width="100" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="610" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">~20 pages</text>
  <!-- Rule box -->
  <rect x="80" y="226" width="520" height="65" rx="8" stroke="#ef4444" stroke-width="1.5" fill="#ef4444" fill-opacity="0.05"/>
  <text x="340" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">One Palabra clave principal = One URL</text>
  <text x="340" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Each keyword sits in exactly one seat. Duplicate assignments cause cannibalization.</text>
  <text x="340" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Add 2-3 secondary keyword variations per page for additional coverage.</text>
</svg>