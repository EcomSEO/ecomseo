<svg viewBox="0 0 420 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Flujo de trabajo de construcción de enlaces rotos</text>
  <rect x="10" y="45" rx="8" width="90" height="50" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="55" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ef4444">Encontrar</text>
  <text x="55" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Enlaces muertos en</text>
  <text x="55" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">sitios especializados</text>
  <path d="M102 70 L118 70" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="120" y="45" rx="8" width="90" height="50" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="165" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Investigación</text>
  <text x="165" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Máquina Wayback</text>
  <text x="165" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">contenido original</text>
  <path d="M212 70 L228 70" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="230" y="45" rx="8" width="90" height="50" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="275" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Crear</text>
  <text x="275" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Mejor reemplazo</text>
  <text x="275" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">contenido</text>
  <path d="M322 70 L338 70" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="45" rx="8" width="70" height="50" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="375" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Superar a</text>
  <text x="375" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Correo electrónico con</text>
  <text x="375" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">reemplazo</text>
  <rect x="30" y="115" rx="6" width="360" height="70" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4" fill="none"/>
  <text x="210" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Presupuesto de tiempo semanal</text>
  <text x="100" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">1 hora de descubrimiento</text>
  <text x="210" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">30 minutos de investigación</text>
  <text x="330" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">1-2 horas de extensión</text>
  <text x="210" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Objetivo: 20-30 nuevos vínculos de retroceso/mes a escala</text>
