<svg viewBox="0 0 420 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Niveles del sitio de destino de publicaciones de invitados</text>
  <polygon points="130,42 290,42 268,90 152,90" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="210" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Nivel 1: RD 60+</text>
  <text x="210" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Las mejores ideas de contenido, muy relevantes</text>
  <polygon points="152,95 268,95 250,138 170,138" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="210" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Nivel 2: DR 30-60</text>
  <text x="210" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Blogs de nicho relevantes</text>
  <polygon points="170,143 250,143 240,178 180,178" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Nivel 3: DR 20-30</text>
  <text x="210" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Microblogs especializados</text>
  <text x="210" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Cree una lista continua de más de 50 sitios. Asigne las mejores ideas al Nivel 1.</text>
</svg>