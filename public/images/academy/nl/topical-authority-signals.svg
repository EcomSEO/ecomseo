<svg viewBox="0 0 480 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">De actuele autoriteitssignalen van Google</text>
  <!-- Three pillars -->
  <rect x="20" y="50" width="130" height="140" rx="10" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="85" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Inhoudsdekking</text>
  <text x="85" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Volledig assortiment</text>
  <text x="85" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">subonderwerpen behandeld</text>
  <text x="85" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Breedte + Diepte</text>
  <text x="85" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">15-25 clusterpagina's</text>
  <text x="85" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">per categorie</text>
  <rect x="175" y="50" width="130" height="140" rx="10" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="240" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Externe validatie</text>
  <text x="240" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Niche-backlinks</text>
  <text x="240" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">van autoriteitssites</text>
  <text x="240" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Tijdschriften uit de industrie</text>
  <text x="240" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Verenigingen</text>
  <text x="240" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Recensiesites</text>
  <rect x="330" y="50" width="130" height="140" rx="10" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="395" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">E-E-A-T</text>
  <text x="395" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Originele fotografie</text>
  <text x="395" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Door experts geschreven specificaties</text>
  <text x="395" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Echte klantrecensies</text>
  <text x="395" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Auteur biografie</text>
  <text x="395" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Transparant ondernemen</text>
