  <rect x="120" y="205" width="240" height="28" rx="6" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="240" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Snellere indexering + hogere rankings</text>
