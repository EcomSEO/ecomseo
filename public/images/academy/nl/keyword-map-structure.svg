<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" fill="none">
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Trefwoordtoewijzing: paginatype aan trefwoordtoewijzing</text>
  <!-- Header row -->
  <rect x="20" y="48" width="120" height="30" rx="4" fill="#a78bfa" fill-opacity="0.15"/>
