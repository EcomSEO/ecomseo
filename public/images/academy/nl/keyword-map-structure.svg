  <text x="610" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#a78bfa">Doeltelling</text>
  <!-- Category row -->
  <rect x="20" y="84" width="120" height="36" rx="4" fill="#60a5fa" fill-opacity="0.08" stroke="#60a5fa" stroke-width="1"/>
  <text x="80" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#60a5fa">Categorie</text>
  <rect x="145" y="84" width="180" height="36" rx="4" fill="#60a5fa" fill-opacity="0.04"/>
  <text x="235" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">dames hardloopschoenen</text>
  <rect x="330" y="84" width="140" height="36" rx="4" fill="#60a5fa" fill-opacity="0.04"/>
  <text x="400" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Commercieel</text>
  <rect x="475" y="84" width="80" height="36" rx="4" fill="#60a5fa" fill-opacity="0.04"/>
  <text x="515" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">1K-50K</text>
  <rect x="560" y="84" width="100" height="36" rx="4" fill="#60a5fa" fill-opacity="0.04"/>
  <text x="610" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">~50 pagina's</text>
  <!-- Product row -->
  <rect x="20" y="126" width="120" height="36" rx="4" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-width="1"/>
  <text x="80" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#4ade80">Product</text>
  <rect x="145" y="126" width="180" height="36" rx="4" fill="#4ade80" fill-opacity="0.04"/>
  <text x="235" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Nike Air Zoom Pegasus 40</text>
  <rect x="330" y="126" width="140" height="36" rx="4" fill="#4ade80" fill-opacity="0.04"/>
  <text x="400" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Transactioneel</text>
  <rect x="475" y="126" width="80" height="36" rx="4" fill="#4ade80" fill-opacity="0.04"/>
  <text x="515" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">50-500</text>
  <rect x="560" y="126" width="100" height="36" rx="4" fill="#4ade80" fill-opacity="0.04"/>
  <text x="610" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">~1.000 pagina's</text>
  <!-- Blog row -->
  <rect x="20" y="168" width="120" height="36" rx="4" fill="#f97316" fill-opacity="0.08" stroke="#f97316" stroke-width="1"/>
  <text x="80" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#f97316">Blog / Gids</text>
  <rect x="145" y="168" width="180" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="235" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">hoe hardloopschoenen te kiezen</text>
  <rect x="330" y="168" width="140" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Informatief</text>
  <rect x="475" y="168" width="80" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="515" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">500-5K</text>
  <rect x="560" y="168" width="100" height="36" rx="4" fill="#f97316" fill-opacity="0.04"/>
  <text x="610" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">~20 pagina's</text>
  <!-- Rule box -->
  <rect x="80" y="226" width="520" height="65" rx="8" stroke="#ef4444" stroke-width="1.5" fill="#ef4444" fill-opacity="0.05"/>
  <text x="340" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">Eén primair trefwoord = één URL</text>
  <text x="340" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Elk zoekwoord bevindt zich op precies één stoel. Dubbele opdrachten veroorzaken kannibalisatie.</text>
  <text x="340" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Voeg twee tot drie secundaire zoekwoordvariaties per pagina toe voor extra dekking.</text>
</svg>