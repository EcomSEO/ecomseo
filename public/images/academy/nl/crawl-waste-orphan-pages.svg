<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Crawl afval versus weespagina's</text>
  <!-- Left: Crawl Waste -->
  <rect x="15" y="38" width="175" height="100" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="102" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Kruipafval</text>
  <text x="102" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Googlebot bezoekt maar geen SEO-waarde</text>
  <text x="30" y="88" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Sessie-ID-URL's</text>
  <text x="30" y="100" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Interne zoekpagina's</text>
  <text x="30" y="112" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Sorteer/filter-combinaties</text>
  <text x="30" y="124" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Winkelwagen/afrekenen/inloggen</text>
  <!-- Right: Orphan Pages -->
  <rect x="210" y="38" width="175" height="100" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="297" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">Weespagina's</text>
  <text x="297" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Bestaan ​​maar nooit gecrawld</text>
  <text x="225" y="88" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Verbroken interne links</text>
  <text x="225" y="100" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Diepe paginering (&amp;gt;pagina 10)</text>
  <text x="225" y="112" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Nieuwe producten ontkoppeld</text>
  <text x="225" y="124" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">&amp;#8226; Geherstructureerde categorieën</text>
  <!-- Bottom target -->
  <rect x="60" y="155" width="280" height="35" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="200" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Doel: 70-80% productieve crawlratio</text>
  <text x="200" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Vergelijk product-DB met loggegevens van 90 dagen om weeskinderen te vinden</text>
</svg>