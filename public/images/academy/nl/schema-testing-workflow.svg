<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Workflow voor het testen en bewaken van gestructureerde gegevens</text>

  <!-- Step 1 -->
  <rect x="30" y="52" width="120" height="70" rx="8" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="90" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">1. Genereren</text>
  <text x="90" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">JSON-LD markup</text>
  <text x="90" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">in paginasjabloon</text>

  <line x1="150" y1="87" x2="180" y2="87" stroke="#a78bfa" stroke-width="1.2"/>
  <polygon points="176,83 186,87 176,91" fill="#a78bfa"/>

  <!-- Step 2 -->
  <rect x="186" y="52" width="120" height="70" rx="8" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="246" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#a78bfa">2. Valideren</text>
  <text x="246" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Rijke resultaattest</text>
  <text x="246" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">+ Schema-validator</text>

  <line x1="306" y1="87" x2="336" y2="87" stroke="#a78bfa" stroke-width="1.2"/>
  <polygon points="332,83 342,87 332,91" fill="#a78bfa"/>

  <!-- Step 3 -->
  <rect x="342" y="52" width="120" height="70" rx="8" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="402" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">3. Inzetten</text>
  <text x="402" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Push to production</text>
  <text x="402" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">in alle sjablonen</text>

  <line x1="462" y1="87" x2="492" y2="87" stroke="#a78bfa" stroke-width="1.2"/>
  <polygon points="488,83 498,87 488,91" fill="#a78bfa"/>

  <!-- Step 4 -->
  <rect x="498" y="52" width="150" height="70" rx="8" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="573" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#f97316">4. Monitor</text>
  <text x="573" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">GSC-verbeteringen</text>
  <text x="573" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">wekelijkse controle</text>

  <!-- Loop back arrow -->
  <line x1="573" y1="122" x2="573" y2="170" stroke="#ef4444" stroke-width="1" stroke-dasharray="4"/>
  <line x1="573" y1="170" x2="90" y2="170" stroke="#ef4444" stroke-width="1" stroke-dasharray="4"/>
  <line x1="90" y1="170" x2="90" y2="122" stroke="#ef4444" stroke-width="1" stroke-dasharray="4"/>
  <text x="340" y="164" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">Fouten gedetecteerd? Herstellen en opnieuw valideren</text>

  <!-- Schedule boxes -->
  <rect x="80" y="192" width="160" height="32" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="160" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Na sjabloonwijzigingen</text>

  <rect x="260" y="192" width="160" height="32" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Wekelijkse GSC-controle</text>

  <rect x="440" y="192" width="180" height="32" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="530" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Maandelijkse full-site crawl</text>
</svg>