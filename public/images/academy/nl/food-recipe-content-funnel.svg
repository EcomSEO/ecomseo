<svg viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Receptinhoud voor aankooptrechter</text>
  <!-- Stage 1: Discovery -->
  <rect x="20" y="40" width="115" height="60" rx="6" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="77" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Ontdekking</text>
  <text x="77" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"makkelijke pastarecepten"</text>
  <text x="77" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"recept voor chocoladetaart"</text>
  <text x="77" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">Receptschema + rijke resultaten</text>
  <!-- Arrow 1 -->
  <line x1="135" y1="70" x2="150" y2="70" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="148,66 156,70 148,74" fill="#60a5fa"/>
  <!-- Stage 2: Engagement -->
  <rect x="155" y="40" width="115" height="60" rx="6" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="212" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">Betrokkenheid</text>
  <text x="212" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Lees het volledige recept</text>
  <text x="212" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Bekijk de video-tutorial</text>
  <text x="212" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Jouw product als steringrediënt</text>
  <!-- Arrow 2 -->
  <line x1="270" y1="70" x2="285" y2="70" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="283,66 291,70 283,74" fill="#4ade80"/>
  <!-- Stage 3: Purchase -->
  <rect x="290" y="40" width="115" height="60" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="347" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" font-weight="bold">Aankoop</text>
  <text x="347" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"Winkel de ingrediënten"</text>
  <text x="347" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Voeg toe aan winkelwagenlinks</text>
  <text x="347" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Directe productconversies</text>
  <!-- Recipe collections below -->
  <text x="210" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Organiseer op collectietype</text>
  <rect x="15" y="140" width="90" height="40" rx="4" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
  <text x="60" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316" font-weight="bold">Per keuken</text>
  <text x="60" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Italiaans, Mexicaans, Thais</text>
  <rect x="115" y="140" width="90" height="40" rx="4" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1"/>
  <text x="160" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" font-weight="bold">Per gelegenheid</text>
  <text x="160" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Vakantie, maaltijdvoorbereiding</text>
  <rect x="215" y="140" width="90" height="40" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80" font-weight="bold">Door dieet</text>
  <text x="260" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Keto, veganistisch, vriendin</text>
  <rect x="315" y="140" width="90" height="40" rx="4" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1"/>
  <text x="360" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="bold">Per ingrediënt</text>
  <text x="360" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Honing, Matcha, Olijfolie</text>
  <!-- Bottom note -->
  <text x="210" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Elke collectiepagina richt zich op een afzonderlijk trefwoordcluster</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">en leidt verkeer naar de productcatalogus</text>
</svg>