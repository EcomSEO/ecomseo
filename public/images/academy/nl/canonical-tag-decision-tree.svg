<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" fill="none">
  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Canonical vs. redirect vs. noindex beslisboom</text>

  <!-- Start node -->
  <rect x="240" y="48" width="200" height="40" rx="8" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="340" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">Dubbele URL gedetecteerd</text>

  <!-- Arrow down -->
  <line x1="340" y1="88" x2="340" y2="118" stroke="#a78bfa" stroke-width="1.2"/>
  <polygon points="334,114 340,124 346,114" fill="#a78bfa"/>

  <!-- Question 1 -->
  <rect x="200" y="124" width="280" height="40" rx="8" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="340" y="149" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Moeten gebruikers beide URL's kunnen bereiken?</text>

  <!-- Left branch: NO -->
  <line x1="200" y1="144" x2="100" y2="144" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="100" y1="144" x2="100" y2="188" stroke="#60a5fa" stroke-width="1.2"/>
  <polygon points="94,184 100,194 106,184" fill="#60a5fa"/>
  <text x="148" y="137" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">NEE</text>

  <!-- 301 Redirect box -->
  <rect x="30" y="196" width="140" height="44" rx="8" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="100" y="214" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">301-redirect</text>
  <text x="100" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Sterkste signaal</text>

  <!-- Right branch: YES -->
  <line x1="480" y1="144" x2="560" y2="144" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="560" y1="144" x2="560" y2="188" stroke="#60a5fa" stroke-width="1.2"/>
  <polygon points="554,184 560,194 566,184" fill="#60a5fa"/>
  <text x="495" y="137" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">JA</text>

  <!-- Question 2 -->
  <rect x="440" y="196" width="240" height="40" rx="8" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="560" y="221" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">Moet één versie ranken?</text>

  <!-- Right-left: YES -->
  <line x1="480" y1="236" x2="420" y2="236" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="420" y1="236" x2="420" y2="280" stroke="#60a5fa" stroke-width="1.2"/>
  <polygon points="414,276 420,286 426,276" fill="#60a5fa"/>
  <text x="435" y="255" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">JA</text>

  <!-- Canonical Tag box -->
  <rect x="340" y="288" width="160" height="44" rx="8" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="420" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">Canonical-tag</text>
  <text x="420" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Hint, geen richtlijn</text>

  <!-- Right-right: NO -->
  <line x1="640" y1="236" x2="640" y2="280" stroke="#60a5fa" stroke-width="1.2"/>
  <polygon points="634,276 640,286 646,276" fill="#60a5fa"/>
  <text x="620" y="255" font-family="Arial,sans-serif" font-size="10" fill="#ef4444">NEE</text>

  <!-- Noindex box -->
  <rect x="570" y="288" width="140" height="44" rx="8" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="640" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f97316">Noindex-tag</text>
  <text x="640" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Verwijderen uit index</text>

  <!-- Use cases labels -->
  <text x="100" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Oude URL's, migraties</text>
  <text x="420" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Filters, varianten, parameters</text>
  <text x="640" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Winkelwagen, zoeken, account</text>
</svg>