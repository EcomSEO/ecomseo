<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 290" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">GSC Pagina-indexeringsstatusdashboard</text>

  <!-- Pie-chart-style breakdown as stacked bar -->
  <rect x="60" y="50" width="560" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Indexed segment -->
  <rect x="60" y="50" width="295" height="36" rx="6" fill="#4ade80" fill-opacity="0.15"/>
  <text x="207" y="73" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Geïndexeerd: 6.500 (65%)</text>

  <!-- Crawled not indexed -->
  <rect x="355" y="50" width="115" height="36" fill="#f97316" fill-opacity="0.12"/>
  <text x="412" y="73" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">Gekropen: 1.500</text>

  <!-- Discovered not indexed -->
  <rect x="470" y="50" width="80" height="36" fill="#60a5fa" fill-opacity="0.12"/>
  <text x="510" y="73" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">Gevonden: 1.000</text>

  <!-- Excluded -->
  <rect x="550" y="50" width="70" height="36" rx="0 6 6 0" fill="#ef4444" fill-opacity="0.1"/>
  <text x="585" y="73" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="600">Overige: 1.000</text>

  <!-- Detailed breakdown -->
  <!-- Crawled not indexed -->
  <rect x="60" y="110" width="270" height="70" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="195" y="130" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Gecrawld - momenteel niet geïndexeerd</text>
  <text x="195" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Google heeft de pagina bezocht, maar afgewezen</text>
  <text x="195" y="166" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Oplossing: verbeter de kwaliteit van de inhoud, voeg unieke tekst toe</text>

  <!-- Discovered not indexed -->
  <rect x="350" y="110" width="270" height="70" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Ontdekt - momenteel niet geïndexeerd</text>
  <text x="485" y="148" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">Google kent de URL, maar heeft deze niet gecrawld</text>
  <text x="485" y="166" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Oplossing: interne links versterken, sitemap verbeteren</text>

  <!-- Action items -->
  <rect x="60" y="200" width="560" height="65" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="340" y="220" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="11" font-weight="600">Maandelijkse controlechecklist</text>
  <text x="150" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Volg geïndexeerde tellingen</text>
  <text x="310" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Redenen voor exportuitsluiting</text>
  <text x="490" y="240" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Groepeer op paginatype</text>
  <text x="150" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Let op plotselinge druppels</text>
  <text x="310" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Categoriseer voor patronen</text>
  <text x="490" y="255" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">Doel systematische oplossingen</text>

  <text x="340" y="285" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Gezond doel: 85-95% van de ingediende product-URL's geïndexeerd</text>
</svg>
