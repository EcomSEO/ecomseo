  <text x="210" y="112" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Hoofdafbeelding zichtbaar</text>

  <rect x="290" y="70" width="155" height="50" rx="6" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-width="1"/>
  <text x="370" y="96" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="14" font-weight="700">2.5-4.0s</text>

  <rect x="460" y="70" width="155" height="50" rx="6" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="96" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="14" font-weight="700">&gt; 4.0s</text>

