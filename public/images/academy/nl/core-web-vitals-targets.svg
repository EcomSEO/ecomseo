  <text x="540" y="56" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="600">Slecht</text>

  <!-- LCP Row -->
  <rect x="30" y="70" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="80" y="92" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="700">LCP</text>
  <text x="80" y="108" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Laden</text>

  <rect x="145" y="70" width="130" height="50" rx="6" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-width="1"/>
