  <text x="80" y="170" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7">Interactiviteit</text>

  <rect x="145" y="132" width="130" height="50" rx="6" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-width="1"/>
