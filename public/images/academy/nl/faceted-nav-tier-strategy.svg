<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">3-laags gefacetteerde navigatiestrategie</text>

  <!-- Tier 1 -->
  <rect x="30" y="48" width="190" height="260" rx="10" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="125" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Niveau 1: Index</text>
  <text x="125" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Hoge zoekvraag</text>

  <text x="50" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Merkfilters</text>
  <text x="50" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Producttype</text>
  <text x="50" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Belangrijkste materialen</text>

  <rect x="45" y="176" width="160" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Schone URL's</text>
  <text x="125" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/schoenen/nike/</text>

  <rect x="45" y="222" width="160" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Unieke inhoud</text>
  <text x="125" y="251" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Aangepaste H1, meta, intro</text>

  <rect x="45" y="268" width="160" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Interne links</text>

  <!-- Tier 2 -->
  <rect x="245" y="48" width="190" height="260" rx="10" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="340" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f97316">Niveau 2: voorzichtig</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Enig zoekpotentieel</text>

  <text x="265" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Kleurfilters</text>
  <text x="265" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Stijlfilters</text>
  <text x="265" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Secundaire categorieën</text>

  <rect x="260" y="176" width="160" height="36" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Parameter-URL's</text>
  <text x="340" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/schoenen?kleur=zwart</text>

  <rect x="260" y="222" width="160" height="36" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Naar zichzelf verwijzend</text>
  <text x="340" y="251" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">canonieke tags</text>

  <!-- Tier 3 -->
  <rect x="460" y="48" width="190" height="260" rx="10" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="555" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444">Niveau 3: Blok</text>
  <text x="555" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Geen zoekwaarde</text>

  <text x="480" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Combinaties met meerdere selecties</text>
  <text x="480" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Sorteer bestellingen</text>
  <text x="480" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Prijsklassen</text>
  <text x="480" y="176" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Beoordelingsfilters</text>
  <text x="480" y="196" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">3+ filtercombinaties</text>

  <rect x="475" y="216" width="160" height="36" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="555" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#ef4444">robots.txt-blok</text>
  <text x="555" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">+ canoniek voor ouder</text>
</svg>