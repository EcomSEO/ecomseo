<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Title Tag Formulas for Ecommerce</text>

  <!-- Product page formula -->
  <text x="40" y="56" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="700">Productpagina's</text>
  <rect x="40" y="64" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="60" y="82" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Product Name</text>
  <text x="170" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="190" y="82" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Key Attribute</text>
  <text x="290" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="310" y="82" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Merk</text>
  <text x="360" y="82" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="380" y="82" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Store Name</text>
  <text x="60" y="98" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Organic Cotton Bath Towels Set of 4 - Sage Green | Brooklinen</text>

  <!-- Category page formula -->
  <text x="40" y="130" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Categoriepagina's</text>
  <rect x="40" y="138" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="60" y="156" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Category Keyword</text>
  <text x="195" y="156" fill="#475569" font-family="Arial,sans-serif" font-size="10">+</text>
  <text x="215" y="156" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Qualifier</text>
  <text x="285" y="156" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="305" y="156" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Store Name</text>
  <text x="60" y="172" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Women's Running Shoes - Top Brands, Free Returns | FitGear</text>

  <!-- Homepage formula -->
  <text x="40" y="204" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Homepage</text>
  <rect x="40" y="212" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="60" y="230" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Brand Name</text>
  <text x="155" y="230" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="175" y="230" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Primair zoekwoord</text>
  <text x="300" y="230" fill="#475569" font-family="Arial,sans-serif" font-size="10">|</text>
  <text x="320" y="230" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Differentiator</text>
  <text x="60" y="246" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">TrailGear | Outdoor Gear &amp; Camping Equipment | Free Shipping Over $50</text>

  <!-- Character count guide -->
  <rect x="40" y="268" width="600" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="268" width="350" height="36" rx="6" fill="#4ade80" fill-opacity="0.06"/>
  <text x="215" y="288" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">Safe zone: first 50 characters (always visible)</text>
  <line x1="390" y1="268" x2="390" y2="304" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="490" y="288" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="9">50-60 chars: may truncate</text>

  <text x="340" y="316" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Front-load primary keywords in the first 50 characters for maximum ranking impact</text>
</svg>