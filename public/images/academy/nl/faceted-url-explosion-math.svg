<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Facetnavigatie: combinatorische URL-explosie</text>

  <!-- Filter groups -->
  <rect x="30" y="50" width="110" height="56" rx="6" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="85" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">Merk</text>
  <text x="85" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">10</text>
  <text x="85" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">opties</text>

  <text x="158" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">x</text>

  <rect x="176" y="50" width="110" height="56" rx="6" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="231" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">Kleur</text>
  <text x="231" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">12</text>
  <text x="231" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">opties</text>

  <text x="304" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">x</text>

  <rect x="322" y="50" width="110" height="56" rx="6" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="377" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">Maat</text>
  <text x="377" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">8</text>
  <text x="377" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">opties</text>

  <text x="450" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">x</text>

  <rect x="468" y="50" width="110" height="56" rx="6" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="523" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">Prijs</text>
  <text x="523" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">5</text>
  <text x="523" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">bereiken</text>

  <text x="596" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">x</text>

  <rect x="614" y="50" width="52" height="56" rx="6" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="640" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">Soort</text>
  <text x="640" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">4</text>

  <!-- Equals -->
  <text x="340" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">=</text>

  <!-- Result -->
  <rect x="180" y="155" width="320" height="56" rx="10" stroke="#ef4444" stroke-width="2" fill="none"/>
  <text x="340" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#ef4444">19.200+</text>
  <text x="340" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">crawlbare URL's van EEN categoriepagina</text>

  <!-- Bottom note -->
  <text x="340" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">Als multi-select is ingeschakeld, groeit dit aantal exponentieel tot miljoenen</text>
  <text x="340" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Oplossing: Blokkeer Tier 3-filters, zorg ervoor dat alleen hoogwaardige combinaties indexeerbaar blijven</text>
</svg>