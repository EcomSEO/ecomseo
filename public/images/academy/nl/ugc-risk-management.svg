  <text x="297" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Dupes van meerdere pagina's</text>
  <line x1="260" y1="115" x2="335" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
