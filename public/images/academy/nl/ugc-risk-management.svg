  <text x="182" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"Geweldig!" / "Slecht"</text>
  <line x1="145" y1="115" x2="220" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
