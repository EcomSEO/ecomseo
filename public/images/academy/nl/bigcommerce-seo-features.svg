<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">BigCommerce ingebouwde SEO-functies</text>
  <!-- Grid of features -->
  <!-- Row 1 -->
  <rect x="25" y="42" width="115" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="82" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Metatags</text>
  <text x="82" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Titel, beschrijving, naaktslak</text>
  <text x="82" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">per pagina in admin</text>

  <rect x="152" y="42" width="115" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">XML-sitemap</text>
  <text x="210" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Automatisch gegenereerd</text>
  <text x="210" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">controle per pagina</text>

  <rect x="279" y="42" width="115" height="50" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="337" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Akamai CDN</text>
  <text x="337" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">WebP automatische conversie</text>
  <text x="337" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">responsieve afbeeldingen</text>

  <!-- Row 2 -->
  <rect x="25" y="104" width="115" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="82" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Productschema</text>
  <text x="82" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">JSON-LD met prijs,</text>
  <text x="82" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">beoordelingen, beschikbaarheid</text>

  <rect x="152" y="104" width="115" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="210" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Robots.txt</text>
  <text x="210" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Bewerkbaar via</text>
  <text x="210" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">beheerderspaneel</text>

  <rect x="279" y="104" width="115" height="50" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="337" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Canonieke tags</text>
  <text x="337" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Automatisch gegenereerd</text>
  <text x="337" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">voor alle producten</text>

  <!-- Comparison bar -->
  <rect x="25" y="175" width="369" height="32" rx="6" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <text x="210" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">Allemaal native - geen apps van derden vereist voor kern-SEO</text>
  <text x="210" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Ontbrekend: broodkruimelschema, FAQ-schema, hreflang (handmatig toevoegen in stencil)</text>

  <!-- Legend -->
  <rect x="110" y="225" width="8" height="8" rx="2" fill="#4ade80"/>
  <text x="123" y="233" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Inhoudscontroles</text>
  <rect x="220" y="225" width="8" height="8" rx="2" fill="#60a5fa"/>
  <text x="233" y="233" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Technische SEO</text>
</svg>