  <!-- Authority percentage labels -->
  <text x="140" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">ontvangt ~20% eigen vermogen</text>
  <text x="280" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">~20% eigen vermogen</text>
  <text x="410" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">~15% eigen vermogen</text>
  <text x="540" y="224" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="8">~15% eigen vermogen</text>

  <!-- Right side: content structure -->
