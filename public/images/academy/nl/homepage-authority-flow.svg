  <!-- Warning box -->
  <rect x="120" y="250" width="440" height="36" rx="5" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="266" text-anchor="middle" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="600">Veelgemaakte fout: linken naar 200 producten vanaf de startpagina</text>
  <text x="340" y="280" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">De autoriteit is zo dun verspreid dat geen enkele schakel betekenisvol gewicht heeft</text>

  <text x="340" y="310" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Houd de links naar uw startpagina gericht op uw top 10-15 van belangrijkste interne bestemmingen</text>
