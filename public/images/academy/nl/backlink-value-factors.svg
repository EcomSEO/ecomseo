<svg viewBox="0 0 420 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">4 factoren die een backlink waardevol maken</text>
  <rect x="20" y="40" rx="8" width="175" height="90" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="107" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">1. Relevantie</text>
  <text x="107" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">De linkende site heeft betrekking op uw</text>
  <text x="107" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">niche- of productcategorie</text>
  <text x="107" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Hoogste impactfactor</text>
  <rect x="225" y="40" rx="8" width="175" height="90" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="312" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">2. Autoriteit</text>
  <text x="312" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Domeinbeoordeling / vertrouwen</text>
  <text x="312" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">van de linkende website</text>
  <text x="312" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">DR 50+ = sterk signaal</text>
  <rect x="20" y="150" rx="8" width="175" height="90" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="107" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">3. Plaatsing</text>
  <text x="107" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Redactionele links in de inhoud</text>
  <text x="107" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">beat voettekst/zijbalklinks</text>
  <text x="107" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Hoofdtekst = meeste waarde</text>
  <rect x="225" y="150" rx="8" width="175" height="90" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="312" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">4. Dofollow</text>
  <text x="312" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Dofollow slaagt voor de ranking</text>
  <text x="312" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">waarde; nofollow niet</text>
  <text x="312" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Target dofollow-links</text>
</svg>