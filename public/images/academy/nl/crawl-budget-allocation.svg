<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Crawlbudgetverdeling: voor vs. na optimalisatie</text>

  <!-- Before section -->
  <text x="170" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444">Voor</text>

  <!-- Before bar: filter pages 85% -->
  <rect x="40" y="72" width="255" height="28" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <rect x="40" y="72" width="255" height="28" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="168" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#ef4444">Filter-/parameterpagina's — 85%</text>

  <!-- Before bar: product pages 10% -->
  <rect x="40" y="108" width="30" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <rect x="40" y="108" width="30" height="28" rx="4" fill="#4ade80" opacity="0.15"/>
  <text x="120" y="126" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Productpagina's — 10%</text>

  <!-- Before bar: other 5% -->
  <rect x="40" y="144" width="15" height="28" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <rect x="40" y="144" width="15" height="28" rx="4" fill="#60a5fa" opacity="0.15"/>
  <text x="100" y="162" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">Categorieën — 5%</text>

  <!-- Arrow -->
  <line x1="340" y1="80" x2="340" y2="170" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="340" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#a78bfa">→</text>

  <!-- After section -->
  <text x="510" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Na</text>

  <!-- After bar: product pages 55% -->
  <rect x="380" y="72" width="165" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <rect x="380" y="72" width="165" height="28" rx="4" fill="#4ade80" opacity="0.15"/>
  <text x="462" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">Productpagina's — 55%</text>

  <!-- After bar: categories 25% -->
  <rect x="380" y="108" width="75" height="28" rx="4" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <rect x="380" y="108" width="75" height="28" rx="4" fill="#60a5fa" opacity="0.15"/>
  <text x="480" y="126" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">Categorieën — 25%</text>

  <!-- After bar: filter pages 20% -->
  <rect x="380" y="144" width="60" height="28" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <rect x="380" y="144" width="60" height="28" rx="4" fill="#f97316" opacity="0.15"/>
  <text x="475" y="162" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Filterpagina's — 20%</text>

  <!-- Impact stats -->
  <rect x="80" y="210" width="520" height="70" rx="8" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <text x="340" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#a78bfa">Impact van crawlbudgetherverdeling</text>
  <text x="180" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#4ade80">+45% productcrawls</text>
  <text x="340" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa">30% snellere indexering</text>
  <text x="500" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f97316">-65% verspilde crawls</text>
</svg>