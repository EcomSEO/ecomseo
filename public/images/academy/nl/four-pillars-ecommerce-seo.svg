  <polygon points="128,76 132,82 136,76" fill="#4ade80"/>

  <text x="340" y="286" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Alle vier de pijlers werken samen. Begin met technische SEO om al het andere te deblokkeren.</text>
