<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Crawlbudget = Crawlsnelheidslimiet + Crawlvraag</text>

  <!-- Crawl Rate Limit -->
  <rect x="40" y="52" width="260" height="170" rx="10" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="170" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#60a5fa">Limiet voor crawlsnelheid</text>
  <text x="170" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">Servercapaciteit</text>

  <circle cx="80" cy="128" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="96" y="132" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Reactietijd van server</text>
  <circle cx="80" cy="154" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="96" y="158" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Hosting-infrastructuur</text>
  <circle cx="80" cy="180" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="96" y="184" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Gelijktijdige verbindingen</text>
  <circle cx="80" cy="206" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="96" y="210" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Foutpercentage (5xx vertraagt ​​het crawlen)</text>

  <!-- Plus sign -->
  <text x="340" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#a78bfa">+</text>

  <!-- Crawl Demand -->
  <rect x="380" y="52" width="260" height="170" rx="10" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="510" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Crawlvraag</text>
  <text x="510" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">Google's interesse</text>

  <circle cx="420" cy="128" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="436" y="132" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Populariteit van pagina</text>
  <circle cx="420" cy="154" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="436" y="158" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Versheid van de inhoud</text>
  <circle cx="420" cy="180" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="436" y="184" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Backlink-autoriteit</text>
  <circle cx="420" cy="206" r="6" stroke="#e2e8f0" stroke-width="1" fill="none"/>
  <text x="436" y="210" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Sitemapsignalen</text>
</svg>