  <text x="260" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Fonti sottoposte a revisione paritaria</text>
  <rect x="315" y="35" width="90" height="100" rx="6" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.5"/>
  <text x="360" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316" font-weight="bold">Fiducia</text>
  <text x="360" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Disclaimer medici</text>
