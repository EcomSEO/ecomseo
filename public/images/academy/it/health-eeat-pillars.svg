  <text x="260" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Studi citati</text>
  <text x="260" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">FDA/rif. medici</text>
