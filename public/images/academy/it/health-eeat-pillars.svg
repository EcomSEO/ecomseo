<svg viewBox="0 0 420 210" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">E-E-A-T per la salute e la salute Bellezza YMYL</text>
  <!-- Four pillars -->
  <rect x="15" y="35" width="90" height="100" rx="6" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1.5"/>
