  <text x="160" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Pagine bio + link</text>
  <text x="160" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Pagina "I nostri esperti".</text>
