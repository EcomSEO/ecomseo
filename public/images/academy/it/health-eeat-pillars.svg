  <text x="60" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Risultati prima/dopo</text>
  <text x="60" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Recensioni dei clienti</text>
