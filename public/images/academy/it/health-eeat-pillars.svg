  <text x="60" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">UGC + testimonianze</text>
  <rect x="115" y="35" width="90" height="100" rx="6" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
