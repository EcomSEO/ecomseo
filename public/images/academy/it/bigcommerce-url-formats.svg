<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 230" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Opzioni di formato URL di BigCommerce</text>
  <!-- Option 1 - SEO Optimized -->
  <rect x="30" y="42" width="360" height="40" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="45" y="58" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Ottimizzato per SEO (consigliato)</text>
  <text x="45" y="72" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">example.com/scarpe-da-running-blu/</text>
  <text x="350" y="65" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Piatto, pulito</text>
  <!-- Option 2 - Short -->
  <rect x="30" y="92" width="360" height="40" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="45" y="108" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">URL brevi</text>
  <text x="45" y="122" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">example.com/scarpe-da-running-blu/</text>
  <text x="350" y="115" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Lumaca minima</text>
  <!-- Option 3 - Category-pathed -->
  <rect x="30" y="142" width="360" height="40" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="45" y="158" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Percorso di categoria</text>
  <text x="45" y="172" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">example.com/shoes/running/scarpe-da-running-blu/</text>
  <text x="350" y="158" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#f97316">Più a lungo, rischio di</text>
  <text x="350" y="168" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#f97316">duplicati</text>
  <!-- Comparison -->
  <text x="210" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">vs. Shopify (prefisso forzato):</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">shopify-store.com/products/blue-running-shoes</text>
</svg>