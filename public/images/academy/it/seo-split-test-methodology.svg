<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">SEO Split Test Methodology</text>
  <!-- Page pool -->
  <rect x="130" y="35" width="140" height="30" rx="5" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">1,000 Similar Product Pages</text>
  <!-- Split arrows -->
  <path d="M160 65 L80 85" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arS1)"/>
  <path d="M240 65 L320 85" stroke="#f97316" stroke-width="1.5" marker-end="url(#arS2)"/>
  <!-- Control -->
  <rect x="20" y="88" width="130" height="45" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="85" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Control: 500 pages</text>
  <text x="85" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">No changes applied</text>
  <text x="85" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Baseline reference</text>
  <!-- Variant -->
  <rect x="250" y="88" width="130" height="45" rx="6" stroke="#f97316" stroke-width="1.5"/>
  <text x="315" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Variant: 500 pages</text>
  <text x="315" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Title tag change applied</text>
  <text x="315" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Measure difference</text>
  <!-- Timeline -->
  <line x1="50" y1="155" x2="350" y2="155" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="100" cy="155" r="3" fill="#a78bfa"/>
  <text x="100" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Pre-test</text>
  <text x="100" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">2-4 weeks</text>
  <circle cx="200" cy="155" r="3" fill="#f97316"/>
  <text x="200" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#f97316">Change applied</text>
  <circle cx="300" cy="155" r="3" fill="#4ade80"/>
  <text x="300" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Results</text>
  <text x="300" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8">2-6 weeks</text>
  <!-- Significance -->
  <text x="200" y="197" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">95% confidence threshold required</text>
  <defs>
    <marker id="arS1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#4ade80"/></marker>
    <marker id="arS2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#f97316"/></marker>
  </defs>
</svg>