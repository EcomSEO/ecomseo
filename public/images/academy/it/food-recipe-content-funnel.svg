<svg viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Contenuto della ricetta per l'imbuto di acquisto</text>
  <!-- Stage 1: Discovery -->
  <rect x="20" y="40" width="115" height="60" rx="6" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="77" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Scoperta</text>
  <text x="77" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"ricette di pasta facili"</text>
  <text x="77" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"ricetta torta al cioccolato"</text>
  <text x="77" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">Schema della ricetta + risultati ricchi</text>
  <!-- Arrow 1 -->
  <line x1="135" y1="70" x2="150" y2="70" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="148,66 156,70 148,74" fill="#60a5fa"/>
  <!-- Stage 2: Engagement -->
  <rect x="155" y="40" width="115" height="60" rx="6" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="212" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">Fidanzamento</text>
  <text x="212" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Leggi la ricetta completa</text>
  <text x="212" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Guarda il videotutorial</text>
  <text x="212" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Il tuo prodotto come ingrediente principale</text>
  <!-- Arrow 2 -->
  <line x1="270" y1="70" x2="285" y2="70" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="283,66 291,70 283,74" fill="#4ade80"/>
  <!-- Stage 3: Purchase -->
  <rect x="290" y="40" width="115" height="60" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="347" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" font-weight="bold">Acquistare</text>
  <text x="347" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"Acquista gli ingredienti"</text>
  <text x="347" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Aggiungi al carrello i link</text>
  <text x="347" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Conversioni dirette del prodotto</text>
  <!-- Recipe collections below -->
  <text x="210" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Organizza per tipo di raccolta</text>
  <rect x="15" y="140" width="90" height="40" rx="4" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
  <text x="60" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f97316" font-weight="bold">Per Cucina</text>
  <text x="60" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Italiana, messicana, tailandese</text>
  <rect x="115" y="140" width="90" height="40" rx="4" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1"/>
  <text x="160" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" font-weight="bold">Per occasione</text>
  <text x="160" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Vacanze, preparazione dei pasti</text>
  <rect x="215" y="140" width="90" height="40" rx="4" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80" font-weight="bold">Per dieta</text>
  <text x="260" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Keto, vegano, fidanzata</text>
  <rect x="315" y="140" width="90" height="40" rx="4" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1"/>
  <text x="360" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="bold">Per ingrediente</text>
  <text x="360" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Miele, Matcha, Olio d'oliva</text>
  <!-- Bottom note -->
  <text x="210" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Ogni pagina di raccolta ha come target un cluster di parole chiave distinto</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">e incanala il traffico verso il catalogo prodotti</text>
</svg>