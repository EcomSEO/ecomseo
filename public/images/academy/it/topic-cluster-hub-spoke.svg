  <line x1="90" y1="80" x2="210" y2="42" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4"/>
  <line x1="90" y1="240" x2="212" y2="280" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4"/>
  <text x="240" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Solid lines = hub links | Dashed = cross-links between spokes</text>
