  <text x="240" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Page (Hub)</text>
  <!-- Spokes -->
  <line x1="195" y1="160" x2="80" y2="80" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="65" cy="70" r="30" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1.2"/>
