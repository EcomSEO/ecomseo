<svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Hub-and-Spoke Topic Cluster</text>
  <!-- Hub center -->
  <circle cx="240" cy="160" r="45" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="2"/>
