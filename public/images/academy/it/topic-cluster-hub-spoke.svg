  <text x="65" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Guide</text>
  <line x1="240" y1="115" x2="240" y2="52" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="240" cy="42" r="28" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1.2"/>
  <text x="240" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">How-to</text>
  <text x="240" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Article</text>
  <line x1="285" y1="160" x2="400" y2="80" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="415" cy="70" r="30" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.2"/>
  <text x="415" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">X vs Y</text>
  <text x="415" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Compare</text>
  <line x1="195" y1="175" x2="75" y2="240" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="60" cy="250" r="30" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="60" y="246" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Care</text>
  <text x="60" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Guide</text>
  <line x1="240" y1="205" x2="240" y2="268" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="240" cy="280" r="28" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1.2"/>
  <text x="240" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">FAQ</text>
  <text x="240" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Page</text>
  <line x1="285" y1="175" x2="400" y2="240" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="415" cy="250" r="30" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.2"/>
  <text x="415" y="246" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Blog</text>
  <text x="415" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Post</text>
