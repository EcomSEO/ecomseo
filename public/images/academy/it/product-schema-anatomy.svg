<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Anatomia dello schema del prodotto per risultati ricchi</text>

  <!-- JSON-LD container -->
  <rect x="30" y="44" width="620" height="270" rx="10" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="50" y="66" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">&amp;lt;script type="application/ld+json"&amp;gt;</text>

  <!-- Required fields -->
  <rect x="50" y="78" width="280" height="130" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="190" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Proprietà richieste</text>

  <text x="70" y="118" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"name": "Scarpe da corsa blu"</text>
  <text x="70" y="138" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"immagine": "prodotto.jpg"</text>
  <text x="70" y="158" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"offerte.prezzo": "89,99"</text>
  <text x="70" y="178" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"offers.priceCurrency": "USD"</text>
  <text x="70" y="198" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"offers.availability": "InStock"</text>

  <!-- Recommended fields -->
  <rect x="350" y="78" width="280" height="130" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="490" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">Proprietà consigliate</text>

  <text x="370" y="118" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"marca": "Nike"</text>
  <text x="370" y="138" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"sku": "NK-RUN-BLU-42"</text>
  <text x="370" y="158" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"gtin": "0123456789012"</text>
  <text x="370" y="178" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"description": "Leggero..."</text>
  <text x="370" y="198" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">"aggregateRating": 4,3 / 128</text>

  <!-- Rich Result preview -->
  <rect x="50" y="222" width="580" height="76" rx="6" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="60" y="240" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Anteprima dei risultati avanzati di Google</text>

  <text x="60" y="260" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#60a5fa">Scarpe da corsa blu - Nike | YourStore.com</text>
  <text x="60" y="278" font-family="Arial,sans-serif" font-size="10" fill="#f97316">★★★★☆ 4.3 (128 recensioni)</text>
  <text x="260" y="278" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">$ 89,99</text>
  <text x="330" y="278" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">In magazzino</text>
  <text x="60" y="292" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Scarpe da corsa leggere con ammortizzazione reattiva...</text>
</svg>