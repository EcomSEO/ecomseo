<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Strategia di navigazione sfaccettata a 3 livelli</text>

  <!-- Tier 1 -->
  <rect x="30" y="48" width="190" height="260" rx="10" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="125" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Livello 1: Indice</text>
  <text x="125" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Elevata richiesta di ricerca</text>

  <text x="50" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Filtri di marca</text>
  <text x="50" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Tipo di prodotto</text>
  <text x="50" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Materiali chiave</text>

  <rect x="45" y="176" width="160" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">URL puliti</text>
  <text x="125" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/scarpe/nike/</text>

  <rect x="45" y="222" width="160" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Contenuti unici</text>
  <text x="125" y="251" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">H1 personalizzato, meta, introduzione</text>

  <rect x="45" y="268" width="160" height="28" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="125" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Collegamenti interni</text>

  <!-- Tier 2 -->
  <rect x="245" y="48" width="190" height="260" rx="10" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="340" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f97316">Livello 2: prudente</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Qualche potenziale di ricerca</text>

  <text x="265" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Filtri colorati</text>
  <text x="265" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Filtri di stile</text>
  <text x="265" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Categorie secondarie</text>

  <rect x="260" y="176" width="160" height="36" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">URL dei parametri</text>
  <text x="340" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/scarpe?colore=nero</text>

  <rect x="260" y="222" width="160" height="36" rx="4" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="340" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Autoreferenziazione</text>
  <text x="340" y="251" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">tag canonici</text>

  <!-- Tier 3 -->
  <rect x="460" y="48" width="190" height="260" rx="10" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="555" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444">Livello 3: blocco</text>
  <text x="555" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Nessun valore di ricerca</text>

  <text x="480" y="116" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Combo a selezione multipla</text>
  <text x="480" y="136" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Ordina gli ordini</text>
  <text x="480" y="156" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Fasce di prezzo</text>
  <text x="480" y="176" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Filtri di valutazione</text>
  <text x="480" y="196" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">3+ combinazioni di filtri</text>

  <rect x="475" y="216" width="160" height="36" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="555" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#ef4444">blocco robots.txt</text>
  <text x="555" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">+ canonico al genitore</text>
</svg>