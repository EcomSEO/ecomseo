<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Finding Quick Wins in Google Search Console</text>

  <!-- Position scale -->
  <text x="340" y="52" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9">Google Search Results Position</text>

  <!-- Position bar -->
  <rect x="60" y="60" width="560" height="24" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>

  <!-- Position markers -->
  <text x="83" y="76" fill="#4ade80" font-family="Arial,sans-serif" font-size="8" font-weight="600">1</text>
  <text x="120" y="76" fill="#4ade80" font-family="Arial,sans-serif" font-size="8">3</text>
  <text x="177" y="76" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">5</text>
  <text x="290" y="76" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">10</text>
  <text x="330" y="76" fill="#f97316" font-family="Arial,sans-serif" font-size="8">11</text>
  <text x="560" y="76" fill="#ef4444" font-family="Arial,sans-serif" font-size="8">20</text>

  <!-- Zone 1: Top 3 -->
  <rect x="60" y="60" width="80" height="24" rx="4" fill="#4ade80" fill-opacity="0.1"/>

  <!-- Zone 2: Positions 5-10 -->
  <rect x="170" y="60" width="140" height="24" rx="4" fill="#60a5fa" fill-opacity="0.1"/>

  <!-- Zone 3: Positions 11-20 -->
  <rect x="320" y="60" width="250" height="24" rx="4" fill="#f97316" fill-opacity="0.1"/>

  <!-- Zone descriptions -->
  <!-- Zone: Top 3 -->
  <rect x="40" y="100" width="170" height="70" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1"/>
  <text x="125" y="118" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Top 3: CTR gold zone</text>
  <text x="125" y="134" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">CTR: 10-30%</text>
  <text x="125" y="150" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Check: is your CTR at benchmark?</text>
  <text x="125" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Fix: improve title tags &amp; metas</text>

  <!-- Zone: 5-10 -->
  <rect x="225" y="100" width="210" height="70" rx="6" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="330" y="118" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">Positions 5-10: Quick wins</text>
  <text x="330" y="134" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">CTR: 3-5% (below the fold)</text>
  <text x="330" y="150" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Small relevance boost = top 3</text>
  <text x="330" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Fix: content depth + title tags</text>

  <!-- Zone: 11-20 -->
  <rect x="450" y="100" width="190" height="70" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="545" y="118" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Page 2: Biggest upside</text>
  <text x="545" y="134" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">CTR: &lt;1% (near-invisible)</text>
  <text x="545" y="150" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Content boost + links = page 1</text>
  <text x="545" y="162" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Fix: expand content + backlinks</text>

  <!-- Example calculation -->
  <rect x="100" y="190" width="480" height="60" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="340" y="212" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="11" font-weight="600">Example: keyword with 8,000 monthly impressions</text>
  <text x="340" y="230" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Position 7 = 240 clicks/mo</text>
  <text x="340" y="230" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10" dx="160">&#8594;</text>
  <text x="340" y="230" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" dx="240" font-weight="600">Position 3 = 1,200 clicks/mo</text>
  <text x="340" y="244" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="9">5x more traffic from the same keyword</text>

  <!-- Bottom note -->
  <text x="340" y="280" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Filter GSC queries by position 5-20 to find your highest-impact optimization opportunities</text>
</svg>
