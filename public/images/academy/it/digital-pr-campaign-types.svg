<svg viewBox="0 0 420 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Tipi di campagne di PR digitali per l'e-commerce</text>
  <rect x="20" y="42" rx="8" width="120" height="80" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="80" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">Studi sui dati</text>
  <text x="80" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Tendenze delle vendite,</text>
  <text x="80" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">sondaggi sui consumatori,</text>
  <text x="80" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">analisi dei prezzi</text>
  <text x="80" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">20-100 link/campagna</text>
  <rect x="150" y="42" rx="8" width="120" height="80" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="210" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">PR del prodotto</text>
  <text x="210" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Guide ai regali,</text>
  <text x="210" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">recensioni di prodotti,</text>
  <text x="210" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">lanciare storie</text>
  <text x="210" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Collegamenti alle pagine dei prodotti</text>
  <rect x="280" y="42" rx="8" width="120" height="80" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="340" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">PR reattivo</text>
  <text x="340" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Commento degli esperti,</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">risposte HARO,</text>
  <text x="340" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">newsjacking</text>
  <text x="340" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Finestra di 24-48 ore</text>
  <rect x="40" y="140" rx="6" width="340" height="76" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4" fill="none"/>
  <text x="210" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Misurazione del ROI</text>
  <text x="120" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Link guadagnati</text>
  <text x="210" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Media DA</text>
  <text x="300" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Costo/collegamento</text>
  <text x="210" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">5 collegamenti da oltre 70 siti DR &gt; 50 collegamenti da blog con bassa autorità</text>
</svg>