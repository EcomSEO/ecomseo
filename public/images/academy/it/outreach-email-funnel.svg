<svg viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Funnel di conversione di sensibilizzazione via e-mail</text>
  <polygon points="80,45 320,45 290,90 110,90" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="200" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">100 potenziali clienti</text>
  <text x="200" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Qualificato, DR 30+, rilevante per la nicchia</text>
  <polygon points="110,95 290,95 270,135 130,135" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="200" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">40-60 Aperti</text>
  <text x="200" y="127" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Benchmark del tasso di apertura del 40-60%.</text>
  <polygon points="130,140 270,140 252,175 148,175" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="200" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f97316">8-15 Risposte</text>
  <text x="200" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Il 50-70% proviene dai follow-up</text>
  <polygon points="148,180 252,180 240,210 160,210" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="200" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">3-7 Collegamenti posizionati</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Il 30-50% delle risposte positive si convertono in link</text>
</svg>