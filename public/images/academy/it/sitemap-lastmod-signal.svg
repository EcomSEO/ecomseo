<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Mappa del sito Lastmod: accurato vs. errato</text>

  <!-- Correct -->
  <rect x="30" y="48" width="290" height="180" rx="10" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="175" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#4ade80">Lastmod accurato</text>

  <text x="50" y="100" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-a 01-04-2025</text>
  <text x="250" y="100" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">il prezzo è cambiato</text>
  <text x="50" y="120" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-b 15-03-2025</text>
  <text x="250" y="120" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">nuova recensione</text>
  <text x="50" y="140" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-c2025-01-20</text>
  <text x="250" y="140" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">invariato</text>
  <text x="50" y="160" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-d2025-04-05</text>
  <text x="250" y="160" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">rifornito</text>

  <rect x="50" y="176" width="250" height="36" rx="4" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="175" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Risultato: indicizzazione più rapida del 30%.</text>
  <text x="175" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Google si fida e utilizza il segnale</text>

  <!-- Incorrect -->
  <rect x="360" y="48" width="290" height="180" rx="10" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="505" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ef4444">Tutti la stessa data</text>

  <text x="380" y="100" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-a 07-04-2025</text>
  <text x="562" y="100" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Oggi</text>
  <text x="380" y="120" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-b 07-04-2025</text>
  <text x="562" y="120" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Oggi</text>
  <text x="380" y="140" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-c 07-04-2025</text>
  <text x="562" y="140" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Oggi</text>
  <text x="380" y="160" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/prodotto-d 07-04-2025</text>
  <text x="562" y="160" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Oggi</text>

  <rect x="380" y="176" width="250" height="36" rx="4" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="505" y="193" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#ef4444">Risultato: segnale distrutto</text>
  <text x="505" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Google ignora completamente LastMod</text>
</svg>