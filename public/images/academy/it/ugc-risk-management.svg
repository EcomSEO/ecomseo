<svg viewBox="0 0 480 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Gestione del rischio SEO UGC</text>
  <!-- Four risk columns -->
  <rect x="15" y="45" width="105" height="150" rx="8" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.2"/>
  <text x="67" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ef4444">Spam</text>
  <text x="67" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Generato dal bot</text>
  <text x="67" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Collegamenti irrilevanti</text>
  <line x1="30" y1="115" x2="105" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="67" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Filtri automatici +</text>
  <text x="67" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Revisione manuale</text>
  <rect x="130" y="45" width="105" height="150" rx="8" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1.2"/>
  <text x="182" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Contenuto sottile</text>
  <text x="182" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Recensioni di una sola parola</text>
  <text x="182" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"Grande!" / "Cattivo"</text>
  <line x1="145" y1="115" x2="220" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="182" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Minimo 50 caratteri</text>
  <text x="182" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Domande tempestive</text>
  <rect x="245" y="45" width="105" height="150" rx="8" fill="#60a5fa" opacity="0.1" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="297" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Duplicati</text>
  <text x="297" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Testo copiato e incollato</text>
  <text x="297" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Imbroglioni incrociati</text>
  <line x1="260" y1="115" x2="335" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="297" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Tag canonici</text>
  <text x="297" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Rilevamento di duplicati</text>
  <rect x="360" y="45" width="105" height="150" rx="8" fill="#a78bfa" opacity="0.1" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="412" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">neg. Sentimento</text>
  <text x="412" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Recensioni negative</text>
  <text x="412" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Senza risposta</text>
  <line x1="375" y1="115" x2="450" y2="115" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="412" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Professionale</text>
  <text x="412" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">risposte entro 24h</text>
  <!-- Bottom label -->
  <text x="240" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Rischio (in alto) | Mitigazione (in basso, verde)</text>
</svg>
