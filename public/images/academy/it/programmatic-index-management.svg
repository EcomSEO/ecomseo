<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Ciclo di vita della gestione dell'indice</text>
  <!-- Funnel -->
  <polygon points="60,40 340,40 300,80 100,80" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="200" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">50.000 pagine generate</text>
  <polygon points="100,85 300,85 270,120 130,120" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="200" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Invio della mappa del sito + scansione</text>
  <polygon points="130,125 270,125 250,155 150,155" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="200" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">30.000 indicizzati (bersaglio)</text>
  <!-- Side labels -->
  <text x="355" y="63" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">pagine sottili noindex</text>
  <path d="M340 58 L350 58" stroke="#ef4444" stroke-width="1"/>
  <text x="355" y="105" font-family="Arial,sans-serif" font-size="8" fill="#f97316">duplicati canonici</text>
  <path d="M300 100 L350 100" stroke="#f97316" stroke-width="1"/>
  <!-- Bottom: lifecycle -->
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#e2e8f0">Ciclo di vita: Arricchisci &amp;#8594; Indice &amp;#8594; Monitorare &amp;#8594; Andare in pensione (301/410)</text>
  <rect x="50" y="165" width="300" height="22" rx="4" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3"/>
</svg>