<svg viewBox="0 0 420 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">4 fattori che rendono prezioso un backlink</text>
  <rect x="20" y="40" rx="8" width="175" height="90" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
  <text x="107" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">1. Rilevanza</text>
  <text x="107" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Il collegamento del sito copre il tuo</text>
  <text x="107" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">nicchia o categoria di prodotto</text>
  <text x="107" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Fattore di impatto più elevato</text>
  <rect x="225" y="40" rx="8" width="175" height="90" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="312" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">2. Autorità</text>
  <text x="312" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Valutazione/fiducia del dominio</text>
  <text x="312" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">del sito web di collegamento</text>
  <text x="312" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">DR 50+ = segnale forte</text>
  <rect x="20" y="150" rx="8" width="175" height="90" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="107" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f97316">3. Posizionamento</text>
  <text x="107" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Collegamenti editoriali nel contenuto</text>
  <text x="107" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">battere i collegamenti a piè di pagina/barra laterale</text>
  <text x="107" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Corpo del testo = maggior valore</text>
  <rect x="225" y="150" rx="8" width="175" height="90" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="312" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">4. Segui</text>
  <text x="312" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Dofollow supera la classifica</text>
  <text x="312" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">valore; nofollow no</text>
  <text x="312" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Scegli come target i link dofollow</text>
</svg>