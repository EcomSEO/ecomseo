<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Fattori di ranking e-commerce per impatto</text>

  <!-- Bar chart -->
  <!-- Bar 1: Relevance -->
  <text x="155" y="62" text-anchor="end" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Rilevanza dei contenuti</text>
  <rect x="165" y="50" width="440" height="22" rx="4" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-width="1"/>
  <rect x="165" y="50" width="440" height="22" rx="4" fill="#4ade80" fill-opacity="0.15"/>
  <text x="595" y="65" fill="#4ade80" font-family="Arial,sans-serif" font-size="9" font-weight="600">ALTO</text>

  <!-- Bar 2: Backlinks -->
  <text x="155" y="96" text-anchor="end" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Backlink e autorità</text>
  <rect x="165" y="84" width="400" height="22" rx="4" fill="#60a5fa" fill-opacity="0.2" stroke="#60a5fa" stroke-width="1"/>
  <rect x="165" y="84" width="400" height="22" rx="4" fill="#60a5fa" fill-opacity="0.15"/>
  <text x="555" y="99" fill="#60a5fa" font-family="Arial,sans-serif" font-size="9" font-weight="600">ALTO</text>

  <!-- Bar 3: Technical -->
  <text x="155" y="130" text-anchor="end" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Fondamenti tecnici</text>
  <rect x="165" y="118" width="340" height="22" rx="4" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <rect x="165" y="118" width="340" height="22" rx="4" fill="#f97316" fill-opacity="0.15"/>
  <text x="497" y="133" fill="#f97316" font-family="Arial,sans-serif" font-size="9" font-weight="600">MEDIO ALTO</text>

  <!-- Bar 4: User experience -->
  <text x="155" y="164" text-anchor="end" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Core Web Vitals</text>
  <rect x="165" y="152" width="280" height="22" rx="4" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
  <rect x="165" y="152" width="280" height="22" rx="4" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="437" y="167" fill="#a78bfa" font-family="Arial,sans-serif" font-size="9" font-weight="600">MEDIO</text>

  <!-- Bar 5: E-E-A-T -->
  <text x="155" y="198" text-anchor="end" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Segnali E-E-A-T</text>
  <rect x="165" y="186" width="260" height="22" rx="4" fill="#e2e8f0" fill-opacity="0.1" stroke="#475569" stroke-width="1"/>
  <text x="417" y="201" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9" font-weight="600">MEDIO</text>

  <!-- Bar 6: User behavior -->
  <text x="155" y="232" text-anchor="end" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="10">Comportamento dell'utente (CTR)</text>
  <rect x="165" y="220" width="220" height="22" rx="4" fill="#e2e8f0" fill-opacity="0.1" stroke="#475569" stroke-width="1"/>
  <text x="377" y="235" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9" font-weight="600">MODERATO</text>

  <!-- Priority note -->
  <rect x="120" y="260" width="440" height="36" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="340" y="278" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Ordine di priorità: prima le correzioni tecniche, poi il contenuto, poi i collegamenti</text>
  <text x="340" y="291" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Risolvi i problemi tecnici in 2-4 settimane, quindi ottimizza i contenuti, quindi crea autorità nel corso dei mesi</text>
</svg>
