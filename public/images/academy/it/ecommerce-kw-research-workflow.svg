<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none">
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Flusso di lavoro di ricerca delle parole chiave per l'e-commerce</text>
  <!-- Step 1 -->
  <rect x="20" y="50" width="150" height="70" rx="8" stroke="#a78bfa" stroke-width="1.5" fill="#a78bfa" fill-opacity="0.08"/>
  <text x="95" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#a78bfa">Passaggio 1</text>
  <text x="95" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Controllo organico</text>
  <text x="95" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Prestazioni (GSC)</text>
  <!-- Arrow 1 -->
  <path d="M170 85 L195 85" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowV)"/>
  <!-- Step 2 -->
  <rect x="200" y="50" width="150" height="70" rx="8" stroke="#60a5fa" stroke-width="1.5" fill="#60a5fa" fill-opacity="0.08"/>
  <text x="275" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">Passaggio 2</text>
  <text x="275" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Costruisci l'elenco dei semi</text>
  <text x="275" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">3 fonti</text>
  <!-- Arrow 2 -->
  <path d="M350 85 L375 85" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowV)"/>
  <!-- Step 3 -->
  <rect x="380" y="50" width="150" height="70" rx="8" stroke="#4ade80" stroke-width="1.5" fill="#4ade80" fill-opacity="0.08"/>
  <text x="455" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Passaggio 3</text>
  <text x="455" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Espandi e amplia Filtro</text>
  <text x="455" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Intento commerciale</text>
  <!-- Arrow 3 -->
  <path d="M530 85 L555 85" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowV)"/>
  <!-- Step 4 -->
  <rect x="560" y="50" width="100" height="70" rx="8" stroke="#f97316" stroke-width="1.5" fill="#f97316" fill-opacity="0.08"/>
  <text x="610" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#f97316">Passaggio 4</text>
  <text x="610" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Dare priorità</text>
  <text x="610" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">dalle Entrate</text>
  <!-- Source boxes under Step 2 -->
  <rect x="195" y="145" width="100" height="36" rx="6" stroke="#60a5fa" stroke-width="1" fill="#60a5fa" fill-opacity="0.05"/>
  <text x="245" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Dati di ricerca sul sito</text>
  <rect x="305" y="145" width="100" height="36" rx="6" stroke="#60a5fa" stroke-width="1" fill="#60a5fa" fill-opacity="0.05"/>
  <text x="355" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Domande GSC</text>
  <rect x="415" y="145" width="115" height="36" rx="6" stroke="#60a5fa" stroke-width="1" fill="#60a5fa" fill-opacity="0.05"/>
  <text x="472" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Parole chiave della concorrenza</text>
  <!-- Lines from sources to Step 2 -->
  <line x1="245" y1="145" x2="260" y2="120" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="355" y1="145" x2="290" y2="120" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="472" y1="145" x2="310" y2="120" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Scoring axes under Step 4 -->
  <rect x="30" y="210" width="190" height="90" rx="8" stroke="#f97316" stroke-width="1" fill="#f97316" fill-opacity="0.05"/>
  <text x="125" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#f97316">Formula del punteggio delle entrate</text>
  <text x="125" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Volume x Tasso conv. x AOV</text>
  <text x="125" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">+ Grado attuale + Divario di contenuti</text>
  <text x="125" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">= Punteggio prioritario</text>
  <!-- Tag labels -->
  <rect x="260" y="220" width="78" height="28" rx="14" stroke="#4ade80" stroke-width="1" fill="#4ade80" fill-opacity="0.1"/>
  <text x="299" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Prodotto</text>
  <rect x="348" y="220" width="78" height="28" rx="14" stroke="#60a5fa" stroke-width="1" fill="#60a5fa" fill-opacity="0.1"/>
  <text x="387" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Categoria</text>
  <rect x="436" y="220" width="78" height="28" rx="14" stroke="#a78bfa" stroke-width="1" fill="#a78bfa" fill-opacity="0.1"/>
  <text x="475" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">Contenuto</text>
  <text x="387" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">Tagga ogni parola chiave per tipo di pagina</text>
  <defs>
    <marker id="arrowV" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a78bfa" stroke-width="1"/>
    </marker>
  </defs>
</svg>