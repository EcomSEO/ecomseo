<svg viewBox="0 0 480 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Ciclo di collegamento dalla guida al prodotto</text>
  <!-- Buying Guide box -->
  <rect x="30" y="60" width="170" height="100" rx="10" fill="#60a5fa" opacity="0.15" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="115" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">Guida all'acquisto</text>
  <text x="115" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Tabelle di confronto</text>
  <text x="115" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Raccomandazioni</text>
  <text x="115" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Ancore descrittive</text>
  <!-- Product Page box -->
  <rect x="280" y="60" width="170" height="100" rx="10" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="365" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4ade80">Pagina del prodotto</text>
  <text x="365" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Sezione "In evidenza in".</text>
  <text x="365" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">"Non sei sicuro? Leggi la nostra</text>
  <text x="365" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">guida all'acquisto" CTA</text>
  <!-- Arrows -->
  <line x1="200" y1="95" x2="280" y2="95" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="240" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Collegamenti al prodotto</text>
  <line x1="280" y1="135" x2="200" y2="135" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="240" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Collegamento guida indietro</text>
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#60a5fa"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#4ade80"/></marker>
  </defs>
  <text x="240" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Target: 15-25% di clic dalla guida al prodotto</text>
  <text x="240" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">I collegamenti bidirezionali creano un ciclo di contenuti che Google premia</text>
</svg>
