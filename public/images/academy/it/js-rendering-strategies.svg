<svg viewBox="0 0 420 210" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Confronto delle strategie di rendering</text>
  <!-- CSR -->
  <rect x="10" y="38" width="95" height="80" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="57" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">CSR</text>
  <text x="57" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Shell HTML vuota</text>
  <text x="57" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">JS crea la pagina</text>
  <text x="57" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">Peggiore per la SEO</text>
  <text x="57" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Ritardo di giorni-settimane</text>
  <!-- SSR -->
  <rect x="115" y="38" width="95" height="80" rx="6" stroke="#4ade80" stroke-width="1.5"/>
  <text x="162" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">RSS</text>
  <text x="162" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">HTML completo attivato</text>
  <text x="162" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">ogni richiesta</text>
  <text x="162" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">Il meglio per i prodotti</text>
  <text x="162" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Indicizzazione istantanea</text>
  <!-- SSG -->
  <rect x="220" y="38" width="95" height="80" rx="6" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="267" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">SSG</text>
  <text x="267" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Pre-renderizzato</text>
  <text x="267" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">al momento della costruzione</text>
  <text x="267" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">Tempo di caricamento più veloce</text>
  <text x="267" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Rischio di dati obsoleti</text>
  <!-- ISR -->
  <rect x="325" y="38" width="85" height="80" rx="6" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="367" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">ISR</text>
  <text x="367" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Statico + periodico</text>
  <text x="367" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">rivalidazione</text>
  <text x="367" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Meglio di entrambi</text>
  <text x="367" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Next.js/Nuxt</text>
  <!-- Recommendation -->
  <rect x="30" y="140" width="360" height="60" rx="6" stroke="#4ade80" stroke-width="1" stroke-dasharray="4"/>
  <text x="210" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Approccio ibrido consigliato</text>
  <text x="210" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">SSG: pagine di categoria | SSR: pagine dei prodotti | CSR: solo carrello/lista dei desideri</text>
  <text x="210" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Abbina la strategia di rendering alla priorità di indicizzazione per tipo di pagina</text>
</svg>