  <text x="110" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Schema della pagina FAQ</text>
  <text x="110" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">@tipo: FAQPage</text>
  <text x="110" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">entità principale: [</text>
  <text x="110" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Domanda + Risposta</text>
  <text x="110" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Domanda + Risposta</text>
  <text x="110" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">]</text>
  <!-- Arrow -->
  <line x1="200" y1="110" x2="270" y2="110" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowFaq)"/>
  <text x="235" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Rende</text>
  <!-- SERP result -->
  <rect x="270" y="45" width="190" height="130" rx="8" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="365" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4ade80">Risultato ricco in SERP</text>
  <rect x="285" y="80" width="160" height="22" rx="4" fill="#60a5fa" opacity="0.1" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="295" y="95" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">D: Come prendersi cura di... v</text>
  <rect x="285" y="108" width="160" height="22" rx="4" fill="#60a5fa" opacity="0.1" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="295" y="123" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">D: Che taglia porto... v</text>
  <rect x="285" y="136" width="160" height="22" rx="4" fill="#60a5fa" opacity="0.1" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="295" y="151" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">D: Posso restituire... v</text>
  <defs><marker id="arrowFaq" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#4ade80"/></marker></defs>
  <!-- Bottom note -->
  <text x="240" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Gli elenchi espansi spingono i concorrenti verso il basso nella pagina</text>
