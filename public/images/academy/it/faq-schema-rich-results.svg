<svg viewBox="0 0 480 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Schema delle domande frequenti sui risultati avanzati</text>
