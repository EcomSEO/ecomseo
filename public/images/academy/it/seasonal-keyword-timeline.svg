<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" fill="none">
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Seasonal Keyword Planning Timeline</text>
  <!-- Timeline axis -->
  <line x1="40" y1="180" x2="640" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Month labels -->
  <text x="60" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Jan</text>
  <text x="110" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Feb</text>
  <text x="160" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Mar</text>
  <text x="210" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Apr</text>
  <text x="260" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">May</text>
  <text x="310" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Jun</text>
  <text x="360" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Jul</text>
  <text x="410" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Aug</text>
  <text x="460" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Sep</text>
  <text x="510" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Oct</text>
  <text x="560" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Nov</text>
  <text x="610" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">Dec</text>
  <!-- Summer peak curve -->
  <path d="M60,170 Q110,168 160,155 Q210,120 260,70 Q310,65 360,90 Q410,140 460,165 Q510,172 560,175" stroke="#f97316" stroke-width="2" fill="none"/>
  <text x="260" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#f97316">Summer Peak</text>
  <text x="260" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">"garden furniture"</text>
  <!-- Holiday peak curve -->
  <path d="M60,175 Q160,175 260,174 Q360,172 410,168 Q460,155 510,110 Q560,60 590,55 Q610,80 630,120" stroke="#4ade80" stroke-width="2" fill="none"/>
  <text x="570" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#4ade80">Holiday Peak</text>
  <text x="570" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#94a3b8">"Christmas gifts"</text>
  <!-- Prep windows -->
  <rect x="60" y="215" width="150" height="28" rx="4" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-width="1"/>
  <text x="135" y="233" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Prep: Jan-Mar (summer)</text>
  <rect x="360" y="215" width="150" height="28" rx="4" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-width="1"/>
  <text x="435" y="233" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4ade80">Prep: Jul-Sep (holiday)</text>
  <!-- Bottom guidance -->
  <rect x="60" y="255" width="560" height="36" rx="6" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="1"/>
  <text x="340" y="273" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0">Start SEO work <tspan font-weight="700" fill="#a78bfa">3-4 months before peak</tspan>. Build authority in the off-season when competition is lower.</text>
</svg>