<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="14" font-weight="700">Mappatura delle intenzioni lungo il percorso dell'acquirente</text>

  <!-- Stage boxes with arrows -->
  <!-- Awareness -->
  <rect x="30" y="54" width="190" height="80" rx="8" fill="#1a1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="125" y="74" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="11" font-weight="700">Consapevolezza</text>
  <text x="125" y="92" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">"quale numero di thread</text>
  <text x="125" y="104" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">mezzi per lenzuola"</text>
  <text x="125" y="124" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Post del blog e guide</text>

  <!-- Arrow 1 -->
  <line x1="222" y1="94" x2="242" y2="94" stroke="#475569" stroke-width="1.5"/>
  <polygon points="239,89 249,94 239,99" fill="#475569"/>

  <!-- Consideration -->
  <rect x="250" y="54" width="190" height="80" rx="8" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <text x="345" y="74" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="11" font-weight="700">Considerazione</text>
  <text x="345" y="92" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">"il miglior cotone egiziano</text>
  <text x="345" y="104" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">fogli"</text>
  <text x="345" y="124" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Categoria pagine di confronto</text>

  <!-- Arrow 2 -->
  <line x1="442" y1="94" x2="462" y2="94" stroke="#475569" stroke-width="1.5"/>
  <polygon points="459,89 469,94 459,99" fill="#475569"/>

  <!-- Decision -->
  <rect x="470" y="54" width="190" height="80" rx="8" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="565" y="74" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="11" font-weight="700">Decisione</text>
  <text x="565" y="92" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">"compra Brooklinen di lusso</text>
  <text x="565" y="104" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9">set lenzuola re"</text>
  <text x="565" y="124" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Pagine dei prodotti</text>

  <!-- Conversion rates -->
  <text x="125" y="155" text-anchor="middle" fill="#60a5fa" font-family="Arial,sans-serif" font-size="10" font-weight="600">&amp;lt;1% di conversione</text>
  <text x="345" y="155" text-anchor="middle" fill="#f97316" font-family="Arial,sans-serif" font-size="10" font-weight="600">Conversione del 2-4%.</text>
  <text x="565" y="155" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="600">Conversione del 5-10%.</text>

  <!-- Internal linking arrow -->
  <rect x="100" y="180" width="480" height="32" rx="6" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="200" text-anchor="middle" fill="#a78bfa" font-family="Arial,sans-serif" font-size="10" font-weight="600">I collegamenti interni collegano le fasi: blog &amp;rarr; categoria &amp;rarr; prodotto</text>

  <!-- Bottom note -->
  <text x="340" y="240" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8">Crea contenuti per ogni fase e collegali tra loro per catturare i clienti durante tutto il loro percorso di acquisto</text>
</svg>
