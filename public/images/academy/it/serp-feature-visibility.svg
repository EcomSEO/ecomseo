    <text x="14" y="30" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Cattura il 35-50% dei clic sulle query di confronto</text>
    <rect x="260" y="10" width="88" height="18" rx="4" fill="#f97316" fill-opacity="0.15"/>
    <text x="304" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f97316">Medio-alto</text>
  </g>
  <g transform="translate(30,130)">
