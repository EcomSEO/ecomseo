    <text x="14" y="30" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Spinge i risultati organici verso il basso, ma è vincente con i contenuti delle FAQ</text>
    <rect x="260" y="10" width="88" height="18" rx="4" fill="#60a5fa" fill-opacity="0.15"/>
    <text x="304" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Medio</text>
