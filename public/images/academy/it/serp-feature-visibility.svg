<svg viewBox="0 0 420 230" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Funzionalità SERP che influiscono sul CTR dell'e-commerce</text>
  <g transform="translate(30,38)">
    <rect width="360" height="38" rx="6" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-width="1"/>
    <text x="14" y="16" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316">Carosello Shopping</text>
    <text x="14" y="30" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Riduce il CTR della Pos 1 organica da ~30% a 15-20%</text>
    <rect x="260" y="10" width="88" height="18" rx="4" fill="#ef4444" fill-opacity="0.15"/>
    <text x="304" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">Alto impatto</text>
  </g>
  <g transform="translate(30,84)">
    <rect width="360" height="38" rx="6" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-width="1"/>
