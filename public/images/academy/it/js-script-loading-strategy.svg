<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" fill="none">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">Strategia di caricamento di script di terze parti</text>

  <!-- Timeline -->
  <line x1="60" y1="70" x2="620" y2="70" stroke="#94a3b8" stroke-width="1"/>
  <text x="60" y="60" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Caricamento pagina</text>
  <text x="240" y="60" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Prima vernice</text>
  <text x="400" y="60" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Interattivo</text>
  <text x="560" y="60" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Scorrimento utente</text>

  <!-- Tick marks -->
  <line x1="60" y1="66" x2="60" y2="74" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="240" y1="66" x2="240" y2="74" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="400" y1="66" x2="400" y2="74" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="560" y1="66" x2="560" y2="74" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Critical scripts -->
  <rect x="60" y="90" width="180" height="36" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="150" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4ade80">Critico (sincronizzazione)</text>
  <text x="150" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">CSS, JS di base, dati di prodotto</text>

  <!-- Deferred scripts -->
  <rect x="240" y="90" width="160" height="36" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="320" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#60a5fa">Differito (asincrono)</text>
  <text x="320" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Analisi, GTM</text>

  <!-- Lazy scripts -->
  <rect x="400" y="90" width="220" height="36" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="510" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#f97316">Pigro (su evento)</text>
  <text x="510" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Chat, recensioni, retargeting</text>

  <!-- Examples -->
  <rect x="40" y="150" width="200" height="110" rx="8" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="140" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#4ade80">Carica immediatamente</text>
  <text x="60" y="190" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">CSS del tema</text>
  <text x="60" y="206" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Esposizione del prodotto JS</text>
  <text x="60" y="222" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Funzionalità del carrello</text>
  <text x="60" y="238" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Immagini sopra-piegate</text>

  <rect x="250" y="150" width="180" height="110" rx="8" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="340" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#60a5fa">Rimanda a Dopo la verniciatura</text>
  <text x="270" y="190" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Google Analytics</text>
  <text x="270" y="206" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Gestore di tag</text>
  <text x="270" y="222" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Pixel di conversione</text>
  <text x="270" y="238" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Test A/B</text>

  <rect x="440" y="150" width="200" height="110" rx="8" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="540" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#f97316">Carica su azione utente</text>
  <text x="460" y="190" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Widget di chat (ritardo di 5 secondi)</text>
  <text x="460" y="206" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Recensioni (sullo scorrimento)</text>
  <text x="460" y="222" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Pixel di retargeting</text>
  <text x="460" y="238" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Incorporamenti sociali</text>
</svg>