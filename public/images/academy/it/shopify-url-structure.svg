<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Shopify URL Duplication Pattern</text>
  <!-- Canonical URL -->
  <rect x="110" y="40" width="200" height="34" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="210" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80">Canonical (primary)</text>
  <text x="210" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">/products/blue-sneaker</text>
  <!-- Duplicate URLs -->
  <rect x="20" y="110" width="175" height="34" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="107" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Duplicate</text>
  <text x="107" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/collections/shoes/products/blue-sneaker</text>
  <rect x="225" y="110" width="175" height="34" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="312" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316">Duplicate</text>
  <text x="312" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">/collections/sale/products/blue-sneaker</text>
  <!-- Arrows pointing up to canonical -->
  <line x1="107" y1="110" x2="180" y2="74" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="180,74 174,80 178,82" fill="#a78bfa"/>
  <line x1="312" y1="110" x2="240" y2="74" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="240,74 242,82 246,80" fill="#a78bfa"/>
  <!-- Labels -->
  <text x="100" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">canonical tag</text>
  <text x="320" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">canonical tag</text>
  <!-- Tip box -->
  <rect x="40" y="165" width="340" height="44" rx="6" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="210" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Shopify handles this automatically</text>
  <text x="210" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Verify canonical tags in Search Console URL Inspection tool.</text>
  <text x="210" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">App conflicts or theme edits can override them.</text>
  <!-- Legend -->
  <rect x="120" y="228" width="8" height="8" rx="2" fill="#4ade80"/>
  <text x="133" y="236" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Primary URL</text>
  <rect x="200" y="228" width="8" height="8" rx="2" fill="#f97316"/>
  <text x="213" y="236" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Collection-context duplicates</text>
</svg>