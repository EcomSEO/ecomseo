<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="200" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Analisi dell'allocazione del budget di scansione</text>
  <!-- Bar chart -->
  <text x="30" y="50" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Prodotti</text>
  <rect x="35" y="40" width="120" height="14" rx="2" fill="#4ade80" opacity="0.3"/>
  <rect x="35" y="40" width="120" height="14" rx="2" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="160" y="51" font-family="Arial,sans-serif" font-size="8" fill="#4ade80">15% (dovrebbe essere il 60%)</text>
  <text x="30" y="72" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Categorie</text>
  <rect x="35" y="62" width="80" height="14" rx="2" fill="#60a5fa" opacity="0.3"/>
  <rect x="35" y="62" width="80" height="14" rx="2" stroke="#60a5fa" stroke-width="1" fill="none"/>
  <text x="120" y="73" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa">10%</text>
  <text x="30" y="94" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Sfaccettature</text>
  <rect x="35" y="84" width="300" height="14" rx="2" fill="#ef4444" opacity="0.2"/>
  <rect x="35" y="84" width="300" height="14" rx="2" stroke="#ef4444" stroke-width="1" fill="none"/>
  <text x="340" y="95" font-family="Arial,sans-serif" font-size="8" fill="#ef4444">60% RIFIUTO</text>
  <text x="30" y="116" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="end">Altro</text>
  <rect x="35" y="106" width="100" height="14" rx="2" fill="#f97316" opacity="0.2"/>
  <rect x="35" y="106" width="100" height="14" rx="2" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="140" y="117" font-family="Arial,sans-serif" font-size="8" fill="#f97316">15% (ricerca, carrello, ecc.)</text>
  <!-- Fix arrow -->
  <text x="200" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4ade80">Correzione: blocco degli URL con faccette &amp;#8594; Reindirizzare il budget ai prodotti</text>
  <!-- Target -->
  <rect x="80" y="160" width="240" height="28" rx="5" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="200" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">Obiettivo: 60% prodotti | 15% categorie | 25% altro</text>
</svg>