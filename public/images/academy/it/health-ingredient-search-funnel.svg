<svg viewBox="0 0 420 230" xmlns="http://www.w3.org/2000/svg" fill="none">
  <text x="210" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">Strategia di ricerca basata sugli ingredienti</text>
  <!-- Left: Informational -->
  <rect x="15" y="40" width="120" height="75" rx="6" fill="#60a5fa" opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="75" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">Informativo</text>
  <text x="75" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"cos'è la niacinamide"</text>
  <text x="75" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"benefici del retinolo"</text>
  <text x="75" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"acido ialuronico per la pelle"</text>
  <text x="75" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#60a5fa">Pagine guida agli ingredienti</text>
  <!-- Arrow -->
  <line x1="135" y1="77" x2="150" y2="77" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="148,73 156,77 148,81" fill="#a78bfa"/>
  <!-- Center: Landing page hub -->
  <rect x="150" y="40" width="120" height="75" rx="6" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="210" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Centro degli ingredienti</text>
  <text x="210" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Cosa fa</text>
  <text x="210" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">A chi giova</text>
  <text x="210" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Come usare</text>
  <text x="210" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa">+ Griglia del prodotto qui sotto</text>
  <!-- Arrow -->
  <line x1="270" y1="77" x2="285" y2="77" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="283,73 291,77 283,81" fill="#4ade80"/>
  <!-- Right: Commercial -->
  <rect x="285" y="40" width="120" height="75" rx="6" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="345" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" font-weight="bold">Commerciale</text>
  <text x="345" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"siero alla niacinamide"</text>
  <text x="345" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"crema idratante al retinolo"</text>
  <text x="345" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">"siero alla vitamina C acquistare"</text>
  <text x="345" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4ade80">Pagine dei prodotti</text>
  <!-- Trending section below -->
  <text x="210" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f97316" font-weight="bold">Tendenze emergenti degli ingredienti da monitorare</text>
  <rect x="25" y="152" width="80" height="28" rx="4" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1"/>
  <text x="65" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Bakuchiol</text>
  <rect x="115" y="152" width="80" height="28" rx="4" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1"/>
  <text x="155" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Peptidi</text>
  <rect x="205" y="152" width="80" height="28" rx="4" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1"/>
  <text x="245" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Acido Tranexamico</text>
  <rect x="295" y="152" width="100" height="28" rx="4" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1"/>
  <text x="345" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Estratti di funghi</text>
  <text x="210" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e2e8f0">Costruisci pagine per ingredienti di tendenza prima che i concorrenti stabiliscano posizioni in classifica</text>
</svg>