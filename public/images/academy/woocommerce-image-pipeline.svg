<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none">
  <text x="210" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">WooCommerce Image Optimization Pipeline</text>
  <!-- Step 1 -->
  <rect x="15" y="44" width="85" height="55" rx="6" stroke="#ef4444" stroke-width="1.5" fill="none"/>
  <text x="57" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#ef4444">Upload</text>
  <text x="57" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">JPEG 4000px</text>
  <text x="57" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">~2MB each</text>
  <!-- Arrow -->
  <line x1="100" y1="72" x2="120" y2="72" stroke="#e2e8f0" stroke-width="1"/>
  <polygon points="118,69 124,72 118,75" fill="#e2e8f0"/>
  <!-- Step 2 -->
  <rect x="124" y="44" width="85" height="55" rx="6" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="166" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#f97316">Convert</text>
  <text x="166" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">WebP format</text>
  <text x="166" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">25-35% smaller</text>
  <!-- Arrow -->
  <line x1="209" y1="72" x2="229" y2="72" stroke="#e2e8f0" stroke-width="1"/>
  <polygon points="227,69 233,72 227,75" fill="#e2e8f0"/>
  <!-- Step 3 -->
  <rect x="233" y="44" width="85" height="55" rx="6" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
  <text x="275" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#60a5fa">Resize</text>
  <text x="275" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Multiple sizes:</text>
  <text x="275" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">thumb, med, lg, full</text>
  <!-- Arrow -->
  <line x1="318" y1="72" x2="338" y2="72" stroke="#e2e8f0" stroke-width="1"/>
  <polygon points="336,69 342,72 336,75" fill="#e2e8f0"/>
  <!-- Step 4 -->
  <rect x="342" y="44" width="65" height="55" rx="6" stroke="#4ade80" stroke-width="1.5" fill="none"/>
  <text x="374" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4ade80">Serve</text>
  <text x="374" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Lazy load</text>
  <text x="374" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">w/ W+H</text>
  <!-- Bottom callouts -->
  <rect x="15" y="118" width="190" height="36" rx="6" stroke="#4ade80" stroke-width="1" fill="none"/>
  <text x="110" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4ade80">Hero image: eager load (no lazy)</text>
  <text x="110" y="146" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Primary product image is the LCP element</text>
  <rect x="215" y="118" width="190" height="36" rx="6" stroke="#f97316" stroke-width="1" fill="none"/>
  <text x="310" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#f97316">Gallery + grid: lazy load</text>
  <text x="310" y="146" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#e2e8f0">Below-fold images defer until scroll</text>
  <!-- Stats -->
  <text x="210" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0">1 product x 5 images = 20+ files on server (4 sizes each)</text>
  <text x="210" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa">Plugins: ShortPixel | Imagify | EWWW Image Optimizer</text>
</svg>